# Testet HolaRuta bei jedem Push/PR. Das Deployment selbst läuft NICHT mehr hier:
# Vercel ist per GitHub-App direkt mit dem Repo verbunden und deployt bei jedem
# Push auf main automatisch (Build-Settings in vercel.json). Dieser Workflow ist
# ausschließlich das Test-/Merge-Gate.
#
# Vorher lief hier zusätzlich ein `deploy`-Job, der den `dist/`-Build auf GitHub
# Pages veröffentlicht hat (moarci.github.io/holaRuta). Mit dem Umzug auf die
# eigene Domain (holaruta.com, Hosting bei Vercel, Registrar/DNS bei IONOS) ist
# dieser Job entfallen — Vercels eigene GitHub-Integration übernimmt den Build
# UND das Deployment, auch bei einem privaten Repo.
name: Test

on:
  push:
    branches: [main]
  pull_request: # Merge-Gate: Tests laufen vor dem Merge nach main
  workflow_dispatch: # erlaubt manuelles Auslösen über den Actions-Tab
  schedule:
    - cron: "0 4 * * *" # nächtlicher voller Mutations-Score (Job mutation-full)

permissions:
  contents: read

# Die gepinnten checkout-/setup-node-Actions laufen noch auf der Node-20-Runtime,
# die GitHub ab dem 16.06.2026 abkündigt. Bis neue Action-Versionen gepinnt werden,
# zwingen wir sie schon jetzt auf Node 24 (offiziell empfohlener Übergangsweg).
#
# AUFRÄUMEN: Ab dem 16.06.2026 ist Node 24 der Standard auf den Runnern — dann
# ist dieser env-Block überflüssig und kann ersatzlos gelöscht werden. (Die
# Actions selbst laufen auf Node 24 problemlos; ein v5-Upgrade ist optional.)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Pro Ref serialisieren, damit parallele Läufe auf demselben Ref sich nicht überholen.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Test-Gate: kaputter Code darf nicht gemergt/deployt werden (und würde von
  # PWA-Nutzern offline gecacht). Prüft außerdem, dass die generierten Artefakte
  # zum Quellcode passen (kein Build-Drift): das Single-File-Build HolaRuta.html
  # UND der gestempelte Service-Worker-Cache-Name (CACHE_VERSION). Letzterer sorgt
  # dafür, dass ausgelieferte Änderungen nie in einem alten Cache hängenbleiben.
  # Hinweis: Das Projekt hat keine Dependencies/keinen Lockfile — kein npm ci nötig.
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0 # volle Historie: mutation:diff vergleicht gegen den Basis-Ref (Fallback: alle Module)

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"

      - name: Run tests
        run: npm test

      # Lint-Gate: fängt undefined-Variablen & offensichtliche Bugs (no-undef
      # = error, no-unused-vars = warn). ESLint ist KEINE Repo-Dependency
      # (Projekt bleibt laufzeit-dependency-frei) → flüchtig & versionsgepinnt
      # via npx. --max-warnings 9999 lässt die (bewusst tolerierten) Warnungen
      # durch; ein no-undef-ERROR bricht den Job (Exit 1).
      - name: Lint (ESLint, gepinnt, nicht in package.json)
        run: npx --yes eslint@9.39.0 . --max-warnings 9999

      # Coverage-Report (REPORTING, non-blocking): zeigt die Test-Abdeckung im
      # Log, ohne den Job zu blockieren (|| true). Nutzt nur Node-Bordmittel
      # (--experimental-test-coverage), keine Dependency, kein package.json-Eintrag.
      - name: Coverage (Reporting, non-blocking)
        run: node --test --experimental-test-coverage || true

      # HolaRuta.html ist nicht eingecheckt. Geprüft wird nur, dass der Build
      # sauber läuft UND der committete service-worker.js (CACHE_VERSION) zum
      # Quellcode passt.
      - name: Verify build runs and service-worker is in sync
        run: |
          node build.js
          git diff --exit-code service-worker.js

      # Mutationstesting-Gate (BLOCKIEREND): baut echte Bugs in den Quellcode und
      # verlangt, dass die Tests sie fangen. Zwei Teile:
      #   1. Katalog (catalog.mjs): kuratierte Invarianten — 100 % müssen gefangen werden.
      #   2. Engine: automatische Operatoren NUR auf den per git geänderten Modulen
      #      (--diff), gegen den Pro-Modul-No-Regression-Boden (targets.BASELINE).
      # Zero-Dep (nur node:*). NACH dem service-worker-Check platziert, damit ein
      # evtl. dirty-tree-Fehler nicht maskiert wird; der Runner stellt den Tree wieder her.
      - name: Mutationstesting – Gate (Katalog + Engine auf geänderten Modulen)
        run: npm run mutation:diff

  # Browser-E2E (Playwright): prüft den „Modo profe" (Lehrer-Modus) gegen die
  # LAUFENDE App in echtem Chromium – Schüler-Import, Niveau-Verteilung,
  # Sortierung, CSV-Export (inkl. Akzent-Namen), Re-Import-Dedupe und das
  # A4-Druck-Layout (keine geklippten Spalten). Suite: scripts/e2e/suites/p1-modo-profe.mjs.
  #
  # Bewusst KEIN Merge-Blocker: `test` ist das schnelle, browserlose Pflicht-Gate;
  # dieser e2e-Job ist ein zusätzliches PR-/Push-Signal (browser-basiert, daher
  # etwas langsamer und potenziell seltener mal flaky).
  #
  # Playwright ist KEINE Repo-Dependency (das Projekt bleibt laufzeit-dependency-
  # frei): hier flüchtig (--no-save) und versionsgepinnt installiert.
  #
  # Bewusst schlank gehalten. Erweiterungen NUR bei konkretem Bedarf nachrüsten
  # (sonst zahlt man dauerhaft Komplexität für wenig Nutzen):
  #   • Erforderlicher Merge-Check: erst schalten, wenn der Job über ~10–20 Läufe
  #     stabil grün war (flaky Browser-Jobs als Hard-Gate blockieren sonst legitime
  #     PRs). Setzen unter Settings → Branches → Required status checks: „e2e".
  #   • Failure-Screenshots als Artefakt hochladen: erst, wenn ein rein VISUELLER
  #     Layout-Bug aus dem Log-Report allein nicht klar wird (das Skript gibt Ist/
  #     Soll bereits als Text aus). Bräuchte actions/upload-artifact – dann SHA
  #     sauber nachschlagen (Repo pinnt Actions strikt per SHA, nicht per Tag).
  #   • Browser-Caching (actions/cache auf ~/.cache/ms-playwright, Key = Playwright-
  #     Version): erst, wenn CI-Dauer/-Minuten wirklich stören.
  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"

      - name: Install Playwright (gepinnt, nicht in package.json)
        run: npm install --no-save playwright@1.56.1

      - name: Install Chromium + system deps
        run: npx playwright install --with-deps chromium

      - name: Modo-profe E2E
        run: npm run e2e:profe

      - name: Aufgaben-Studio E2E (Aufgaben & Pakete erstellen)
        run: npm run e2e:composer

      - name: Install esbuild (gepinnt, dev-only — für dist/-Verifikation)
        run: npm install --no-save esbuild@0.28.1

      - name: Build dist (minifiziert) für Verify-Suite
        run: node build.js --dist

      - name: Ausführliche Browser-Verifikation (Root + dist)
        run: npm run e2e:verify

  # Nächtlicher VOLLER Mutations-Score über ALLE Engine-Module (entkoppelt vom
  # schnellen PR-Gate, das nur geänderte Module fährt). Gated je Modul gegen den
  # No-Regression-Boden (targets.BASELINE). Läuft nur per Zeitplan / manuell.
  mutation-full:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"

      # Rotierender Seed (Datum) sampelt jede Nacht eine ANDERE 30-Mutanten-
      # Teilmenge → schließt die Sampling-Lücke des fix geseedeten PR-Gates über
      # die Zeit. continue-on-error, weil die BASELINE auf SEED=1 kalibriert ist:
      # ein unglücklicher Seed kann einen 100%-Modul unter den 95%-Boden drücken
      # OHNE echte Regression. Das Ergebnis wird unten ins Job-Summary gespiegelt,
      # damit ein echter Survivor nicht im grünen CI untergeht.
      - name: Voller Mutations-Score (alle Module, rotierender Seed)
        id: mutscore
        continue-on-error: true
        run: |
          set -o pipefail
          npm run mutation:score -- --seed="$(date -u +%Y%m%d)" 2>&1 | tee mutation-score.log

      - name: Ergebnis ins Job-Summary spiegeln
        if: always()
        run: |
          {
            echo "## Voller Mutations-Score (Seed $(date -u +%Y%m%d))"
            if [ "${{ steps.mutscore.outcome }}" = "failure" ]; then
              echo "⚠️ **Mindestens ein Modul unter dem No-Regression-Boden.** Echte Survivor gezielt durch Tests töten (oder seed-bedingtes Sampling-Rauschen bestätigen)."
            else
              echo "✅ Alle Module über dem Boden."
            fi
            echo ""
            echo '```'
            tail -n 40 mutation-score.log 2>/dev/null || echo "(kein Log)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
