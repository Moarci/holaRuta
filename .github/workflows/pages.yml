# Veröffentlicht HolaRuta auf GitHub Pages.
#
# Damit bekommt die App eine feste Internet-Adresse (https://<user>.github.io/holaRuta/).
# Die einmal auf dem Handy öffnen und „Zum Startbildschirm hinzufügen" tippen –
# fertig ist das App-Icon: kein Datei-Suchen mehr, offline-fähig (Service Worker).
#
# Die App ist statisches HTML/CSS/JS ohne Build-Schritt, deshalb wird der
# Projektordner unverändert als Pages-Artefakt hochgeladen.
#
# Einmalig nötig: unter Settings → Pages als Quelle „GitHub Actions" wählen.
# (Der configure-pages-Schritt unten versucht das beim ersten Lauf automatisch.)
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # erlaubt manuelles Auslösen über den Actions-Tab

# Nur Lese-Zugriff aufs Repo, aber Schreibrechte für die Pages-Bereitstellung.
permissions:
  contents: read
  pages: write
  id-token: write

# Gleichzeitige Deployments serialisieren; laufende nicht abbrechen.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # Test-Gate: kaputter Code darf nicht live gehen (und würde von PWA-Nutzern
  # offline gecacht). Prüft außerdem, dass das eingecheckte Single-File-Build
  # HolaRuta.html zum Quellcode passt (kein Build-Drift).
  # Hinweis: Das Projekt hat keine Dependencies/keinen Lockfile — kein npm ci nötig.
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"

      - name: Run tests
        run: npm test

      - name: Verify single-file build is up to date
        run: |
          node build.js
          git diff --exit-code HolaRuta.html

  deploy:
    needs: test
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Configure Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0
        with:
          enablement: true # Pages beim ersten Lauf einschalten, falls noch nicht aktiv

      - name: Upload artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: . # gesamtes Projekt (index.html ist die App-Startseite)

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
