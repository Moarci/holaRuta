# Testet & veröffentlicht HolaRuta.
#
# Zwei Modi in EINEM Workflow:
#  - Pull Request gegen main  → `test` (Merge-Gate) + `e2e` (Browser-Check) laufen,
#    kein Deploy.
#  - Push auf main (oder manuell) → `test` + `e2e`, danach `deploy` auf GitHub Pages
#    (der Deploy hängt nur am `test`-Job, nicht am Browser-`e2e`-Job).
#
# Damit bekommt die App eine feste Internet-Adresse (https://<user>.github.io/holaRuta/),
# offline-fähig über den Service Worker. Kaputter Code wird so schon im PR gestoppt,
# bevor er live geht und bei PWA-Nutzern offline gecacht wird.
#
# Die App ist statisches HTML/CSS/JS ohne Build-Schritt, deshalb wird der
# Projektordner unverändert als Pages-Artefakt hochgeladen.
#
# Einmalig nötig: unter Settings → Pages als Quelle „GitHub Actions" wählen.
# Empfohlen: unter Settings → Branches eine Schutzregel für `main` mit dem
# erforderlichen Status-Check „test" – dann ist der Merge-Knopf erst grün, wenn
# die Tests grün sind.
name: Test & Deploy

on:
  push:
    branches: [main]
  pull_request: # Merge-Gate: Tests laufen vor dem Merge nach main
  workflow_dispatch: # erlaubt manuelles Auslösen über den Actions-Tab

# Standardmäßig nur Lesezugriff; die Pages-Schreibrechte braucht nur der
# deploy-Job (Least Privilege) – siehe unten.
permissions:
  contents: read

# Die gepinnten checkout-/setup-node-Actions laufen noch auf der Node-20-Runtime,
# die GitHub ab dem 16.06.2026 abkündigt. Bis neue Action-Versionen gepinnt werden,
# zwingen wir sie schon jetzt auf Node 24 (offiziell empfohlener Übergangsweg).
#
# AUFRÄUMEN: Ab dem 16.06.2026 ist Node 24 der Standard auf den Runnern — dann
# ist dieser env-Block überflüssig und kann ersatzlos gelöscht werden. (Die
# Actions selbst laufen auf Node 24 problemlos; ein v5-Upgrade ist optional.)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Pro Ref serialisieren: gleichzeitige main-Deployments laufen nacheinander,
# aber PR-Läufe blockieren keine main-Deploys (und umgekehrt).
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Test-Gate: kaputter Code darf nicht gemergt/live gehen (und würde von
  # PWA-Nutzern offline gecacht). Prüft außerdem, dass die generierten Artefakte
  # zum Quellcode passen (kein Build-Drift): das Single-File-Build HolaRuta.html
  # UND der gestempelte Service-Worker-Cache-Name (CACHE_VERSION). Letzterer sorgt
  # dafür, dass ausgelieferte Änderungen nie in einem alten Cache hängenbleiben.
  # Hinweis: Das Projekt hat keine Dependencies/keinen Lockfile — kein npm ci nötig.
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"

      - name: Run tests
        run: npm test

      # Lint-Gate: fängt undefined-Variablen & offensichtliche Bugs (no-undef
      # = error, no-unused-vars = warn). ESLint ist KEINE Repo-Dependency
      # (Projekt bleibt laufzeit-dependency-frei) → flüchtig & versionsgepinnt
      # via npx. --max-warnings 9999 lässt die (bewusst tolerierten) Warnungen
      # durch; ein no-undef-ERROR bricht den Job (Exit 1).
      - name: Lint (ESLint, gepinnt, nicht in package.json)
        run: npx --yes eslint@9.39.0 . --max-warnings 9999

      # Coverage-Report (REPORTING, non-blocking): zeigt die Test-Abdeckung im
      # Log, ohne den Job zu blockieren (|| true). Nutzt nur Node-Bordmittel
      # (--experimental-test-coverage), keine Dependency, kein package.json-Eintrag.
      - name: Coverage (Reporting, non-blocking)
        run: node --test --experimental-test-coverage || true

      # HolaRuta.html ist nicht mehr eingecheckt (wird im deploy-Job frisch
      # gebaut). Geprüft wird nur, dass der Build sauber läuft UND der
      # committete service-worker.js (CACHE_VERSION) zum Quellcode passt.
      - name: Verify build runs and service-worker is in sync
        run: |
          node build.js
          git diff --exit-code service-worker.js

  # Browser-E2E (Playwright): prüft den „Modo profe" (Lehrer-Modus) gegen die
  # LAUFENDE App in echtem Chromium – Schüler-Import, Niveau-Verteilung,
  # Sortierung, CSV-Export (inkl. Akzent-Namen), Re-Import-Dedupe und das
  # A4-Druck-Layout (keine geklippten Spalten). Skript: scripts/e2e-modo-profe.mjs.
  #
  # Bewusst KEIN Deploy-Blocker: `deploy` hängt nur am schnellen, browserlosen
  # `test`-Job; dieser e2e-Job ist ein zusätzliches PR-/Push-Signal (browser-
  # basiert, daher etwas langsamer und potenziell seltener mal flaky).
  #
  # Playwright ist KEINE Repo-Dependency (das Projekt bleibt laufzeit-dependency-
  # frei): hier flüchtig (--no-save) und versionsgepinnt installiert.
  #
  # Bewusst schlank gehalten. Erweiterungen NUR bei konkretem Bedarf nachrüsten
  # (sonst zahlt man dauerhaft Komplexität für wenig Nutzen):
  #   • Erforderlicher Merge-Check: erst schalten, wenn der Job über ~10–20 Läufe
  #     stabil grün war (flaky Browser-Jobs als Hard-Gate blockieren sonst legitime
  #     PRs). Setzen unter Settings → Branches → Required status checks: „e2e".
  #   • Failure-Screenshots als Artefakt hochladen: erst, wenn ein rein VISUELLER
  #     Layout-Bug aus dem Log-Report allein nicht klar wird (das Skript gibt Ist/
  #     Soll bereits als Text aus). Bräuchte actions/upload-artifact – dann SHA
  #     sauber nachschlagen (Repo pinnt Actions strikt per SHA, nicht per Tag).
  #   • Browser-Caching (actions/cache auf ~/.cache/ms-playwright, Key = Playwright-
  #     Version): erst, wenn CI-Dauer/-Minuten wirklich stören.
  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"

      - name: Install Playwright (gepinnt, nicht in package.json)
        run: npm install --no-save playwright@1.56.1

      - name: Install Chromium + system deps
        run: npx playwright install --with-deps chromium

      - name: Modo-profe E2E
        run: npm run e2e

      - name: Install esbuild (gepinnt, dev-only — für dist/-Verifikation)
        run: npm install --no-save esbuild@0.28.1

      - name: Build dist (minifiziert) für Verify-Suite
        run: node build.js --dist

      - name: Ausführliche Browser-Verifikation (Root + dist)
        run: npm run e2e:verify

  deploy:
    needs: test
    # Nur bei Push auf main / manuellem Lauf deployen – NICHT bei Pull Requests.
    if: github.event_name != 'pull_request'
    # Schreibrechte für die Pages-Bereitstellung nur hier, nicht repo-weit.
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"

      # Minifizierter Multi-File-Build nach dist/: alle Modul-.js + styles.css
      # einzeln per esbuild minifiziert, index.html/SW/Manifeste/Icons/Fonts kopiert,
      # SW-Hash über die minifizierten dist-Assets gestempelt. esbuild ist KEINE
      # Repo-Runtime-Dependency – hier flüchtig (--no-save) und versionsgepinnt.
      # Fällt esbuild aus, baut build.js dist/ graceful roh (unminifiziert).
      - name: Install esbuild (gepinnt, dev-only)
        run: npm install --no-save esbuild@0.28.1

      - name: Build dist (minifiziert)
        run: node build.js --dist

      # HolaRuta.html (Einzeldatei-Download) frisch bauen und in dist/ legen, damit
      # sie unter https://<user>.github.io/holaRuta/HolaRuta.html verfügbar bleibt.
      - name: Build single-file (HolaRuta.html) into dist/
        run: |
          node build.js
          cp HolaRuta.html dist/HolaRuta.html

      - name: Configure Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0
        with:
          enablement: true # Pages beim ersten Lauf einschalten, falls noch nicht aktiv

      - name: Upload artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: ./dist # minifizierter Multi-File-Build (index.html ist die App-Startseite)

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
