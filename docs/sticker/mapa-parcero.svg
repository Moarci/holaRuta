<?xml version="1.0" encoding="utf-8"?>
<!--
  HolaRuta Hook-Sticker · Slang-Landkarte · „tu parcero tiene mil nombres"
  Hell-Variante (Cream-Grund) für Abwechslung in der Serie.
  Druckgröße: 90 × 60 mm · abgerundetes Rechteck · Terracotta-Kontur = Schnittkante.
  Quelle: jerga.js Regional-Tabelle. Für Druckereien: Text in Pfade wandeln.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="90mm" height="60mm" viewBox="0 0 900 600">
  <defs>
    <style>
      @font-face{font-family:'Bricolage Grotesque';src:url('../../fonts/bricolage-grotesque-600-800-latin.woff2') format('woff2');font-weight:600 800;}
      @font-face{font-family:'Instrument Sans';src:url('../../fonts/instrument-sans-400-700-latin.woff2') format('woff2');font-weight:400 700;}
    </style>
  </defs>
  <rect x="8" y="8" width="884" height="584" rx="48" fill="#FBF3E4" stroke="#C2502E" stroke-width="12"/>
  <text x="54" y="112" font-family="Instrument Sans, Segoe UI, Arial, sans-serif" font-size="34" font-weight="700" fill="#B97C24" letter-spacing="2">„BUDDY" EN LATINOAMÉRICA</text>
  <text x="50" y="216" font-family="Bricolage Grotesque, Segoe UI, Arial, sans-serif" font-size="98" font-weight="800" fill="#C2502E" letter-spacing="-2">parcero =</text>
  <g font-family="Bricolage Grotesque, Segoe UI, Arial, sans-serif" font-weight="800" fill="#2D1B12">
    <text x="54" y="316" font-size="52">parce</text>
    <text x="54" y="384" font-size="52">pana</text>
    <text x="54" y="452" font-size="52">güey</text>
    <text x="54" y="520" font-size="52">weón</text>
  </g>
  <g font-family="Instrument Sans, Segoe UI, Arial, sans-serif" font-weight="700" font-size="26" fill="#FBF3E4">
    <g><rect x="360" y="286" width="72" height="42" rx="21" fill="#C2502E"/><text x="396" y="315" text-anchor="middle">CO</text></g>
    <g><rect x="290" y="354" width="72" height="42" rx="21" fill="#C2502E"/><text x="326" y="383" text-anchor="middle">VE</text></g>
    <g><rect x="290" y="422" width="72" height="42" rx="21" fill="#C2502E"/><text x="326" y="451" text-anchor="middle">MX</text></g>
    <g><rect x="290" y="490" width="72" height="42" rx="21" fill="#C2502E"/><text x="326" y="519" text-anchor="middle">CL</text></g>
  </g>
  <text x="560" y="452" font-family="Bricolage Grotesque, Segoe UI, Arial, sans-serif" font-size="62" font-weight="800" fill="#2D1B12">boludo</text>
  <g font-family="Instrument Sans" font-weight="700" font-size="26" fill="#FBF3E4"><rect x="560" y="470" width="72" height="42" rx="21" fill="#3F7355"/><text x="596" y="499" text-anchor="middle">AR</text></g>
  <text x="846" y="118" font-family="Bricolage Grotesque, Segoe UI, Arial, sans-serif" font-size="30" font-weight="800" fill="#C2502E" text-anchor="end">holaruta</text>
</svg>
