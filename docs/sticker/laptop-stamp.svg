<?xml version="1.0" encoding="utf-8"?>
<!--
  HolaRuta Sticker · Laptop · „¡HOLA!-Passstempel"
  Druckgröße: Ø 45 mm · runder Schnitt. Wirkt am besten auf transparentem Vinyl
  (dann sieht der Stempel wie direkt aufs Laptop gestempelt aus) — alternativ Cream-Fläche lassen.
  Vorlage: Stempel-Badge aus docs/og/og-image.svg.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="45mm" height="45mm" viewBox="0 0 450 450">
  <defs>
    <style>
      @font-face{font-family:'Bricolage Grotesque';src:url('../../fonts/bricolage-grotesque-600-800-latin.woff2') format('woff2');font-weight:600 800;}
      @font-face{font-family:'Instrument Sans';src:url('../../fonts/instrument-sans-400-700-latin.woff2') format('woff2');font-weight:400 700;}
    </style>
  </defs>
  <g transform="rotate(-12 225 225)">
    <circle cx="225" cy="225" r="211" fill="#FBF3E4"/>
    <circle cx="225" cy="225" r="203" fill="none" stroke="#C2502E" stroke-width="12"/>
    <circle cx="225" cy="225" r="170" fill="none" stroke="#C2502E" stroke-width="7"
            stroke-opacity="0.75" stroke-dasharray="7 22"/>
    <text x="225" y="240" font-family="Bricolage Grotesque, Segoe UI, Arial, sans-serif"
          font-size="88" font-weight="800" fill="#C2502E" text-anchor="middle" letter-spacing="3">¡HOLA!</text>
    <text x="225" y="298" font-family="Instrument Sans, Segoe UI, Arial, sans-serif"
          font-size="24" font-weight="700" fill="#C2502E" fill-opacity="0.8"
          text-anchor="middle" letter-spacing="6">· BIENVENIDO ·</text>
  </g>
</svg>
