<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex" />
  <meta name="color-scheme" content="light dark" />
  <!-- Auth-Bounce-Seite: kein Nutzer-Input wird gerendert; die kleine Inline-Logik
       braucht 'unsafe-inline'. connect-src 'self' -> nur die eigene /v1-API. -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self'; img-src 'self' data:; base-uri 'none'" />
  <title>HolaRuta – Anmeldung …</title>
  <style>
    html, body { height: 100%; margin: 0; }
    body {
      display: flex; align-items: center; justify-content: center;
      font: 16px/1.5 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: #fbf6f0; color: #2d1b12;
    }
    @media (prefers-color-scheme: dark) { body { background: #1b120c; color: #f3e7dd; } }
    .box { text-align: center; padding: 24px; max-width: 22rem; }
    .spinner {
      width: 28px; height: 28px; margin: 0 auto 14px; border-radius: 50%;
      border: 3px solid rgba(150,110,80,0.3); border-top-color: #c8642d;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    a { color: #c8642d; }
  </style>
</head>
<body>
  <div class="box">
    <div class="spinner" id="spin" aria-hidden="true"></div>
    <p id="msg">Anmeldung wird abgeschlossen …</p>
    <p id="fallback" hidden><a href="/">Zurück zu HolaRuta</a></p>
  </div>
  <!-- net.js liefert SC.net.googleConfirm; standalone lauffähig (nur window + fetch). -->
  <script src="/net.js"></script>
  <script>
    (function () {
      "use strict";
      var origin = window.location.origin;
      function fail(text) {
        var s = document.getElementById("spin"); if (s) s.hidden = true;
        var m = document.getElementById("msg"); if (m) m.textContent = text || "Anmeldung fehlgeschlagen.";
        var f = document.getElementById("fallback"); if (f) f.hidden = false;
        // Ohne Zutun nach kurzer Zeit zurück zur App (dort greift das Login-Gate erneut).
        setTimeout(function () { try { window.location.replace("/"); } catch (e) {} }, 2500);
      }
      // Token AUSSCHLIESSLICH aus dem URL-Fragment lesen (Implicit-Flow von Supabase).
      // Bewusst KEIN Query-String-Fallback: ein Token im Query landet leichter in
      // Server-Logs/Browser-History und würde Hijack-Links erleichtern.
      var frag = new URLSearchParams((window.location.hash || "").replace(/^#/, ""));
      if (frag.get("error")) { fail("Anmeldung abgebrochen."); return; }
      var token = frag.get("access_token");
      // CSRF-Schutz (Login-CSRF/Account-Fixation): der über den Query-String
      // zurückgegebene `state` muss exakt dem beim Start im sessionStorage
      // hinterlegten Wert entsprechen (Bindung an den startenden Browser). Einmalig
      // -> sofort löschen. Fehlt/mismatcht er, wird NICHT eingetauscht (fail closed):
      // ein untergeschobenes fremdes Token hat hier keinen passenden state.
      var qs = new URLSearchParams((window.location.search || "").replace(/^\?/, ""));
      var got = qs.get("s") || "";
      var want = "";
      try { want = window.sessionStorage.getItem("spanischcard.oauthstate.v1") || ""; } catch (e) {}
      try { window.sessionStorage.removeItem("spanischcard.oauthstate.v1"); } catch (e) {}
      if (!token || !(window.SC && window.SC.net && window.SC.net.googleConfirm)) { fail(); return; }
      if (!want || !got || got !== want) { fail("Sicherheitsprüfung fehlgeschlagen — bitte erneut anmelden."); return; }
      window.SC.net.googleConfirm(origin, token).then(function () {
        // Token liegt jetzt in localStorage (spanischcard.synctoken.v1) -> App startet eingeloggt.
        try { window.location.replace("/"); } catch (e) { window.location.href = "/"; }
      }, function () { fail(); });
    })();
  </script>
</body>
</html>
