<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#241510" />
  <title>HolaRuta – Reise-Spanisch für echte Situationen</title>
  <meta name="description" content="HolaRuta – dein Reise-Spanisch für echte Situationen: Karteikarten mit Spaced Repetition für Bus, Hotel, Essen, Geld, Notfall und Smalltalk. Funktioniert offline." />

  <!-- Als App installierbar + offline (PWA) -->
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icon-180.png" />

  <!-- Auf dem iPhone-Homescreen wie eine native App -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="HolaRuta" />
  <meta name="mobile-web-app-capable" content="yes" />

  <!-- Schriften: Bricolage Grotesque (Display) + Instrument Sans (Text) – self-hosted
       unter fonts/ (per @font-face in styles.css, DSGVO-sauber und offline verfügbar). -->

  <!-- Theme so früh wie möglich setzen (verhindert Hell-Aufblitzen, wenn man im
       Hostel-Bett im Dunkeln öffnet). Gemerkte Wahl schlägt die System-Vorliebe. -->
  <script>
    (function () {
      try {
        var s = JSON.parse(localStorage.getItem("spanischcard.settings.v1") || "{}");
        var t = (s && (s.theme === "dark" || s.theme === "light")) ? s.theme
          : (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
        document.documentElement.dataset.theme = t;
        var m = document.querySelector('meta[name="theme-color"]');
        if (m) m.setAttribute("content", t === "dark" ? "#0E0907" : "#241510");
      } catch (e) { /* localStorage gesperrt o.ä. – App startet hell */ }
    })();
  </script>

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Creme App-Spalte auf dunkelbraunem Rahmen (Design-Signatur). -->
  <div class="appshell">
    <div class="topstripe"></div>
    <div class="appbar">
      <div class="appbar__logo" aria-hidden="true">
        <svg viewBox="0 0 512 512" role="img" aria-hidden="true">
          <defs>
            <linearGradient id="logoG" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0" stop-color="#C2502E"/>
              <stop offset="1" stop-color="#E9A23B"/>
            </linearGradient>
          </defs>
          <rect width="512" height="512" fill="url(#logoG)"/>
          <path d="M256 86 C326 86 382 142 382 212 C382 296 296 360 256 446 C216 360 130 296 130 212 C130 142 186 86 256 86 Z" fill="#FBF3E4"/>
          <text x="256" y="252" font-family="Bricolage Grotesque, Segoe UI, Arial, sans-serif" font-size="118" font-weight="800" fill="#C2502E" text-anchor="middle">¿?</text>
        </svg>
      </div>
      <div class="appbar__name">Hola<span>Ruta</span></div>
    </div>

    <!-- Hier rendert der Controller die jeweilige Ansicht hinein. -->
    <main id="app"></main>
  </div>

  <!-- Module in Abhängigkeits-Reihenfolge: erst Daten/Logik, dann View, dann Controller. -->
  <script src="contextdata.js"></script>
  <script src="data.js"></script>
  <script src="context.js"></script>
  <script src="countries.js"></script>
  <script src="srs.js"></script>
  <script src="store.js"></script>
  <script src="usercards.js"></script>
  <script src="matcher.js"></script>
  <script src="stats.js"></script>
  <script src="badges.js"></script>
  <script src="speech.js"></script>
  <script src="share.js"></script>
  <script src="install.js"></script>
  <script src="changelog.js"></script>
  <script src="ui.js"></script>
  <script src="app.js"></script>
</body>
</html>
