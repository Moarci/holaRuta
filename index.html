  <!-- Schriften: Bricolage Grotesque (Display) + Instrument Sans (Text) – self-hosted
       unter fonts/ (per @font-face in styles.css, DSGVO-sauber und offline verfügbar). -->

  <!-- Die zwei beim ersten Paint sichtbaren Schriften vorladen (Logo/Überschriften =
       Bricolage Grotesque, Fließtext = Instrument Sans), damit sie nicht erst nach dem
       CSS-Parsen angefragt werden. crossorigin ist bei Font-Preload Pflicht (Fonts
       laden anonym), sonst lädt der Browser die Datei doppelt. -->
  <link rel="preload" as="font" type="font/woff2" crossorigin href="fonts/bricolage-grotesque-600-800-latin.woff2" />
  <link rel="preload" as="font" type="font/woff2" crossorigin href="fonts/instrument-sans-400-700-latin.woff2" />

  <!-- Boot-Schritte (Theme vor dem ersten Paint, Splash-Animation/-Ausblenden):
       bewusst als EXTERNES, parser-blockendes Skript ohne defer – so kommt die
       CSP unten ohne script-src 'unsafe-inline' aus. Muss VOR styles.css stehen
       (Theme vor Paint, kein Hell-Aufblitzen im Dunkeln). Details in boot.js. -->
  <script src="boot.js"></script>

  <link rel="stylesheet" href="styles.css" />

  <!-- Sicherheits-Header. script-src ist 'self' OHNE 'unsafe-inline': alle Skripte
       (inkl. der Boot-Schritte, siehe boot.js) sind extern – Inline-Skripte würden
       geblockt. Nur der Single-File-Build (HolaRuta.html) braucht Inline-Skripte;
       build.js patcht dort 'unsafe-inline' wieder in die CSP (mit hartem Fehler,
       falls die Direktive hier umformuliert wird).
       style-src behält 'unsafe-inline': ui.js rendert Dutzende style="…"-Attribute
       in Template-Strings, die nicht hash-bar sind (eine Aufteilung in style-src-elem
       'self' + style-src-attr 'unsafe-inline' brächte kaum Gewinn, da zur Laufzeit
       keine <style>-Elemente erzeugt werden).
       img-src erlaubt nur self + data: + Wikimedia (Kulturbilder); connect-src 'self'
       (opt-in-Sync ist im Default aus -> kein fremder Host; eine Edition mit
       cross-origin-apiBase muesste ihren Sync-Host hier ergaenzen); referrer
       no-referrer verhindert Leakage.
       Clickjacking: frame-ancestors wirkt NUR als HTTP-Header, nicht als <meta>-CSP
       (Browser ignorieren es dort) – GitHub Pages kann keine Header setzen, ein
       Frame-Schutz ist auf diesem Hosting daher nicht erreichbar. -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; img-src 'self' data: https://upload.wikimedia.org https://commons.wikimedia.org; style-src 'self' 'unsafe-inline'; font-src 'self'; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'" />
  <meta name="referrer" content="no-referrer" />

  <!-- Strukturierte Daten (schema.org): Organization + WebSite + SoftwareApplication.
       KEIN Widerspruch zur strengen CSP oben (script-src 'self' ohne 'unsafe-inline'):
       ein <script type="application/ld+json"> ist laut HTML-Spec kein ausführbares
       Skript, sondern ein reiner Datenblock – Browser wenden script-src-CSP nur auf
       ausführbaren JS-Code an, nicht auf JSON-LD. Werte hier synchron zu landing.html
       halten. -->
  <script type="application/ld+json">
  [
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "@id": "https://moarci.github.io/holaRuta/#organization",
      "name": "HolaRuta",
      "url": "https://moarci.github.io/holaRuta/",
      "email": "hola@holaruta.app",
      "logo": "https://moarci.github.io/holaRuta/icon-512.png",
      "sameAs": ["https://github.com/Moarci/holaRuta"]
    },
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "@id": "https://moarci.github.io/holaRuta/#website",
      "name": "HolaRuta",
      "url": "https://moarci.github.io/holaRuta/",
      "inLanguage": "de_DE",
      "publisher": { "@id": "https://moarci.github.io/holaRuta/#organization" }
    },
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "@id": "https://moarci.github.io/holaRuta/#app",
      "name": "HolaRuta",
      "description": "Reise-Spanisch für echte Situationen – Karteikarten mit Spaced Repetition für Bus, Hotel, Essen, Geld, Notfall und Smalltalk. Offline, kostenlos, ohne Konto.",
      "url": "https://moarci.github.io/holaRuta/",
      "applicationCategory": "EducationalApplication",
      "operatingSystem": "Web, Android, iOS",
      "inLanguage": "de_DE",
      "offers": { "@type": "Offer", "price": "0", "priceCurrency": "EUR" },
      "publisher": { "@id": "https://moarci.github.io/holaRuta/#organization" }
    }
  ]
  </script>

<body>

       um die App-Bar zu überspringen und direkt zum Inhalt (main#app) zu springen.
       Standardmäßig per CSS (.skip-link) ausgeblendet, erst bei :focus sichtbar. -->
  <a href="#app" class="skip-link">Zum Inhalt springen</a>

       der jetzt dasselbe Marken-Braun zeigt – und blendet weg, sobald die App

       kollidiert. aria-hidden: rein dekorativ, Screenreader überspringen ihn. -->

        <defs>
          <linearGradient id="bootLogoG" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#C2502E"/>
            <stop offset="1" stop-color="#E9A23B"/>
          </linearGradient>
        </defs>
        <rect width="512" height="512" fill="url(#bootLogoG)"/>
        <path d="M256 86 C326 86 382 142 382 212 C382 296 296 360 256 446 C216 360 130 296 130 212 C130 142 186 86 256 86 Z" fill="#FBF3E4"/>
        <text x="256" y="252" font-family="Bricolage Grotesque, Segoe UI, Arial, sans-serif" font-size="118" font-weight="800" fill="#C2502E" text-anchor="middle">¿?</text>
      </svg>
    </div>
    <div class="boot__name">Hola<span>Ruta</span></div>
    <div class="boot__bar"></div>
  </div>
  <!-- Schrumpf-Animation und Splash-Ausblenden steuert boot.js (Abschnitte 2+3,
       am load-Event – Begründung dort). Früher zwei Inline-Skripte; ausgelagert,
       damit die CSP oben ohne script-src 'unsafe-inline' auskommt. -->

  <!-- Geteilte „Farb"-Filter für den AM/PM-Umschalter (Kaffee hell · Wein dunkel).
       Einmal im Dokument definiert, von den Schild-SVGs per url(#…) referenziert –
       fehlen sie, würden die bemalten Formen laut SVG-Spec gar nicht erst gezeichnet. -->
  <svg width="0" height="0" aria-hidden="true" style="position:absolute" focusable="false">
    <filter id="signPaint" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018 0.022" numOctaves="3" seed="11" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="3.2" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="signGrain">
      <feTurbulence type="fractalNoise" baseFrequency="0.7" numOctaves="2" seed="4" result="g"/>
      <feColorMatrix in="g" type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.06"/></feComponentTransfer>
      <feComposite operator="over" in2="SourceGraphic"/>
    </filter>
  </svg>

  <!-- Creme App-Spalte auf dunkelbraunem Rahmen (Design-Signatur). -->

    <div class="topstripe"></div>
    <div class="appbar">
      <div class="appbar__logo" aria-hidden="true">
        <svg viewBox="0 0 512 512" role="img" aria-hidden="true">

              <stop offset="0" stop-color="#C2502E"/>
              <stop offset="1" stop-color="#E9A23B"/>
            </linearGradient>
          </defs>
          <rect width="512" height="512" fill="url(#logoG)"/>
          <path d="M256 86 C326 86 382 142 382 212 C382 296 296 360 256 446 C216 360 130 296 130 212 C130 142 186 86 256 86 Z" fill="#FBF3E4"/>
          <text x="256" y="252" font-family="Bricolage Grotesque, Segoe UI, Arial, sans-serif" font-size="118" font-weight="800" fill="#C2502E" text-anchor="middle">¿?</text>
        </svg>
      </div>
      <div class="appbar__name">Hola<span>Ruta</span></div>
    </div>

    <!-- Hier rendert der Controller die jeweilige Ansicht hinein. -->
    <main id="app" tabindex="-1"></main>
  </div>
