<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#241510" />
  <title>HolaRuta – Reise-Spanisch für echte Situationen</title>
  <meta name="description" content="HolaRuta – dein Reise-Spanisch für echte Situationen: Karteikarten mit Spaced Repetition für Bus, Hotel, Essen, Geld, Notfall und Smalltalk. Funktioniert offline." />

  <!-- Als App installierbar + offline (PWA) -->
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icon.svg" />

  <!-- Auf dem iPhone-Homescreen wie eine native App -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="HolaRuta" />
  <meta name="mobile-web-app-capable" content="yes" />

  <!-- Schriften: Bricolage Grotesque (Display) + Instrument Sans (Text). Offline
       greift automatisch der System-Fallback aus der CSS. -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Creme App-Spalte auf dunkelbraunem Rahmen (Design-Signatur). -->
  <div class="appshell">
    <div class="topstripe"></div>
    <div class="appbar">
      <div class="appbar__logo" aria-hidden="true">🌶️</div>
      <div class="appbar__name">Hola<span>Ruta</span></div>
    </div>

    <!-- Hier rendert der Controller die jeweilige Ansicht hinein. -->
    <main id="app"></main>
  </div>

  <!-- Module in Abhängigkeits-Reihenfolge: erst Daten/Logik, dann View, dann Controller. -->
  <script src="data.js"></script>
  <script src="countries.js"></script>
  <script src="srs.js"></script>
  <script src="store.js"></script>
  <script src="usercards.js"></script>
  <script src="matcher.js"></script>
  <script src="stats.js"></script>
  <script src="speech.js"></script>
  <script src="share.js"></script>
  <script src="ui.js"></script>
  <script src="app.js"></script>
</body>
</html>
