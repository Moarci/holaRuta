  <!-- Schriften: Bricolage Grotesque (Display) + Instrument Sans (Text) – self-hosted
       unter fonts/ (per @font-face in styles.css, DSGVO-sauber und offline verfügbar). -->

  <!-- Die zwei beim ersten Paint sichtbaren Schriften vorladen (Logo/Überschriften =
       Bricolage Grotesque, Fließtext = Instrument Sans), damit sie nicht erst nach dem
       CSS-Parsen angefragt werden. crossorigin ist bei Font-Preload Pflicht (Fonts
       laden anonym), sonst lädt der Browser die Datei doppelt. -->
  <link rel="preload" as="font" type="font/woff2" crossorigin href="fonts/bricolage-grotesque-600-800-latin.woff2" />
  <link rel="preload" as="font" type="font/woff2" crossorigin href="fonts/instrument-sans-400-700-latin.woff2" />

  <!-- Theme so früh wie möglich setzen (verhindert Hell-Aufblitzen, wenn man im
       Hostel-Bett im Dunkeln öffnet). Gemerkte Wahl schlägt die System-Vorliebe.
       Der OS-PWA-Splash wird aus dem Manifest-background_color gemalt – und Android
       friert genau eine Farbe beim Installieren ein (keine Media-Query, kein Wechsel
       zur Laufzeit). Darum ist background_color in BEIDEN Manifesten das dunkle
       Marken-Braun (#241510): blendet nie, im Hellmodus bewusster Marken-Splash.
       Im Dark Mode hängen wir trotzdem auf das dunkle Manifest um – das verfeinert
       nur noch die theme_color (Toolbar/Statusleiste) der installierten App. -->
  <script>
    (function () {
      window.__bootStart = Date.now(); // Startzeit für den In-App-Splash (Mindestdauer)
      try {
        var s = JSON.parse(localStorage.getItem("spanischcard.settings.v1") || "{}");
        var t = (s && (s.theme === "dark" || s.theme === "light")) ? s.theme
          : (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
        document.documentElement.dataset.theme = t;
        var m = document.querySelector('meta[name="theme-color"]');
        if (m) m.setAttribute("content", t === "dark" ? "#0E0907" : "#241510");
        var man = document.querySelector('link[rel="manifest"]');
        if (man) man.setAttribute("href", t === "dark" ? "manifest-dark.webmanifest" : "manifest.webmanifest");
      } catch (e) { /* localStorage gesperrt o.ä. – App startet hell */ }
    })();
  </script>

  <link rel="stylesheet" href="styles.css" />

  <!-- Sicherheits-Header. Bewusst KEIN restriktives script-src: der Single-File-Build
       (HolaRuta.html) inlined ~50 Skripte und ui.js baut Dutzende Inline-style-Attribute,
       die nicht hash-bar sind. Der reale Schutz liegt hier auf Bild-/Verbindungszielen &
       Referrer: img-src erlaubt nur self + data: + Wikimedia (Kulturbilder); connect-src
       'self' (opt-in-Sync ist im Default aus -> kein fremder Host; eine Edition mit
       cross-origin-apiBase muesste ihren Sync-Host hier ergaenzen); frame-ancestors 'none'
       schuetzt vor Clickjacking; referrer no-referrer verhindert Leakage.
       script-src ist explizit 'self' 'unsafe-inline' (NICHT restriktiv): ohne diese
       Direktive wuerde default-src 'self' Inline-Skripte verbieten und damit Theme-Boot,
       Boot-Animation, Splash sowie den kompletten Single-File-Build (~50 inline Skripte)
       brechen. Inline-Skripte sind hier kein Angriffsvektor (keine User-HTML-Injektion). -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; img-src 'self' data: https://upload.wikimedia.org https://commons.wikimedia.org; style-src 'self' 'unsafe-inline'; font-src 'self'; connect-src 'self'; base-uri 'self'" />
  <meta name="referrer" content="no-referrer" />

  <!-- Animierter In-App-Start: liegt auf var(--page) – nahtlos am OS-PWA-Splash,
       der jetzt dasselbe Marken-Braun zeigt – und blendet weg, sobald die App
       steht. Nur beim echten Kaltstart sichtbar; In-Session-Navigation lädt nicht

       kollidiert. aria-hidden: rein dekorativ, Screenreader überspringen ihn. -->

        <path d="M256 86 C326 86 382 142 382 212 C382 296 296 360 256 446 C216 360 130 296 130 212 C130 142 186 86 256 86 Z" fill="#FBF3E4"/>
        <text x="256" y="252" font-family="Bricolage Grotesque, Segoe UI, Arial, sans-serif" font-size="118" font-weight="800" fill="#C2502E" text-anchor="middle">¿?</text>

    <div class="boot__bar"></div>
  </div>
  <!-- Schrumpf-Animation erst beim load-Event loslassen – NICHT schon beim Parsen.
       Hintergrund: als installierte PWA zeigt das System zuerst seinen eigenen
       Start-Bildschirm und übergibt erst beim ersten Paint an die echte Seite.
       Würde die Animation (wie früher) schon ein paar Frames nach den Skripten
       starten, liefe sie noch WÄHREND dieser Übergabe – und weil CSS-Animationen
       nach Wanduhr-Zeit laufen, wäre das Logo beim ersten sichtbaren Frame längst
       fast klein. Genau das „Springen". load feuert erst NACH dem ersten Paint,
       also wenn der Nutzer den großen Start-Frame (scale 2.8) wirklich sieht;
       die zwei requestAnimationFrame stellen sicher, dass dieser große Frame
       präsentiert ist, bevor das Schrumpfen losgeht. __bootStart wird hier
       gesetzt, damit die Mindest-Anzeigedauer ab diesem sichtbaren Start zählt. -->
  <script>
    (function () {
      var boot = document.getElementById("boot");
      if (!boot) return;
      var started = false;
      function go() {
        if (started) return; // load + Fallback-Timeout dürfen sich nicht doppeln
        started = true;
        window.__bootStart = Date.now();
        if (window.requestAnimationFrame) {
          requestAnimationFrame(function () {
            requestAnimationFrame(function () { boot.classList.add("is-ready"); });
          });
        } else { boot.classList.add("is-ready"); }
      }
      if (document.readyState === "complete") go();
      else window.addEventListener("load", go, { once: true });
      // Notnagel: hängt eine Ressource, soll das Logo trotzdem schrumpfen statt
      // groß einzufrieren. 3 s liegt klar nach dem normalen load, stört also nie.
      setTimeout(go, 3000);
    })();
  </script>

  <!-- Geteilte „Farb"-Filter für den AM/PM-Umschalter (Kaffee hell · Wein dunkel).
       Einmal im Dokument definiert, von den Schild-SVGs per url(#…) referenziert –
       fehlen sie, würden die bemalten Formen laut SVG-Spec gar nicht erst gezeichnet. -->
  <svg width="0" height="0" aria-hidden="true" style="position:absolute" focusable="false">
    <filter id="signPaint" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018 0.022" numOctaves="3" seed="11" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="3.2" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="signGrain">
      <feTurbulence type="fractalNoise" baseFrequency="0.7" numOctaves="2" seed="4" result="g"/>
      <feColorMatrix in="g" type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.06"/></feComponentTransfer>
      <feComposite operator="over" in2="SourceGraphic"/>
    </filter>
  </svg>

  <!-- Start-Splash wegblenden, sobald die App steht – aber mind. ~1,9 s zeigen,
       damit Schrumpfen/Aufstieg/Regenbogen-Wisch fertig landen und kurz stehen, statt
       abgeschnitten wegzublitzen (__bootStart wird ganz oben gesetzt).
       Läuft als eigenes <script> NACH app.js: selbst wenn app.js wirft, blendet
       der Splash beim load-Event verlässlich weg und blockiert nie die App. -->
  <script>
    (function () {
      var boot = document.getElementById("boot");
      if (!boot) return;
      // Mindest-Anzeigedauer: muss die GESAMTE Boot-Animation abdecken, sonst
      // blendet der Splash weg, bevor man etwas sieht. Die Spuren enden (relativ
      // zum is-ready-Start) bei: Schrumpfen 1,15 s · Name-Aufstieg 0,78 + 0,55 =
      // 1,33 s · Regenbogen-Wisch 0,92 + 0,8 = 1,72 s. Bei 800 ms (alter Wert)
      // startete der Wisch nie und der Name blitzte nur kurz auf – die Animation
      // wirkte „kaputt". 1900 ms lässt alle drei landen + kurz stehen. Bei
      // prefers-reduced-motion sofort weg (0 ms) – keine erzwungene Wartezeit.
      var reduce = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      var MIN = reduce ? 0 : 1900;
      var start = window.__bootStart || Date.now();
      function done() { boot.classList.add("is-done"); }
      function hide() {
        var wait = Math.max(0, MIN - (Date.now() - start));
        setTimeout(function () {
          boot.classList.add("is-hiding");
          boot.addEventListener("transitionend", done, { once: true });
          setTimeout(done, 700); // Fallback, falls transitionend ausbleibt
        }, wait);
      }
      if (document.readyState === "complete") hide();
      else window.addEventListener("load", hide, { once: true });
    })();
  </script>
