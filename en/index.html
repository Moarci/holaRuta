<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HolaRuta · Inglés</title>
  <!-- Einfache, teilbare URL für die Englisch-Lern-Sektion (Locals-Track, es-en).
       Leitet auf die App mit der Edition „ingles-pro" weiter. Reiner Redirect:
       die App liegt seit dem Host-Rewrite in vercel.json auf app.holaruta.com,
       nicht mehr unter ../ - deshalb absolute URL statt relativem Pfad.
       Bewusst OHNE Inline-Skript (früher location.replace): der Meta-Refresh mit
       0 s erledigt die Weiterleitung – Browser überspringen solche Sofort-Redirects
       in der Zurück-Navigation ohnehin – und erlaubt eine CSP mit script-src 'none'. -->
  <link rel="canonical" href="https://app.holaruta.com/?edition=ingles-pro" />
  <meta name="robots" content="noindex, follow" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; base-uri 'none'; form-action 'none'; script-src 'none'" />
  <meta http-equiv="refresh" content="0; url=https://app.holaruta.com/?edition=ingles-pro" />
  <style>
    html, body { height: 100%; margin: 0; }
    body { display: grid; place-items: center; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
           background: #1F7A8C; color: #fff; text-align: center; padding: 1.5rem; }
    a { color: #fff; }
  </style>
</head>
<body>
  <!-- Sichtbarer Fallback, falls der Meta-Refresh nicht greift (Reader-Modus o.ä.). -->
  <main>
    <p>HolaRuta · Inglés</p>
    <p><a href="https://app.holaruta.com/?edition=ingles-pro">Abrir / Open →</a></p>
  </main>
</body>
</html>
