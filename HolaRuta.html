.sl-item__detail { padding: 0 16px 16px 50px; display: flex; flex-direction: column; gap: 8px; }
.sl-item__estop { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.sl-item__es {
  margin: 0; font-family: var(--font-display); font-weight: 800;
  font-size: 1.5rem; line-height: 1.1; letter-spacing: -0.01em; color: var(--brand-ink);
}
.sl-item__tip { margin: 0; font-size: 0.9rem; font-weight: 700; color: var(--ink-soft); }
.sl-item__note { margin: 0; font-size: 0.9rem; line-height: 1.5; color: var(--muted); }
.sl-speak { position: static; flex: none; }
.sl-quizbtn { margin-top: 4px; }

/* Listen-Auswahl: Intro-Zeile unter dem Titel. */
.quiz-set__intro { display: block; margin-top: 3px; font-size: 0.8rem; font-weight: 400; color: var(--muted); line-height: 1.35; }
.quiz-lvl { font-size: 0.72rem; font-weight: 800; color: var(--muted); }

/* Frage-Zähler über der Definition (Pille, mittig). */
.quiz-count { display: block; width: fit-content; margin: 0 auto; }

/* Definitionskarte (die "Frage"). */
.quiz-def {
  background: var(--card); border: 1.5px solid var(--line); border-radius: var(--r-lg);
  padding: 20px 20px 22px; box-shadow: var(--shadow); border-left: 4px solid var(--brand);
}
.quiz-def__cap { display: block; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); }
.quiz-def__text { margin: 6px 0 0; font-family: var(--font-display); font-weight: 700; font-size: 1.25rem; line-height: 1.3; color: var(--ink); }

/* Antwort-Optionen. */
.quiz-opts { display: flex; flex-direction: column; gap: 10px; }
.quiz-opt {
  display: flex; align-items: center; gap: 12px; width: 100%; cursor: pointer; text-align: left;
  padding: 13px 15px; border-radius: var(--r-md); background: var(--card);
  border: 1.5px solid var(--line); border-bottom-width: 3px; box-shadow: var(--shadow);
  color: var(--ink); transition: transform 0.12s ease, border-color 0.12s ease, background 0.12s ease;
}
.quiz-opt:active { transform: translateY(1px); border-bottom-width: 1.5px; }
.quiz-opt[disabled] { cursor: default; }
.quiz-opt__icon { font-size: 1.5rem; line-height: 1; flex: none; }
.quiz-opt__text { display: flex; flex-direction: column; gap: 1px; flex: 1 1 auto; min-width: 0; }
.quiz-opt__es { font-family: var(--font-display); font-weight: 700; font-size: 1.05rem; color: var(--ink); }
.quiz-opt__de { font-size: 0.8rem; color: var(--muted); }
.quiz-opt__mark { flex: none; font-weight: 800; font-size: 1.1rem; }

/* Aufgedeckter Zustand: richtige Lösung grün, falsche Wahl rot, Rest gedämpft. */
.quiz-opt--correct { border-color: var(--ok); border-bottom-color: var(--ok); background: color-mix(in srgb, var(--ok) 14%, var(--card)); }
.quiz-opt--correct .quiz-opt__es,
.quiz-opt--correct .quiz-opt__mark { color: var(--ok); }
.quiz-opt--wrong { border-color: var(--no); border-bottom-color: var(--no); background: color-mix(in srgb, var(--no) 14%, var(--card)); }
.quiz-opt--wrong .quiz-opt__es,
.quiz-opt--wrong .quiz-opt__mark { color: var(--no); }
.quiz-opt--dim { opacity: 0.55; }

/* Rückmeldung nach der Antwort. */
.quiz-feedback {
  width: 100%; text-align: center; border-radius: var(--r-md); padding: 12px 16px;
  border: 1.5px solid var(--line); display: flex; flex-direction: column; gap: 4px;
}
.quiz-feedback.is-correct { border-color: var(--ok); background: color-mix(in srgb, var(--ok) 12%, var(--card)); }
.quiz-feedback.is-wrong { border-color: var(--no); background: color-mix(in srgb, var(--no) 12%, var(--card)); }
.quiz-feedback__head { font-family: var(--font-display); font-weight: 800; font-size: 1.05rem; }
.quiz-feedback.is-correct .quiz-feedback__head { color: var(--ok); }
.quiz-feedback.is-wrong .quiz-feedback__head { color: var(--no); }
.quiz-feedback__sol { font-size: 0.9rem; color: var(--ink-soft); line-height: 1.4; }
.quiz-feedback__sol b { color: var(--brand-ink); }

/* Auswertung. */
.quiz-result { margin: 4px 0; color: var(--ink-soft); font-size: 1.05rem; }
.quiz-result b { font-family: var(--font-display); font-size: 1.4rem; color: var(--ink); font-variant-numeric: tabular-nums; }

/* Reduced-Motion: keine Transition-Sprünge. */
@media (prefers-reduced-motion: reduce) {
  .quiz-opt { transition: none; }
}

/* ====================== FRASES FLEXIBLES (Satzbaukasten) ====================== */
/* Deutscher Zielsatz (was gebaut werden soll) über dem spanischen Rahmen. */
.frases-target { margin: 4px 0 8px; font-size: 0.92rem; color: var(--muted); }
.frases-frame { display: flex; flex-wrap: wrap; align-items: baseline; gap: 0 6px; }
/* Die Lücke "___" als sichtbarer, akzentuierter Platzhalter. */
.frases-gap {
  display: inline-block; min-width: 64px; height: 2px; margin: 0 2px 5px;
  border-bottom: 3px dashed var(--brand); vertical-align: middle;
}
/* "Gemischt"-Kachel in der Themen-Auswahl: abgesetzt, damit sie als Sammel-Option
   sofort erkennbar ist (gestrichelter Markenrahmen wie die Ruta-del-día-Karte). */
.hm-scene--mixed {
  border: 1.5px dashed color-mix(in srgb, var(--brand) 50%, var(--line-strong));
  background: color-mix(in srgb, var(--brand) 7%, var(--surface));
}

/* ====================== HÖR-MODUS (Escuchar / Dictado) ====================== */
/* Drei-Spalten-Variante des Modus-Umschalters (Sprechen · Schreiben · Hören). */
.segmented--three { grid-template-columns: 1fr 1fr 1fr; }
.segmented--three .seg { padding: 10px 6px; font-size: 0.86rem; }

/* Hör-Karte vor der Antwort: großes Ohr + Replay, Text bleibt verborgen. */
.card-listen { gap: 14px; }
.listen-ear { font-size: 3.4rem; line-height: 1; }
.listen-replay { margin: 0; }
/* Deutsche Bedeutung als Verständnis-Hilfe auf der aufgedeckten Hör-Ergebnis-Karte. */
.listen-de { margin-top: 6px; font-size: 0.95rem; color: var(--muted); }
/* Aussprache-Tipp ist cremefarben (für die bunte Flip-Rückseite gedacht) – auf der
   hellen Ergebnis-Karte (Schreiben & Hören) sonst unsichtbar. Hier dunkel einfärben. */
.card-static .face__tip { color: var(--ink-soft); }

/* ====================== RUTA DEL DÍA + STRECKENKARTE ====================== */
/* Ruta-del-día-Button in der Heute-Karte (zweizeilig, einladend). */
.today__ruta {
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  border: 1.5px dashed color-mix(in srgb, var(--brand) 45%, var(--line-strong));
  background: color-mix(in srgb, var(--brand) 7%, var(--surface)); color: var(--brand-ink);
  cursor: pointer; padding: 11px 14px; border-radius: var(--r-md); box-shadow: var(--shadow);

.today__ruta:active { transform: translateY(1px); }
.today__ruta-main { font-family: var(--font-display); font-weight: 800; font-size: 1.02rem; }
.today__ruta-sub { font-size: 0.78rem; font-weight: 600; color: var(--muted); }

/* Streckenkarte (Statistik): Lernfortschritt als Bus-Strecke. */
.route {
  background: var(--card); border: 1.5px solid var(--line); border-radius: var(--r-lg);
  padding: 16px 18px 18px; box-shadow: var(--shadow);
}
.route__head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 26px; }
.route__cap { font-family: var(--font-display); font-weight: 800; font-size: 1rem; color: var(--ink); }
.route__pct { font-size: 0.82rem; font-weight: 800; color: var(--ok); font-variant-numeric: tabular-nums; }
.route__track { position: relative; height: 4px; border-radius: 999px; background: rgba(45, 27, 18, 0.12); margin: 0 9px; }
.route__fill { position: absolute; inset: 0 auto 0 0; height: 100%; border-radius: 999px; background: var(--ok); }
.route__bus { position: absolute; top: -23px; transform: translateX(-50%); font-size: 1.2rem; transition: left 0.4s ease; }
/* Haltestellen-Punkte auf der Linie */
.route__node {
  position: absolute; top: 50%; width: 11px; height: 11px;
  transform: translate(-50%, -50%); border-radius: 50%;
  background: var(--card); border: 2px solid var(--line-strong);
}
.route__node.is-learn { border-color: var(--warn); }
.route__node.is-master { border-color: var(--ok); }
/* Beschriftung im normalen Fluss unter der Linie – kollidiert nie. */
.route__stops { display: flex; justify-content: space-between; gap: 8px; margin-top: 16px; }
.route__stop { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
.route__stop.is-new { align-items: flex-start; text-align: left; }
.route__stop.is-learn { align-items: center; text-align: center; }
.route__stop.is-master { align-items: flex-end; text-align: right; }
.route__n { font-family: var(--font-display); font-weight: 800; font-size: 1.05rem; color: var(--ink); font-variant-numeric: tabular-nums; }
.route__lbl { font-size: 0.7rem; font-weight: 600; color: var(--muted); white-space: nowrap; }
@media (prefers-reduced-motion: reduce) { .route__bus { transition: none; } }

/* ====================== SPICKZETTEL (Survival-Schnellzugriff) ====================== */
.sz-group { margin-top: 18px; }

.sz-row__tip { margin-top: 2px; font-size: 0.8rem; font-style: italic; color: var(--ink-soft); }
.sz-speak {

  border: 1.5px solid var(--line-strong); background: var(--surface); font-size: 1.15rem;
  display: flex; align-items: center; justify-content: center;

.sz-speak:active { transform: scale(0.92); }

    zp02: { e: "Una cerveza. – Son doce mil.", d: "Ein Bier. – Das macht 12.000.", s: "In der Bar oder im Restaurant.", n: "Trinkgeld (propina) steht oft schon auf der Rechnung." },
    zp03: { e: "El menú del día cuesta veinticinco mil.", d: "Das Tagesmenü kostet 25.000.", s: "Beim Mittagessen (almuerzo).", n: "Das menú del día hat fast überall das beste Preis-Leistungs-Verhältnis." },
    zp04: { e: "La cama cuesta cuarenta y cinco mil por noche.", d: "Das Bett kostet 45.000 pro Nacht.", s: "Beim Check-in im Hostel.", n: "Frag, ob Frühstück inklusive ist: ¿El desayuno está incluido?" },
    zp05: { e: "El boleto a Medellín cuesta ciento veinte mil.", d: "Das Ticket nach Medellín kostet 120.000.", s: "Beim Ticketkauf am Busbahnhof.", n: "Nachtbusse sind oft teurer, sparen aber eine Hostel-Nacht." },
    zp06: { e: "La excursión cuesta trescientos cincuenta mil por persona.", d: "Der Ausflug kostet 350.000 pro Person.", s: "Beim Buchen einer Tour.", n: "Bei Gruppen oft Rabatt – frag: ¿Hay descuento por grupo?" },
    zp07: { e: "El alquiler es un millón quinientos mil al mes.", d: "Die Miete beträgt 1.500.000 pro Monat.", s: "Wenn du länger bleibst und etwas mietest.", n: "Für längere Aufenthalte lohnt es sich, über den Monatspreis zu verhandeln." },
    znum: { e: "¿Cuál es el número de tu habitación?", d: "Welche Nummer hat dein Zimmer?", s: "Im Hostel/Hotel, bei Bett- oder Zimmernummer.", n: "número steht auch für die Telefonnummer: tu número." },
    zmilord: { e: "Cuesta más de un millón de pesos.", d: "Es kostet über eine Million Pesos.", s: "Bei großen Beträgen wie Miete oder Flug.", n: "Achtung Grammatik: un millón de pesos, mit de." },
    zmitad: { e: "Solo quiero la mitad, por favor.", d: "Ich möchte nur die Hälfte, bitte.", s: "Auf dem Markt oder beim Bestellen von Portionen.", n: "medio kilo = ein halbes Kilo; la mitad = die Hälfte von etwas." },
    zo01: { e: "Es la primera vez que vengo aquí.", d: "Es ist das erste Mal, dass ich hier bin.", s: "Im Smalltalk über deine Reise.", n: "Vor männlichem Nomen wird primero zu primer: el primer día." },
    zo02: { e: "Mi cuarto está en el segundo piso.", d: "Mein Zimmer ist im zweiten Stock.", s: "Beim Finden des Zimmers.", n: "In LatAm ist el primer piso meist die erste Etage über dem Erdgeschoss." },
    zo03: { e: "Bájate en la tercera parada.", d: "Steig an der dritten Haltestelle aus.", s: "Beim Busfahren mit Wegbeschreibung.", n: "Vor männlichem Nomen wird tercero zu tercer: el tercer piso." },
    zo04: { e: "Es la cuarta calle a la derecha.", d: "Es ist die vierte Straße rechts.", s: "Bei einer Wegbeschreibung.", n: "cuarto heißt auch Zimmer – aus dem Kontext meist klar." },
    zo05: { e: "Vivo en el quinto piso.", d: "Ich wohne im fünften Stock.", s: "Bei Adressen und Stockwerken.", n: "Gibt es einen Aufzug? Frag: ¿Hay ascensor?" },
    zo06: { e: "El mirador está en el sexto piso.", d: "Die Aussichtsplattform ist im sechsten Stock.", s: "In Hotels oder Aussichtstürmen.", n: "sexto wird in LatAm oft vereinfacht 'ses-to' gesprochen." },
    zo07: { e: "Mi habitación es la séptima puerta.", d: "Mein Zimmer ist die siebte Tür.", s: "Bei der Zimmersuche im Flur.", n: "Das p in séptimo wird oft kaum gesprochen: SE-ti-mo." },
    zo08: { e: "La fiesta es en el octavo piso.", d: "Die Party ist im achten Stock.", s: "Bei Rooftop-Bars oder Events.", n: "Ordnungszahlen über 10 nutzt man im Alltag kaum noch." },
    zo09: { e: "Estamos en el noveno día de viaje.", d: "Wir sind am neunten Reisetag.", s: "Im Gespräch über die Reisedauer.", n: "Ab 11 sagt man im Alltag meist die normale Zahl statt der Ordnungszahl." },
    zo10: { e: "Es mi décimo país en este viaje.", d: "Es ist mein zehntes Land auf dieser Reise.", s: "Beim Erzählen über deine Route.", n: "Danach wird es selten: für höhere Zahlen nimmt man die normale Zahl." },
    zo1f: { e: "Es mi primera vez en Sudamérica.", d: "Es ist mein erstes Mal in Südamerika.", s: "Im Smalltalk über die Reise.", n: "primera ist die weibliche Form von primero (la primera vez)." },
    zopiso: { e: "Mi habitación está en el primer piso.", d: "Mein Zimmer ist im ersten Stock.", s: "Beim Finden des Zimmers im Hostel/Hotel.", n: "In vielen Ländern ist el primer piso die Etage über dem Erdgeschoss (planta baja)." },

    // ===================== ESSEN =====================
    e01: { e: "¿A qué hora es la comida?", d: "Wann gibt es Essen?", s: "Im Hostel mit Verpflegung oder bei einer Tour.", n: "comida heißt Essen allgemein, in Mexiko oft speziell das Mittagessen." },
    e02: { e: "Tengo hambre, ¿vamos a comer algo?", d: "Ich habe Hunger, gehen wir etwas essen?", s: "Wenn du mit anderen Pläne machst.", n: "Großer Hunger: Tengo mucha hambre." },
    e03: { e: "¿Me trae la carta, por favor?", d: "Bringen Sie mir die Karte, bitte?", s: "Beim Hinsetzen im Restaurant.", n: "la carta ist die Speisekarte; el menú oft das feste Tagesmenü." },
    e05: { e: "Soy vegetariano, ¿qué me recomienda?", d: "Ich bin Vegetarier, was empfehlen Sie?", s: "Beim Bestellen.", n: "Frauen sagen vegetariana. Sicherheitshalber: ¿Tiene algo sin carne?" },
    e06: { e: "Algo sin carne, por favor.", d: "Etwas ohne Fleisch, bitte.", s: "Beim Bestellen, wenn du fleischlos isst.", n: "Achtung: pollo (Hähnchen) zählt für viele nicht als carne – extra nachfragen." },
    e07: { e: "¿Me trae un poco de pan?", d: "Bringen Sie mir etwas Brot?", s: "Im Restaurant oder beim Frühstück.", n: "In der panadería (Bäckerei) einfach zeigen und die Menge sagen." },
    e08: { e: "Para mí el pollo, por favor.", d: "Für mich das Hähnchen, bitte.", s: "Beim Bestellen.", n: "pollo a la plancha = gegrillt, pollo frito = frittiert." },
    e09: { e: "¿El pescado es fresco?", d: "Ist der Fisch frisch?", s: "An der Küste oder im Fischrestaurant.", n: "Tagesfang heißt oft pescado del día." },
    e10: { e: "¿Tiene fruta fresca?", d: "Haben Sie frisches Obst?", s: "Am Marktstand oder beim Frühstück.", n: "Frischer Saft: jugo natural de fruta." },
    e11: { e: "¿Es muy picante?", d: "Ist das sehr scharf?", s: "Beim Bestellen, wenn du die Schärfe checken willst.", n: "Nicht scharf: sin picante. Schärfe extra: con ají / con chile." },
    e12: { e: "¡Qué rico está esto!", d: "Wie lecker das ist!", s: "Während des Essens, als Kompliment.", n: "rico heißt lecker – ein Lob, das überall gut ankommt." },
    e13: { e: "¿A qué hora es el desayuno?", d: "Wann gibt es Frühstück?", s: "Im Hostel oder Hotel.", n: "Inklusive? ¿El desayuno está incluido?" },
    e14: { e: "Quiero el almuerzo del día.", d: "Ich möchte das Mittagsmenü.", s: "Mittags im Lokal.", n: "el almuerzo (Mittagessen) ist in LatAm oft die Hauptmahlzeit." },
    e15: { e: "¿A qué hora sirven la cena?", d: "Wann gibt es Abendessen?", s: "Abends im Restaurant oder Hostel.", n: "In vielen Ländern isst man spät zu Abend – oft ab 20 Uhr." },
    e16: { e: "¿Qué me recomienda de la carta?", d: "Was empfehlen Sie von der Karte?", s: "Wenn du Lokales probieren willst.", n: "Nach dem typischen Gericht fragen: ¿Cuál es el plato típico?" },
    e17: { e: "Para llevar, por favor.", d: "Zum Mitnehmen, bitte.", s: "Beim Bestellen zum Mitnehmen.", n: "Gegenteil: para comer aquí (zum Hieressen)." },
    e18: { e: "Tengo una alergia. ¿Esto lleva maní?", d: "Ich habe eine Allergie. Ist da Erdnuss drin?", s: "Beim Bestellen mit Unverträglichkeit.", n: "Wichtig klar sagen – ergänze die konkrete Zutat (maní, gluten, lactosa)." },
    e19: { e: "Con muchas verduras, por favor.", d: "Mit viel Gemüse, bitte.", s: "Beim Bestellen.", n: "In manchen Ländern auch vegetales." },
    e20: { e: "¿Viene con arroz?", d: "Kommt das mit Reis?", s: "Beim Bestellen.", n: "Reis und Bohnen (arroz con frijoles) ist die Standard-Beilage." },
    e21: { e: "¿Tienen huevos para el desayuno?", d: "Gibt es Eier zum Frühstück?", s: "Beim Frühstück.", n: "Rührei = huevos revueltos." },
    e22: { e: "Con queso, por favor.", d: "Mit Käse, bitte.", s: "Beim Bestellen.", n: "Arepa con queso ist ein beliebter Snack." },
    e23: { e: "¿Me pasa la sal, por favor?", d: "Reichen Sie mir das Salz, bitte?", s: "Am Tisch.", n: "Salz sal, Pfeffer pimienta – nicht verwechseln mit pimiento (Paprika)." },
    e24: { e: "Quiero el menú del día.", d: "Ich möchte das Tagesmenü.", s: "Mittags im Lokal.", n: "Meist Suppe, Hauptgang und Getränk zum Festpreis – das beste Angebot." },
    e25: { e: "¿Qué hay de postre?", d: "Was gibt es zum Nachtisch?", s: "Nach dem Hauptgang.", n: "Oft schon im menú del día inklusive." },
    e26: { e: "Otra, por favor.", d: "Noch eins, bitte.", s: "Um Nachschub zu bestellen.", n: "Form passt sich an: otro café, otra cerveza." },
    e27: { e: "Disculpe, ¿podemos ordenar?", d: "Entschuldigung, können wir bestellen?", s: "Wenn du den Kellner rufen willst.", n: "In Spanien eher pedir, in LatAm meist ordenar." },
    e28: { e: "Para mí lo mismo, por favor.", d: "Für mich das Gleiche, bitte.", s: "Beim Bestellen in der Gruppe.", n: "Praktisch, wenn dir die Auswahl schwerfällt." },
    e29: { e: "¿Lo puede hacer menos picante?", d: "Können Sie es weniger scharf machen?", s: "Beim Bestellen scharfer Gerichte.", n: "Ganz ohne: sin picante, por favor." },
    e30: { e: "Sin cebolla y con extra queso, por favor.", d: "Ohne Zwiebel und mit extra Käse, bitte.", s: "Beim Anpassen der Bestellung.", n: "sin = ohne, con extra = mit zusätzlich." },
    e31: { e: "¿Está libre esta mesa?", d: "Ist dieser Tisch frei?", s: "Im vollen Lokal oder Café.", n: "Besetzt? ¿Está ocupado?" },
    e32: { e: "¿Me lo puede empacar para llevar?", d: "Können Sie es mir einpacken? (Reste)", s: "Wenn du Reste mitnehmen willst.", n: "In manchen Ländern auch envolver oder para llevar." },
    e33: { e: "Otra cerveza, por favor.", d: "Noch ein Bier, bitte.", s: "In Bar oder Restaurant.", n: "Eine Runde für alle: una ronda para todos." },
    e35: { e: "La comida estuvo excelente, gracias.", d: "Das Essen war ausgezeichnet, danke.", s: "Nach dem Essen als Lob.", n: "estuvo (war) für ein abgeschlossenes Erlebnis." },
    e36: { e: "Todo estuvo delicioso.", d: "Alles war köstlich.", s: "Beim Bezahlen oder Verabschieden.", n: "Kommt beim Personal immer gut an." },
    e37: { e: "Me gustó mucho, estuvo muy rico.", d: "Es hat mir sehr gefallen, war richtig lecker.", s: "Nach dem Essen.", n: "rico = lecker, in ganz LatAm gebräuchlich." },
    e38: { e: "Estoy satisfecho, gracias.", d: "Ich bin satt, danke.", s: "Wenn man dir mehr anbietet.", n: "Höflicher als Estoy lleno. Frauen: satisfecha." },
    e39: { e: "Mis felicitaciones al chef.", d: "Mein Kompliment an den Koch.", s: "Bei besonders gutem Essen.", n: "Ein nettes Extra-Lob, das selten jemand sagt." },
    e40: { e: "Fue el mejor plato del viaje.", d: "Das war das beste Gericht der Reise.", s: "Als großes Kompliment.", n: "plato = Teller und Gericht zugleich." },
    e41: { e: "¿Puedo cambiar algo del plato?", d: "Kann ich etwas am Gericht austauschen?", s: "Wenn du eine Zutat tauschen willst.", n: "Konkretisieren mit en vez de ... (statt ...)." },
    e42: { e: "¿En vez de las papas fritas, una ensalada?", d: "Statt der Pommes lieber einen Salat?", s: "Beim Anpassen der Beilage.", n: "papas = Kartoffeln; in Spanien patatas." },
    e43: { e: "¿Puedo cambiar las papas por ensalada?", d: "Kann ich die Pommes gegen Salat tauschen?", s: "Beim Bestellen.", n: "Die Struktur cambiar X por Y ist überall nützlich." },
    e44: { e: "En vez de arroz, frijoles, por favor.", d: "Statt Reis lieber Bohnen, bitte.", s: "Beim Wählen der Beilage.", n: "Bohnen: frijoles, in manchen Ländern porotos oder caraotas." },
    e45: { e: "¿Puede ser con un acompañamiento a elección?", d: "Geht das mit einer Beilage nach Wahl?", s: "Beim Bestellen von Menüs.", n: "acompañamiento = Beilage." },
    e47: { e: "Sin cilantro, por favor.", d: "Ohne Koriander, bitte.", s: "Beim Bestellen, wenn du Koriander nicht magst.", n: "cilantro ist in LatAm sehr verbreitet – kommt fast überall drauf." },
    e48: { e: "El aderezo aparte, por favor.", d: "Dressing bitte separat.", s: "Beim Salat bestellen.", n: "aparte = separat/daneben." },
    e49: { e: "¿Puedo reemplazar el pollo por verduras?", d: "Kann ich das Hähnchen durch Gemüse ersetzen?", s: "Für eine vegetarische Anpassung.", n: "reemplazar X por Y = X durch Y ersetzen." },
    e50: { e: "¿Tienen Coca en versión Zero?", d: "Gibt es die Cola auch als Zero?", s: "Beim Getränk bestellen.", n: "Light/Zero heißt oft einfach light oder sin azúcar." },
    e51: { e: "¿En vez de jugo, mejor un agua?", d: "Statt Saft lieber ein Wasser?", s: "Beim Getränk wählen.", n: "agua sin gas = still, con gas = mit Kohlensäure." },
    e52: { e: "¿Puedo cambiar la gaseosa por agua sin gas?", d: "Kann ich statt Limo ein stilles Wasser haben?", s: "Beim Menügetränk.", n: "gaseosa = Limo/Softdrink in vielen Ländern." },
    e53: { e: "Un café sin azúcar, por favor.", d: "Einen Kaffee ohne Zucker, bitte.", s: "Beim Heißgetränk.", n: "Zucker steht oft schon mit drauf – sin azúcar vorher sagen." },
    e54: { e: "¿El jugo lleva azúcar?", d: "Ist im Saft Zucker?", s: "Beim Saft bestellen.", n: "Ohne Zucker bestellen: sin azúcar, por favor." },
    e55: { e: "Soy alérgico a las nueces.", d: "Ich bin allergisch gegen Nüsse.", s: "Beim Bestellen mit Allergie.", n: "Frauen: alérgica. Wichtig, das klar und früh zu sagen." },
    e56: { e: "¿Esto contiene gluten?", d: "Enthält das Gluten?", s: "Bei Glutenunverträglichkeit.", n: "Glutenfrei: sin gluten / libre de gluten." },
    e57: { e: "No tolero la lactosa.", d: "Ich vertrage keine Laktose.", s: "Beim Bestellen mit Milchprodukten.", n: "Laktosefrei: sin lactosa. Pflanzenmilch: leche vegetal." },
    e58: { e: "¿Lleva maní? Es importante.", d: "Ist da Erdnuss drin? Das ist wichtig.", s: "Bei Erdnussallergie – ernst.", n: "maní = Erdnuss (Spanien: cacahuete). Bei Allergie immer Es importante betonen." },
    e59: { e: "¿Me lo puede dar para llevar?", d: "Kann ich das zum Mitnehmen bekommen?", s: "Wenn du das Essen mitnehmen willst.", n: "para llevar = zum Mitnehmen, überall verständlich." },
    e60: { e: "El resto para llevar, por favor.", d: "Den Rest bitte einpacken.", s: "Wenn etwas übrig bleibt.", n: "Reste mitnehmen ist normal – kein Grund zur Scheu." },

    // ===================== TRINKEN =====================
    t01: { e: "Tengo sed, ¿me trae un agua?", d: "Ich habe Durst, bringen Sie mir ein Wasser?", s: "Im Lokal oder unterwegs.", n: "Großer Durst: Tengo mucha sed." },
    t02: { e: "Un agua sin gas, por favor.", d: "Ein stilles Wasser, bitte.", s: "Beim Bestellen.", n: "con gas = mit Kohlensäure, sin gas = still." },
    t03: { e: "¿Es potable el agua de la llave?", d: "Ist das Leitungswasser trinkbar?", s: "Im Hostel oder Restaurant.", n: "In vielen Ländern besser Flaschenwasser (agua embotellada) trinken." },
    t04: { e: "Una botella de agua grande, por favor.", d: "Eine große Flasche Wasser, bitte.", s: "Im Laden oder Restaurant.", n: "grande/pequeña für die Größe." },
    t05: { e: "Una cerveza bien fría, por favor.", d: "Ein gut gekühltes Bier, bitte.", s: "In Bar oder Restaurant.", n: "bien fría = schön kalt – wichtig in den Tropen." },
    t06: { e: "Una copa de vino tinto, por favor.", d: "Ein Glas Rotwein, bitte.", s: "Im Restaurant.", n: "tinto = rot, blanco = weiß. Achtung: in Kolumbien ist un tinto ein schwarzer Kaffee!" },
    t07: { e: "Un café, por favor.", d: "Einen Kaffee, bitte.", s: "Im Café oder zum Frühstück.", n: "In Kolumbien heißt schwarzer Kaffee tinto; con leche = mit Milch." },
    t08: { e: "Un jugo natural de mango, por favor.", d: "Einen frischen Mangosaft, bitte.", s: "Am Saftstand oder im Café.", n: "jugo natural = frisch gepresst, oft en agua (Wasser) oder en leche (Milch)." },
    t09: { e: "¿El café viene con leche?", d: "Kommt der Kaffee mit Milch?", s: "Beim Heißgetränk.", n: "Pflanzenmilch oft als leche de almendras / de avena." },
    t10: { e: "¡Salud! Por el viaje.", d: "Prost! Auf die Reise.", s: "Beim Anstoßen.", n: "Salud heißt zugleich Gesundheit – das klassische Prost." },
    t11: { e: "Gracias por el trago.", d: "Danke fürs Getränk.", s: "Wenn dich jemand einlädt.", n: "trago = Drink/Schluck; un trago auszugeben ist eine nette Geste." },
    t12: { e: "¡Por nosotros y el viaje!", d: "Auf uns und die Reise!", s: "Beim Anstoßen mit neuen Leuten.", n: "Por ... = auf ... – flexibel: por la amistad, por Colombia." },
    t13: { e: "La próxima invito yo.", d: "Das nächste Mal lade ich ein.", s: "In geselliger Runde.", n: "La próxima (vez) = das nächste Mal; invitar heißt hier spendieren." },
    t14: { e: "Este jugo está buenísimo.", d: "Dieser Saft schmeckt richtig gut.", s: "Während des Trinkens.", n: "-ísimo verstärkt: bueno wird zu buenísimo (sehr gut)." },

    // ===================== HOTEL =====================
    h01: { e: "Hola, ¿tiene una habitación para esta noche?", d: "Hallo, haben Sie ein Zimmer für heute Nacht?", s: "Beim spontanen Check-in.", n: "habitación = Zimmer; im Hostel eher cama (Bett)." },
    h02: { e: "Quiero una habitación doble, por favor.", d: "Ich möchte ein Doppelzimmer, bitte.", s: "Beim Buchen vor Ort.", n: "doble = Doppel, sencilla/individual = Einzel." },
    h03: { e: "Para una noche, por favor.", d: "Für eine Nacht, bitte.", s: "Beim Check-in.", n: "Für mehrere: para tres noches." },
    h04: { e: "¿Hay wifi en la habitación?", d: "Gibt es WLAN im Zimmer?", s: "Beim Check-in.", n: "Passwort: ¿Cuál es la contraseña del wifi?" },
    h05: { e: "¿Me da la llave, por favor?", d: "Geben Sie mir den Schlüssel, bitte?", s: "Beim Check-in oder Zurückkommen.", n: "Schlüsselkarte: la tarjeta." },
    h06: { e: "La ducha no tiene agua caliente.", d: "Die Dusche hat kein warmes Wasser.", s: "Wenn etwas im Bad nicht stimmt.", n: "agua caliente = warmes Wasser." },
    h07: { e: "¿Me puede dar una toalla?", d: "Können Sie mir ein Handtuch geben?", s: "Wenn keins im Zimmer ist.", n: "In Hostels kostet die toalla manchmal extra." },
    h08: { e: "¿La habitación tiene aire acondicionado?", d: "Hat das Zimmer eine Klimaanlage?", s: "In heißen Regionen wichtig.", n: "Kurz: el aire. Ventilator: el ventilador." },
    h09: { e: "¿Puedo ver la habitación antes?", d: "Kann ich das Zimmer vorher sehen?", s: "Vor dem Buchen vor Ort.", n: "Völlig normal – besonders bei günstigen Unterkünften." },
    h10: { e: "¿A qué hora es el check-out?", d: "Um wie viel Uhr ist der Check-out?", s: "Beim Planen des Abreisetags.", n: "Meist gegen 10–11 Uhr. Später fragen: ¿Puedo salir más tarde?" },
    h11: { e: "¿Puedo cambiar de habitación? Hay mucho ruido.", d: "Kann ich das Zimmer wechseln? Es ist sehr laut.", s: "Bei Problemen mit dem Zimmer.", n: "Höflicher: ¿Podría cambiar de habitación?" },
    h12: { e: "No hay agua caliente en la ducha.", d: "Es gibt kein warmes Wasser in der Dusche.", s: "An der Rezeption melden.", n: "Häufiges Problem – ruhig und freundlich ansprechen." },
    h13: { e: "Algo está roto en el baño.", d: "Etwas ist im Bad kaputt.", s: "Beim Melden eines Defekts.", n: "roto = kaputt, dañado = beschädigt/defekt." },
    h14: { e: "El aire no funciona.", d: "Die Klimaanlage geht nicht.", s: "An der Rezeption.", n: "no funciona = funktioniert nicht – universell einsetzbar." },
    h15: { e: "El wifi no funciona en mi cuarto.", d: "Das WLAN geht nicht in meinem Zimmer.", s: "Bei Internetproblemen.", n: "Vielleicht neu einloggen – nach der contraseña fragen." },
    h16: { e: "La luz no funciona.", d: "Das Licht geht nicht.", s: "Beim Melden.", n: "Glühbirne: el foco / la bombilla." },
    h17: { e: "La habitación es muy ruidosa.", d: "Das Zimmer ist zu laut.", s: "Wenn du nicht schlafen kannst.", n: "Bitte um ein ruhigeres: ¿Tiene una más tranquila?" },
    h18: { e: "¿Lo pueden arreglar hoy?", d: "Können Sie es heute reparieren?", s: "Nach dem Melden eines Defekts.", n: "arreglar = reparieren/in Ordnung bringen." },
    h19: { e: "Necesito otra toalla, por favor.", d: "Ich brauche noch ein Handtuch, bitte.", s: "An der Rezeption.", n: "otra = noch eine/eine weitere." },
    h20: { e: "¿Pueden limpiar la habitación, por favor?", d: "Können Sie das Zimmer sauber machen?", s: "Bei längerem Aufenthalt.", n: "Reinigung: la limpieza." },
    h21: { e: "¿Puedo hacer el check-out más tarde?", d: "Kann ich später auschecken?", s: "Am Abreisetag.", n: "Manchmal gegen Aufpreis möglich – einfach fragen." },
    h23: { e: "El baño está tapado.", d: "Die Toilette ist verstopft.", s: "Beim Melden an der Rezeption.", n: "tapado = verstopft. Unangenehm, aber wichtig zu sagen." },
    h24: { e: "Tengo mucho calor, ¿puedo prender el aire?", d: "Mir ist sehr warm, kann ich die Klimaanlage anmachen?", s: "Im Zimmer.", n: "Wichtig: Tengo calor (mir ist warm), NICHT Estoy caliente!" },

    // ===================== EINKAUFEN =====================
    c01: { e: "¿Cuánto cuesta esto?", d: "Wie viel kostet das?", s: "Im Laden oder auf dem Markt.", n: "Auch ¿Cuánto vale? oder auf dem Markt ¿A cómo?" },
    c02: { e: "Uff, es muy caro.", d: "Puh, das ist zu teuer.", s: "Beim Handeln auf dem Markt.", n: "Leitet mit einem Lächeln oft das Verhandeln ein." },
    c03: { e: "¿Tiene agua fría?", d: "Haben Sie kaltes Wasser?", s: "Im Laden/Kiosk.", n: "Universelle Frage – das Wort einfach austauschen." },
    c04: { e: "Gracias, solo estoy mirando.", d: "Danke, ich schaue nur.", s: "Wenn dich Verkäufer ansprechen.", n: "Höflich und entspannt – ohne Kaufdruck." },
    c05: { e: "Me llevo esto, gracias.", d: "Ich nehme das, danke.", s: "An der Kasse / beim Stand.", n: "llevarse = mitnehmen/kaufen." },
    c06: { e: "¿Dónde está el mercado?", d: "Wo ist der Markt?", s: "Auf der Suche nach frischen Lebensmitteln.", n: "Märkte sind oft günstiger und authentischer als Supermärkte." },
    c07: { e: "Busco un supermercado cerca.", d: "Ich suche einen Supermarkt in der Nähe.", s: "Beim Selbstversorgen.", n: "Kleiner Laden um die Ecke: la tienda." },
    c08: { e: "Una bolsa, por favor.", d: "Eine Tüte, bitte.", s: "An der Kasse.", n: "Tüten kosten oft extra – ein Stoffbeutel lohnt sich." },
    c09: { e: "¿Hay descuento si llevo dos?", d: "Gibt es Rabatt, wenn ich zwei nehme?", s: "Auf dem Markt oder bei Mengen.", n: "descuento = Rabatt; Mengenrabatt ist oft drin." },
    c10: { e: "¿No tiene algo más barato?", d: "Haben Sie nichts Günstigeres?", s: "Beim Vergleichen.", n: "barato = billig, caro = teuer." },
    c11: { e: "¿Me lo puedo probar?", d: "Kann ich es anprobieren?", s: "Beim Kleiderkauf.", n: "Umkleide: el probador." },
    c13: { e: "¿Dónde está la caja?", d: "Wo ist die Kasse?", s: "Im Laden zum Bezahlen.", n: "caja = Kasse; cajero = Geldautomat (nicht verwechseln)." },
    c14: { e: "¿Está abierto los domingos?", d: "Ist sonntags geöffnet?", s: "Beim Planen von Einkäufen.", n: "abierto = offen, cerrado = geschlossen." },
    c15: { e: "Un kilo de mangos, por favor.", d: "Ein Kilo Mangos, bitte.", s: "Am Obst-/Gemüsestand.", n: "Mengen mit de: un kilo de ..." },
    c16: { e: "Medio kilo de tomates, por favor.", d: "Ein halbes Kilo Tomaten, bitte.", s: "Auf dem Markt.", n: "medio kilo = 500 g." },
    c17: { e: "Un poco más, por favor.", d: "Etwas mehr, bitte.", s: "Beim Abwiegen auf dem Markt.", n: "más = mehr, menos = weniger." },
    c18: { e: "Eso es todo, gracias.", d: "Das ist alles, danke.", s: "Beim Abschließen des Einkaufs.", n: "Auch Nada más (sonst nichts)." },
    c19: { e: "¿Tiene algo más barato?", d: "Haben Sie etwas Günstigeres?", s: "Wenn dir der Preis zu hoch ist.", n: "Freundlicher Einstieg ins Handeln." },
    c20: { e: "Me da dos panes, por favor.", d: "Geben Sie mir zwei Brote, bitte.", s: "Am Tresen / Stand.", n: "Me da ... ist die typische LatAm-Bestellformel." },
    c21: { e: "Quiero este vestido, por favor.", d: "Ich möchte dieses Kleid.", s: "Beim Kleiderkauf.", n: "este = dieses (hier), ese = das (dort)." },
    c23: { e: "¿Lo tiene en otro color?", d: "Haben Sie es in einer anderen Farbe?", s: "Beim Kleiderkauf.", n: "color = Farbe." },
    c24: { e: "¿Tiene una talla más grande?", d: "Haben Sie eine Nummer größer?", s: "Beim Anprobieren.", n: "chica ist in vielen Ländern üblich für klein (sonst pequeña)." },
    c25: { e: "¿Me lo deja más barato?", d: "Geht beim Preis noch was?", s: "Beim Handeln.", n: "dejar algo más barato = günstiger machen – typische Handelsfloskel." },
    c26: { e: "¿Me hace un descuento?", d: "Machen Sie mir einen Rabatt?", s: "Auf dem Markt.", n: "Mit Charme und Lächeln klappt es eher." },
    c27: { e: "Muy caro, gracias.", d: "Zu teuer, danke.", s: "Wenn du höflich ablehnst.", n: "Oft kommt jetzt ein besseres Angebot – einfach abwarten." },
    c28: { e: "Me llevo dos de esos.", d: "Ich nehme zwei davon.", s: "Am Stand.", n: "de esos = von denen (dort)." },
    c29: { e: "¿Me lo puede mostrar?", d: "Können Sie mir das zeigen?", s: "Wenn etwas hinter der Theke liegt.", n: "mostrar = zeigen." },
    c30: { e: "¿Dónde encuentro el agua?", d: "Wo finde ich Wasser?", s: "Im Supermarkt.", n: "Wort austauschen: ¿Dónde encuentro el pan?" },
    c31: { e: "¿Puedo probar?", d: "Darf ich probieren?", s: "Am Obst-/Käsestand.", n: "probar = kosten UND anprobieren – Kontext klärt es." },
    c32: { e: "¿Me lo puede envolver?", d: "Können Sie es einpacken?", s: "Bei Geschenken.", n: "envolver = (ein)wickeln." },
    c33: { e: "Es para regalo, ¿lo puede envolver?", d: "Es ist ein Geschenk, können Sie es einpacken?", s: "Beim Souvenirkauf.", n: "regalo = Geschenk." },
    c34: { e: "¿Este aguacate está maduro?", d: "Ist diese Avocado reif?", s: "Beim Obstkauf.", n: "maduro = reif, verde = unreif/grün, fresco = frisch." },

    // ===================== GELD =====================
    d01: { e: "¿Cómo puedo pagar?", d: "Wie kann ich bezahlen?", s: "An der Kasse.", n: "Folgefrage: ¿Aceptan tarjeta? (Karten ok?)" },
    d02: { e: "¿Puedo pagar con tarjeta?", d: "Kann ich mit Karte zahlen?", s: "Beim Bezahlen.", n: "Kleine Läden nehmen oft nur efectivo (bar)." },
    d03: { e: "Pago en efectivo.", d: "Ich zahle bar.", s: "Beim Bezahlen.", n: "Bargeld ist in LatAm oft König – immer etwas dabei haben." },
    d04: { e: "¿Aceptan tarjeta?", d: "Akzeptieren Sie Karten?", s: "Vor dem Bestellen/Kaufen.", n: "Gut, vorher zu fragen – nicht überall möglich." },
    d05: { e: "¿Hay un cajero cerca?", d: "Gibt es einen Geldautomaten in der Nähe?", s: "Wenn du Bargeld brauchst.", n: "cajero automático – am sichersten in Banken oder Malls." },
    d06: { e: "¿Me da el vuelto, por favor?", d: "Geben Sie mir das Wechselgeld, bitte?", s: "Nach dem Bezahlen.", n: "vuelto in LatAm, cambio anderswo – beides verständlich." },
    d07: { e: "¿Tiene sencillo? No tengo cambio.", d: "Haben Sie es klein? Ich habe kein Kleingeld.", s: "Beim Bezahlen mit großem Schein.", n: "sencillo = Kleingeld; große Scheine sind oft ein Problem." },
    d08: { e: "¿Me da el recibo, por favor?", d: "Geben Sie mir die Quittung, bitte?", s: "Nach dem Bezahlen.", n: "recibo/boleta = Quittung; factura = formelle Rechnung." },
    d09: { e: "No me queda mucha plata.", d: "Mir bleibt nicht mehr viel Geld.", s: "Im Gespräch über das Budget.", n: "plata ist das alltägliche Wort für Geld in Südamerika." },
    d10: { e: "¿La entrada es gratis?", d: "Ist der Eintritt kostenlos?", s: "Bei Museen, Touren, Events.", n: "gratis = umsonst; manchmal gibt es Gratis-Tage." },
    d11: { e: "¿Dónde puedo cambiar dinero?", d: "Wo kann ich Geld wechseln?", s: "Nach der Ankunft im Land.", n: "Wechselkurs vergleichen – der erste Stand ist selten der beste." },
    d12: { e: "Busco una casa de cambio.", d: "Ich suche eine Wechselstube.", s: "Beim Geldwechseln.", n: "Eine offizielle casa de cambio ist sicherer als Straßenwechsler." },
    d13: { e: "Disculpe, ¿está bien el vuelto?", d: "Stimmt das Wechselgeld so?", s: "Nach dem Bezahlen.", n: "Ruhig nachzählen – freundlich nachfragen ist völlig ok." },

    // ===================== VERKEHR =====================
    v01: { e: "Disculpe, ¿dónde está la estación?", d: "Entschuldigung, wo ist der Bahnhof?", s: "Bei der Orientierung.", n: "Wort austauschen: ¿dónde está el baño / el centro?" },
    v02: { e: "Gire a la derecha en la esquina.", d: "Biegen Sie an der Ecke rechts ab.", s: "Bei Wegbeschreibungen.", n: "izquierda = links, derecha = rechts." },
    v03: { e: "Siga todo recto dos cuadras.", d: "Gehen Sie zwei Blocks geradeaus.", s: "Bei Wegbeschreibungen.", n: "cuadra = Häuserblock, die typische Entfernungseinheit." },
    v04: { e: "¿Cómo llego al centro?", d: "Wie komme ich ins Zentrum?", s: "Bei der Wegsuche.", n: "al = a + el. Zu femininem Ziel: a la plaza." },
    v06: { e: "¿Me puede pedir un taxi?", d: "Können Sie mir ein Taxi rufen?", s: "Im Hostel/Restaurant.", n: "Sicherer als auf der Straße: per App oder vom Personal rufen lassen." },
    v07: { e: "Un boleto a Lima, por favor.", d: "Ein Ticket nach Lima, bitte.", s: "Am Schalter.", n: "boleto/pasaje/billete – je nach Land." },
    v08: { e: "¿Está lejos la estación?", d: "Ist der Bahnhof weit?", s: "Bei der Orientierung.", n: "Busbahnhof: el terminal / la terminal." },
    v09: { e: "¿Cuánto cuesta al aeropuerto?", d: "Wie viel kostet es zum Flughafen?", s: "Beim Taxi vor dem Abflug.", n: "Preis vorher aushandeln – Flughafenfahrten sind oft teurer." },
    v10: { e: "Pare aquí, por favor.", d: "Halten Sie hier, bitte.", s: "Im Taxi/Bus am Ziel.", n: "pare = halten Sie an; déjeme aquí = lassen Sie mich hier." },
    v11: { e: "¿A qué hora sale el próximo?", d: "Wann fährt der nächste?", s: "Am Bahnhof/Busbahnhof.", n: "salir = abfahren, llegar = ankommen." },
    v13: { e: "¿Está lejos de aquí?", d: "Ist es weit von hier?", s: "Bevor du losgehst.", n: "lejos = weit, cerca = nah." },
    v15: { e: "¿Qué tan lejos está la playa?", d: "Wie weit ist der Strand?", s: "Beim Planen.", n: "¿Qué tan ...? = Wie ... – sehr LatAm (Spanien: ¿Cómo de ...?)." },
    v17: { e: "¿Dónde hay una gasolinera?", d: "Wo gibt es eine Tankstelle?", s: "Beim Mietwagen/Roadtrip.", n: "In manchen Ländern bomba oder grifo (Peru)." },
    v18: { e: "Lleno de gasolina, por favor.", d: "Volltanken, bitte.", s: "An der Tankstelle.", n: "In Chile bencina. Lleno = voll." },
    v19: { e: "Quiero alquilar un auto.", d: "Ich möchte ein Auto mieten.", s: "Bei der Autovermietung.", n: "auto/carro/coche – je nach Land." },
    v20: { e: "¿Dónde me bajo para el centro?", d: "Wo steige ich fürs Zentrum aus?", s: "Im Bus/colectivo.", n: "bajarse = aussteigen, subirse = einsteigen." },
    v21: { e: "Me bajo en la próxima parada.", d: "Ich steige an der nächsten Haltestelle aus.", s: "Im Bus.", n: "parada = Haltestelle." },
    v22: { e: "Lléveme a esta dirección, por favor.", d: "Bringen Sie mich zu dieser Adresse.", s: "Im Taxi – Adresse zeigen.", n: "dirección = Adresse. Am einfachsten auf dem Handy zeigen." },
    v23: { e: "¿Cuánto demora en llegar?", d: "Wie lange dauert es bis dahin?", s: "Im Taxi/Bus.", n: "demorar/tardar = dauern – beide gebräuchlich." },
    v24: { e: "¿Puede poner el taxímetro?", d: "Können Sie das Taxameter einschalten?", s: "Beim Taxieinstieg.", n: "Ohne Taxameter vorher einen Festpreis vereinbaren." },
    v25: { e: "¿Puede esperar aquí un momento?", d: "Können Sie hier kurz warten?", s: "Bei kurzem Stopp mit dem Taxi.", n: "esperar = warten. Wartezeit kostet meist extra." },
    v26: { e: "Me bajo aquí, gracias.", d: "Ich steige hier aus.", s: "Im colectivo/Bus.", n: "Kurz und klar – oft reicht ein lautes aquí." },

    // ===================== ZEIT =====================
    ti01: { e: "Disculpe, ¿qué hora es?", d: "Entschuldigung, wie spät ist es?", s: "Wenn du die Uhrzeit brauchst.", n: "Antwort meist Son las ... (z. B. Son las tres)." },
    ti02: { e: "¿A qué hora abre el museo?", d: "Um wie viel Uhr öffnet das Museum?", s: "Beim Planen.", n: "abrir = öffnen, cerrar = schließen." },
    ti03: { e: "¿Vamos ahora o más tarde?", d: "Gehen wir jetzt oder später?", s: "Beim Pläne machen.", n: "Achtung: ahorita heißt je nach Land sofort ODER gleich/später." },
    ti04: { e: "¿Qué hacemos hoy?", d: "Was machen wir heute?", s: "Bei der Tagesplanung.", n: "hoy = heute." },
    ti05: { e: "Salgo mañana temprano.", d: "Ich reise morgen früh ab.", s: "Bei Reiseplänen.", n: "mañana = morgen UND Vormittag – Kontext entscheidet." },
    ti06: { e: "Llegué ayer por la noche.", d: "Ich bin gestern Abend angekommen.", s: "Im Smalltalk über die Reise.", n: "ayer = gestern, anteayer = vorgestern." },
    ti07: { e: "El tour es en la mañana.", d: "Die Tour ist am Vormittag.", s: "Bei der Planung.", n: "en la mañana/tarde/noche – die Tageszeiten." },
    ti08: { e: "Me quedo una semana.", d: "Ich bleibe eine Woche.", s: "Bei der Aufenthaltsdauer.", n: "día = Tag, semana = Woche, mes = Monat." },
    ti09: { e: "Mejor salimos temprano.", d: "Wir gehen besser früh los.", s: "Bei der Planung.", n: "temprano = früh, tarde = spät (und Nachmittag)." },
    ti10: { e: "El bus sale el lunes.", d: "Der Bus fährt am Montag.", s: "Bei Reiseplänen.", n: "Wochentage klein und ohne am: el lunes." },
    ti11: { e: "Llego el miércoles.", d: "Ich komme am Mittwoch an.", s: "Bei Verabredungen.", n: "miércoles hat einen Akzent: mi-ÉR-co-les." },
    ti12: { e: "El sábado hay fiesta en el hostel.", d: "Am Samstag ist Party im Hostel.", s: "Beim Wochenende planen.", n: "Am Wochenende: el fin de semana." },

    // ===================== SMALLTALK =====================
    s01: { e: "¡Hola! ¿Cómo estás?", d: "Hallo! Wie geht's?", s: "Bei jeder Begrüßung.", n: "Lockerer: ¿Qué tal? oder ¿Qué más? (Kolumbien)." },
    s02: { e: "Bien, gracias, ¿y tú?", d: "Gut, danke, und dir?", s: "Als Antwort auf ¿Cómo estás?", n: "Das ¿y tú? zurückzugeben gehört dazu." },
    s05: { e: "Soy de Alemania, de Múnich.", d: "Ich komme aus Deutschland, aus München.", s: "Wenn du nach deiner Herkunft gefragt wirst.", n: "Soy de + Land/Stadt." },
    s06: { e: "Estoy de vacaciones por tres meses.", d: "Ich bin für drei Monate im Urlaub.", s: "Im Smalltalk über die Reise.", n: "de vacaciones = im Urlaub." },
    s07: { e: "Solo estoy de paso un par de días.", d: "Ich bin nur für ein paar Tage auf der Durchreise.", s: "Wenn du kurz bleibst.", n: "de paso = auf der Durchreise." },
    s08: { e: "¡Qué chévere tu viaje!", d: "Wie cool deine Reise!", s: "Als Begeisterung im Gespräch.", n: "chévere (Kolumbien), bacán (Chile/Peru), padre (Mexiko)." },
    s09: { e: "No hay problema, tranquilo.", d: "Kein Problem, alles entspannt.", s: "Wenn sich jemand entschuldigt.", n: "tranquilo/a = keine Sorge – sehr gebräuchlich." },
    s10: { e: "Claro, con gusto.", d: "Klar, gerne.", s: "Zur Zustimmung im Gespräch.", n: "Claro que sí verstärkt: aber klar!" },
    s11: { e: "Quizás mañana, depende.", d: "Vielleicht morgen, kommt drauf an.", s: "Bei unsicheren Plänen.", n: "quizás/tal vez = vielleicht; depende = kommt drauf an." },
    s12: { e: "Hasta luego, ¡que te vaya bien!", d: "Bis später, mach's gut!", s: "Beim Verabschieden.", n: "que te vaya bien = alles Gute." },
    s13: { e: "Hasta mañana, descansa.", d: "Bis morgen, ruh dich aus.", s: "Beim Abschied am Abend.", n: "descansa = ruh dich aus." },
    s14: { e: "¡Que tengas un buen día!", d: "Schönen Tag noch!", s: "Beim Verabschieden.", n: "Antwort: Igualmente (gleichfalls)." },
    s15: { e: "Con permiso.", d: "Entschuldigung (darf ich durch).", s: "Beim Durchgehen in der Menge.", n: "Permiso zum Durchkommen, Disculpe zum Ansprechen." },
    s16: { e: "Muchas gracias por todo.", d: "Vielen Dank für alles.", s: "Beim Verabschieden, z. B. nach dem Hostelaufenthalt.", n: "Herzlich und passend zum Abschied." },
    s17: { e: "¡Mil gracias, muy amable!", d: "Tausend Dank, sehr nett!", s: "Bei besonderer Hilfe.", n: "Verstärktes Danke – kommt von Herzen rüber." },
    s18: { e: "Muy amable de tu parte.", d: "Das ist sehr nett von dir.", s: "Nach einer Gefälligkeit.", n: "Förmlich: de su parte." },
    s19: { e: "Gracias por la invitación.", d: "Danke für die Einladung.", s: "Nach Essen/Drink, zu dem du eingeladen warst.", n: "invitación = Einladung (auch wenn jemand spendiert)." },
    s20: { e: "Te lo agradezco mucho.", d: "Ich weiß das sehr zu schätzen.", s: "Bei echter Dankbarkeit.", n: "Etwas wärmer und persönlicher als nur gracias." },
    s21: { e: "Fue un placer conocerte.", d: "Es war mir ein Vergnügen, dich kennenzulernen.", s: "Beim Abschied von neuen Bekannten.", n: "Ein schöner, herzlicher Abschiedssatz." },
    s22: { e: "Estoy muy contento con todo.", d: "Ich bin sehr zufrieden mit allem.", s: "Als positives Feedback.", n: "Frauen: contenta." },
    s23: { e: "Todo estuvo perfecto, gracias.", d: "Alles war perfekt, danke.", s: "Beim Auschecken/Verabschieden.", n: "Gutes Lob fürs Personal." },
    s24: { e: "La próxima te invito yo.", d: "Das nächste Mal lade ich dich ein.", s: "In geselliger Runde.", n: "Eine nette Geste, die Sympathie schafft." },

    // ===================== ALLTAG =====================
    a01: { e: "¿Cómo se dice esto en español?", d: "Wie sagt man das auf Spanisch?", s: "Beim Lernen unterwegs.", n: "Super, um neue Wörter direkt von Locals zu lernen." },
    a02: { e: "¿Qué significa esta palabra?", d: "Was bedeutet dieses Wort?", s: "Wenn du ein Wort nicht kennst.", n: "palabra = Wort. Zeig einfach drauf." },
    a03: { e: "¿Me lo puede escribir, por favor?", d: "Können Sie es mir aufschreiben?", s: "Bei Adressen, Preisen, Namen.", n: "Hilft enorm bei Zahlen und Eigennamen." },
    a04: { e: "Disculpe mi español, estoy aprendiendo.", d: "Entschuldige mein Spanisch, ich lerne noch.", s: "Wenn du ins Stocken gerätst.", n: "Bricht das Eis – die meisten helfen dann geduldig." },
    a05: { e: "¿Cuál es la contraseña del wifi?", d: "Wie ist das WLAN-Passwort?", s: "Im Café, Hostel, Restaurant.", n: "contraseña/clave = Passwort." },
    a06: { e: "¿Dónde puedo comprar un chip?", d: "Wo kann ich eine SIM-Karte kaufen?", s: "Nach der Ankunft für mobiles Internet.", n: "chip = SIM-Karte in LatAm (Spanien: tarjeta SIM)." },
    a07: { e: "Quiero recargar saldo, por favor.", d: "Ich möchte Guthaben aufladen.", s: "Im Handy-Laden oder Kiosk.", n: "saldo = Guthaben; recarga = die Aufladung." },
    a08: { e: "¿El plan incluye datos móviles?", d: "Enthält der Tarif mobile Daten?", s: "Beim SIM-Kauf.", n: "datos = Datenvolumen; oft als Gigas verkauft." },
    a09: { e: "¿Hay una lavandería cerca?", d: "Gibt es eine Wäscherei in der Nähe?", s: "Wenn die Wäsche dreckig ist.", n: "Oft nach Gewicht (por kilo) – günstig und schnell." },
    a10: { e: "Busco un departamento por un mes.", d: "Ich suche eine Wohnung für einen Monat.", s: "Bei längeren Aufenthalten.", n: "departamento (LatAm) / piso (Spanien) / apartamento." },
    a11: { e: "¿Cuánto es el alquiler al mes?", d: "Wie hoch ist die Miete pro Monat?", s: "Bei der Wohnungssuche.", n: "alquiler/arriendo/renta – je nach Land." },
    a12: { e: "¿Dónde está el banco más cercano?", d: "Wo ist die nächste Bank?", s: "Für Geldgeschäfte.", n: "Geldautomaten in der Bank sind am sichersten." },
    a13: { e: "Quiero enviar una postal desde el correo.", d: "Ich möchte eine Postkarte von der Post schicken.", s: "Beim Postamt.", n: "correo = Post; Postkarte = postal." },
    a14: { e: "Necesito ir a la embajada alemana.", d: "Ich muss zur deutschen Botschaft.", s: "Bei verlorenem Pass oder Notfällen.", n: "embajada = Botschaft; consulado = Konsulat." },
    a15: { e: "¿Dónde puedo comprar agua por aquí?", d: "Wo kann ich hier Wasser kaufen?", s: "Unterwegs bei Durst.", n: "Kleiner Laden: la tienda / el kiosco." },

    // ===================== SÄTZE =====================
    f01: { e: "Quisiera un café, por favor.", d: "Ich hätte gern einen Kaffee, bitte.", s: "Beim Bestellen/Wünschen.", n: "Quisiera ist höflicher als Quiero." },
    f02: { e: "Me gustaría ver el menú.", d: "Ich hätte gern die Karte.", s: "Bei höflichen Wünschen.", n: "Me gustaría + Infinitiv = ich würde gern ..." },
