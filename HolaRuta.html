    f04: { e: "Ese de atrás, por favor.", d: "Das da hinten, bitte.", s: "An der Theke/Vitrine.", n: "atrás = hinten." },
    f05: { e: "Ese de abajo, por favor.", d: "Das da unten, bitte.", s: "Beim Zeigen im Regal.", n: "abajo = unten." },
    f06: { e: "Ese de arriba, el segundo.", d: "Das da oben, das zweite.", s: "Beim Zeigen im Regal.", n: "arriba = oben." },
    f07: { e: "No este, ese.", d: "Nicht dieses, das da.", s: "Beim Auswählen.", n: "este (hier bei mir) vs. ese (dort bei dir)." },
    f08: { e: "Uno más, por favor.", d: "Noch eins, bitte.", s: "Für Nachschub.", n: "Anpassen: una más bei femininem Wort." },
    f09: { e: "Mejor uno menos.", d: "Lieber eins weniger.", s: "Beim Korrigieren der Menge.", n: "menos = weniger." },
    f10: { e: "Un poco más, por favor.", d: "Ein bisschen mehr, bitte.", s: "Beim Abwiegen/Einschenken.", n: "un poco = ein bisschen." },
    f11: { e: "Solo un poquito, gracias.", d: "Nur ein bisschen, danke.", s: "Bei kleinen Mengen.", n: "-ito macht es kleiner und freundlicher: poquito." },
    f12: { e: "Así está bien, gracias.", d: "Das reicht so, danke.", s: "Beim Einschenken/Abwiegen.", n: "Signalisiert: genau richtig, stopp." },
    f13: { e: "Sí, así.", d: "Ja, genau so.", s: "Zur Bestätigung.", n: "Kurz und klar – oft mit einer Geste." },
    f14: { e: "¿Puedo pasar?", d: "Darf ich durch?", s: "Um Erlaubnis bitten.", n: "¿Puedo + Infinitiv? = Darf/Kann ich ...?" },
    f15: { e: "¿Puede ayudarme?", d: "Können Sie mir helfen?", s: "Um etwas bitten (förmlich).", n: "¿Puede + Infinitiv? = Können Sie ...?" },
    f16: { e: "Necesito ayuda, por favor.", d: "Ich brauche Hilfe, bitte.", s: "Bei einem Bedürfnis.", n: "Necesito + Nomen/Infinitiv." },
    f17: { e: "¿Hay baño aquí?", d: "Gibt es hier eine Toilette?", s: "Auf der Suche nach etwas.", n: "hay = es gibt – eines der nützlichsten Wörter." },
    f18: { e: "¿Dónde hay un cajero?", d: "Wo gibt es einen Geldautomaten?", s: "Bei der Suche.", n: "¿Dónde hay ...? = Wo gibt es ...?" },
    f19: { e: "Estoy buscando la estación de bus.", d: "Ich suche den Busbahnhof.", s: "Bei der Orientierung.", n: "buscar = suchen." },
    f20: { e: "¿Qué es esto? Se ve rico.", d: "Was ist das? Sieht lecker aus.", s: "Am Marktstand oder bei unbekanntem Gericht.", n: "Neugier kommt gut an – oft bekommst du etwas zum Probieren." },
    f21: { e: "¿Cómo se llama esto en español?", d: "Wie nennt man das?", s: "Beim Vokabeln lernen.", n: "Tolle Frage, um Wörter von Locals zu lernen." },
    f22: { e: "Un momento, por favor.", d: "Einen Moment, bitte.", s: "Wenn du kurz Zeit brauchst.", n: "Auch Ya voy = ich komme gleich." },
    f23: { e: "¿Me permite? Con permiso.", d: "Darf ich mal vorbei?", s: "Beim Durchkommen.", n: "Con permiso ist die Standardformel zum Durchgehen." },
    f24: { e: "Disculpe, una pregunta.", d: "Entschuldigung, eine Frage.", s: "Bevor du jemanden etwas fragst.", n: "Höflicher Einstieg, der fast immer gut ankommt." },
    f25: { e: "¿Cómo? No le entendí.", d: "Wie bitte? Ich habe Sie nicht verstanden.", s: "Wenn du nachfragen musst.", n: "¿Cómo? ist höflich; ¿Mande? ist sehr mexikanisch." },
    f26: { e: "¿Puede repetir, por favor?", d: "Können Sie das wiederholen?", s: "Wenn du etwas verpasst hast.", n: "Kombi mit Más despacio wirkt Wunder." },
    f27: { e: "Solo estoy mirando, gracias.", d: "Ich möchte nur schauen, danke.", s: "Wenn Verkäufer aufdringlich werden.", n: "Höflich und ohne Druck." },
    f28: { e: "Un poco más, por favor.", d: "Etwas mehr, bitte.", s: "Beim Dosieren.", n: "más = mehr, menos = weniger." },
    f29: { e: "Quiero uno como este.", d: "Ich möchte eins wie dieses.", s: "Beim Auswählen mit Vergleich.", n: "como = wie. Zeig auf das Vorbild." },
    f30: { e: "No, gracias, estoy bien.", d: "Nein danke, alles gut.", s: "Beim höflichen Annehmen/Ablehnen.", n: "Sí, claro (ja gern) / No, gracias (nein danke)." },

    // ===================== BEHÖRDEN =====================
    g01: { e: "Aquí está mi pasaporte.", d: "Hier ist mein Reisepass.", s: "Bei Einreise/Kontrolle.", n: "Den pasaporte immer griffbereit halten." },
    g02: { e: "¿Necesito visa para entrar?", d: "Brauche ich ein Visum zur Einreise?", s: "Vor/bei der Einreise.", n: "visa (LatAm) / visado (Spanien)." },
    g03: { e: "¿Me puede dar el sello, por favor?", d: "Können Sie mir den Stempel geben?", s: "An der Grenze.", n: "Prüfe, dass der Einreisestempel (sello) wirklich drin ist." },
    g04: { e: "¿Cuánto falta para la frontera?", d: "Wie weit ist es noch bis zur Grenze?", s: "Bei der Anreise zur Grenze.", n: "Grenzübergänge können dauern – Geduld mitbringen." },
    g05: { e: "¿Dónde está la aduana?", d: "Wo ist der Zoll?", s: "Bei der Einreise.", n: "aduana = Zoll; migración = Passkontrolle." },
    g06: { e: "Soy turista, vengo de vacaciones.", d: "Ich bin Tourist, ich komme als Urlauber.", s: "Bei der Einreisebefragung.", n: "Eine einfache, klare Antwort auf den Reisezweck." },
    g07: { e: "Aquí está mi pasaporte y el formulario.", d: "Hier ist mein Reisepass und das Formular.", s: "Am Schalter der Passkontrolle.", n: "Ruhig und freundlich – für die Beamten ist es Routine." },
    g08: { e: "Me quedo quince días.", d: "Ich bleibe 15 Tage.", s: "Auf die Frage nach der Aufenthaltsdauer.", n: "Zahl einsetzen: Me quedo + Zahl + días." },
    g09: { e: "El motivo del viaje es turismo.", d: "Der Grund der Reise ist Tourismus.", s: "Bei der Einreisebefragung.", n: "motivo = Grund/Zweck. Die Standardantwort." },
    g10: { e: "¿Cuánto tiempo puedo quedarme?", d: "Wie lange darf ich bleiben?", s: "An der Grenze.", n: "Oft 90 Tage für Touristen – aber das Land prüfen." },
    g11: { e: "No tengo nada que declarar.", d: "Ich habe nichts zu verzollen.", s: "Am Zoll.", n: "Der Standardsatz beim grünen Ausgang." },
    g12: { e: "¿Dónde firmo?", d: "Wo muss ich unterschreiben?", s: "Beim Ausfüllen von Formularen.", n: "firmar = unterschreiben; firma = Unterschrift." },
    g13: { e: "¿Me da otro formulario, por favor?", d: "Geben Sie mir ein weiteres Formular, bitte?", s: "Bei der Einreise.", n: "Oft schon im Flugzeug/Bus ausfüllbar." },
    g14: { e: "¿Hay un cajero en la frontera?", d: "Gibt es an der Grenze einen Geldautomaten?", s: "Wenn du Bargeld für die Einreise brauchst.", n: "An Grenzen oft schlechter Kurs – nur wenig wechseln." },
    g15: { e: "El cajero se tragó mi tarjeta.", d: "Der Automat hat meine Karte einbehalten.", s: "Am Geldautomaten – Notfall.", n: "Sofort die Bank kontaktieren; tagsüber an Bankautomaten weniger riskant." },
    g16: { e: "Mi tarjeta no funciona en este cajero.", d: "Meine Karte funktioniert an diesem Automaten nicht.", s: "Beim Abheben.", n: "Einen anderen Automaten oder eine Bank probieren." },
    g17: { e: "El cajero no entrega efectivo.", d: "Der Automat gibt kein Geld aus.", s: "Beim Abheben.", n: "efectivo = Bargeld; den Beleg aufheben." },
    g18: { e: "Creo que bloquearon mi tarjeta.", d: "Ich glaube, meine Karte wurde gesperrt.", s: "Wenn nichts mehr geht.", n: "Die Reise vorher der Bank melden, damit das nicht passiert." },
    g19: { e: "Tengo que llamar a mi banco.", d: "Ich muss meine Bank anrufen.", s: "Bei Kartenproblemen.", n: "Die Notfallnummer der Bank separat notieren." },
    g20: { e: "¿Cuál es la comisión por retiro?", d: "Wie hoch ist die Abhebegebühr?", s: "Am Geldautomaten.", n: "comisión = Gebühr; manche Automaten sind deutlich teurer." },

    // ===================== NOTFALL =====================
    n01: { e: "Es una emergencia, por favor ayúdeme.", d: "Es ist ein Notfall, bitte helfen Sie mir.", s: "In einer ernsten Situation.", n: "emergencia macht sofort klar, dass es dringend ist." },
    n02: { e: "Me siento mal, creo que es la comida.", d: "Mir geht es schlecht, ich glaube, es war das Essen.", s: "Bei Übelkeit – im Hostel oder unterwegs.", n: "Sehr häufig auf Reisen. Ergänzen: Necesito descansar (ich muss mich ausruhen)." },
    n03: { e: "Me duele la cabeza. ¿Tiene algo?", d: "Mir tut der Kopf weh. Haben Sie etwas?", s: "In der Apotheke oder im Hostel.", n: "Struktur Me duele + Körperteil: Me duele la espalda, me duele la garganta." },
    n04: { e: "Me duele el estómago desde ayer.", d: "Mir tut der Bauch seit gestern weh.", s: "Beim Arzt oder in der Apotheke.", n: "Magen-Darm ist der Klassiker – sag, seit wann (desde ayer)." },
    n05: { e: "Tengo fiebre y escalofríos.", d: "Ich habe Fieber und Schüttelfrost.", s: "Bei Krankheit – Apotheke oder Arzt.", n: "fiebre = Fieber; bei hohem Fieber besser zum médico." },
    n06: { e: "Soy alérgico a la penicilina.", d: "Ich bin allergisch gegen Penizillin.", s: "Beim Arzt – sehr wichtig.", n: "Frauen: alérgica. Die konkrete Sache nennen (penicilina, maní, polen)." },
    n07: { e: "Lléveme al hospital, por favor.", d: "Bringen Sie mich ins Krankenhaus, bitte.", s: "Im Taxi bei einem Notfall.", n: "hospital = Krankenhaus; clínica oft privat und schneller." },
    n08: { e: "¡Llame a una ambulancia, rápido!", d: "Rufen Sie einen Krankenwagen, schnell!", s: "Bei einem medizinischen Notfall.", n: "ambulancia = Krankenwagen; in vielen Ländern über die 911." },
    n09: { e: "Necesito medicamentos para el dolor.", d: "Ich brauche Medikamente gegen die Schmerzen.", s: "In der Apotheke.", n: "para el dolor = gegen die Schmerzen; Rezept heißt receta." },
    n10: { e: "Me robaron el celular en la calle.", d: "Man hat mir auf der Straße das Handy gestohlen.", s: "Nach einem Diebstahl – Polizei/Hostel.", n: "Für die Versicherung brauchst du eine Anzeige: una denuncia en la policía." },
    n12: { e: "Perdí mi pasaporte. ¿Qué hago?", d: "Ich habe meinen Reisepass verloren. Was tun?", s: "Bei verlorenem Pass.", n: "Sofort zur embajada (Botschaft) – sie hilft beim Ersatz." },
    n13: { e: "Perdí mi celular, ¿lo puedo llamar?", d: "Ich habe mein Handy verloren, kann ich es anrufen?", s: "Im Hostel, Bus oder Restaurant.", n: "celular = Handy in LatAm; vielleicht hat es jemand gefunden." },
    n14: { e: "Por favor, ¿puede ayudarme? Es urgente.", d: "Bitte, können Sie mir helfen? Es ist dringend.", s: "In jeder Notlage, in der du Hilfe brauchst.", n: "Es urgente unterstreicht die Dringlichkeit." },

    // ===================== BUSREISE =====================
    r01: { e: "Un boleto a Cartagena, por favor.", d: "Ein Ticket nach Cartagena, bitte.", s: "Am Schalter im Busterminal.", n: "boleto/pasaje – das Ziel einsetzen." },
    r02: { e: "Solo ida, por favor.", d: "Nur Hinfahrt, bitte.", s: "Beim Ticketkauf.", n: "ida = hin, ida y vuelta = hin und zurück." },
    r03: { e: "¿A qué hora sale el próximo bus?", d: "Wann fährt der nächste Bus?", s: "Am Terminal.", n: "próximo = nächster; salir = abfahren." },
    r04: { e: "¿Es directo o tiene paradas?", d: "Ist das ein Direktbus oder hält er?", s: "Beim Ticketkauf.", n: "directo = ohne Umsteigen." },
    r05: { e: "Prefiero el bus nocturno.", d: "Ich nehme lieber den Nachtbus.", s: "Beim Planen langer Strecken.", n: "Spart eine Hostel-Nacht; warm anziehen – oft eiskalte Klimaanlage." },
    r06: { e: "¿Para el bus en Salento?", d: "Hält der Bus in Salento?", s: "Beim Ticketkauf/Einsteigen.", n: "parar = (an)halten." },
    r07: { e: "¿Dónde está mi asiento?", d: "Wo ist mein Sitzplatz?", s: "Beim Einsteigen.", n: "asiento = Sitzplatz; die Nummer steht auf dem Ticket." },
    r08: { e: "¿Está libre este asiento?", d: "Ist dieser Platz frei?", s: "Im Bus.", n: "libre = frei, ocupado = besetzt." },
    r09: { e: "¿Cuánto dura el viaje?", d: "Wie lange dauert die Fahrt?", s: "Vor der Abfahrt.", n: "durar = dauern; Strecken sind oft länger als gedacht." },
    r10: { e: "¿Dónde dejo mi equipaje?", d: "Wo gebe ich mein Gepäck auf?", s: "Beim Einsteigen in den Fernbus.", n: "Die Marke (ticket) fürs aufgegebene Gepäck aufheben." },
    r11: { e: "¿Me avisa cuando lleguemos?", d: "Sagen Sie mir Bescheid, wenn wir da sind?", s: "Im Bus, wenn du das Ziel nicht kennst.", n: "avisar = Bescheid geben; sehr hilfreich auf unbekannten Strecken." },
    r12: { e: "¿Está lejos el terminal?", d: "Ist der Busbahnhof weit?", s: "Bei der Anreise.", n: "el terminal / la terminal – beide Formen kommen vor." },
    r13: { e: "¿Hay baño en el bus?", d: "Gibt es eine Toilette im Bus?", s: "Vor langen Fahrten.", n: "Bei Nachtbussen meist ja – Papier selbst dabei haben." },
    r14: { e: "¿Cuántas paradas hay?", d: "Wie viele Stopps gibt es?", s: "Vor der Fahrt.", n: "parada = Halt/Stopp." },
    r15: { e: "¿Para a comer en el camino?", d: "Hält er unterwegs zum Essen an?", s: "Bei langen Fahrten.", n: "parar a + Infinitiv = anhalten, um etwas zu tun: para a comer." },
    r16: { e: "¿Me puede llevar hasta el pueblo?", d: "Können Sie mich bis zum Dorf mitnehmen?", s: "Beim Trampen (mit Vorsicht).", n: "llevar = mitnehmen/bringen; nur in sicheren Situationen." },
    r17: { e: "¿Hasta dónde va?", d: "Bis wohin fahren Sie?", s: "Beim colectivo/Sammeltaxi.", n: "Klärt, ob die Fahrt zu deinem Ziel passt." },
    r18: { e: "¿La combi pasa por la playa?", d: "Fährt der Minibus am Strand vorbei?", s: "Beim Nahverkehr.", n: "combi/colectivo/micro/buseta – das lokale Sammeltaxi, günstig." },
    r19: { e: "Pare en la esquina, por favor.", d: "Halten Sie an der Ecke.", s: "Im colectivo/Taxi.", n: "esquina = Straßenecke – ein beliebter Haltepunkt." },
    r20: { e: "Perdí mi bus, ¿hay otro hoy?", d: "Ich habe meinen Bus verpasst, gibt es heute noch einen?", s: "Wenn du zu spät am Terminal bist.", n: "perder el bus = den Bus verpassen; oft fährt bald der nächste." },

    // ===================== KLEIDUNG & SCHMUCK =====================
    kj01: { e: "¿Dónde puedo comprar ropa barata?", d: "Wo kann ich günstige Kleidung kaufen?", s: "Auf dem Markt oder im Einkaufsviertel.", n: "ropa = Kleidung, immer Singular (kein las ropas)." },
    kj02: { e: "Busco una camiseta de algodón.", d: "Ich suche ein T-Shirt aus Baumwolle.", s: "Beim Klamottenkauf.", n: "In Mexiko playera, sonst camiseta; algodón = Baumwolle." },
    kj03: { e: "¿Tiene esta camisa en azul?", d: "Haben Sie dieses Hemd in Blau?", s: "Im Bekleidungsgeschäft.", n: "camisa = Hemd, camiseta = T-Shirt – nicht verwechseln." },
    kj04: { e: "¿Me puedo probar este pantalón?", d: "Kann ich diese Hose anprobieren?", s: "Beim Hosenkauf.", n: "pantalón meist Singular für eine Hose; Umkleide: el probador." },
    kj05: { e: "¿Cuánto cuestan estos jeans?", d: "Wie viel kosten diese Jeans?", s: "Beim Einkaufen.", n: "jeans wird überall verstanden; formell pantalón de mezclilla (Mexiko)." },
    kj06: { e: "Hace calor, busco un short.", d: "Es ist heiß, ich suche eine kurze Hose.", s: "In warmen Regionen oder am Strand.", n: "short ist gängig; auch pantalones cortos." },
    kj07: { e: "¿Tiene esta falda más corta?", d: "Haben Sie diesen Rock kürzer?", s: "Beim Kleiderkauf.", n: "falda = Rock; más corta = kürzer." },
    kj08: { e: "Me gusta este vestido, ¿qué tallas hay?", d: "Mir gefällt dieses Kleid, welche Größen gibt es?", s: "Beim Kleiderkauf.", n: "vestido = Kleid; talla = Größe." },
    kj09: { e: "Necesito una chaqueta para la noche.", d: "Ich brauche eine Jacke für die Nacht.", s: "Abends oder in kühleren Höhen.", n: "In Mexiko chamarra; im Andenhochland werden Nächte kalt." },
    kj10: { e: "En la montaña hace frío, llevo un suéter.", d: "In den Bergen ist es kalt, ich nehme einen Pullover.", s: "Vor einem Ausflug ins Hochland.", n: "suéter aus dem Englischen, überall verständlich." },
    kj11: { e: "¿Necesito un abrigo en Patagonia?", d: "Brauche ich einen Mantel in Patagonien?", s: "Bei der Reiseplanung in kalte Regionen.", n: "abrigo = dicker Mantel." },
    kj12: { e: "¿Dónde venden calcetines?", d: "Wo verkaufen sie Socken?", s: "Beim Nachkaufen unterwegs.", n: "calcetines = Socken; in manchen Ländern medias." },
    kj13: { e: "Necesito comprar ropa interior.", d: "Ich muss Unterwäsche kaufen.", s: "Beim Nachkaufen.", n: "ropa interior = Unterwäsche (Sammelbegriff)." },
    kj14: { e: "¿Tiene estos zapatos en el número 42?", d: "Haben Sie diese Schuhe in Größe 42?", s: "Beim Schuhkauf.", n: "Schuhgröße = número (nicht talla)." },
    kj15: { e: "Busco unas sandalias cómodas.", d: "Ich suche bequeme Sandalen.", s: "Für warme Regionen.", n: "cómodas = bequem." },
    kj16: { e: "Para la playa solo necesito chanclas.", d: "Für den Strand brauche ich nur Flip-Flops.", s: "Am Strand oder im Hostel-Bad.", n: "chanclas = Flip-Flops, praktisch auch für Gemeinschaftsduschen." },
    kj17: { e: "Necesito un sombrero para el sol.", d: "Ich brauche einen Hut gegen die Sonne.", s: "In sonnigen Regionen.", n: "sombrero = (Sonnen-)Hut mit Krempe." },
    kj18: { e: "En la montaña llevo un gorro.", d: "In den Bergen trage ich eine Mütze.", s: "Im kalten Hochland.", n: "gorro = Mütze; sombrero eher mit Krempe." },
    kj19: { e: "Se me rompieron los lentes de sol.", d: "Meine Sonnenbrille ist kaputtgegangen.", s: "Beim Nachkaufen.", n: "In LatAm oft lentes de sol; in Spanien gafas de sol." },
    kj20: { e: "¿Tiene un cinturón de cuero?", d: "Haben Sie einen Ledergürtel?", s: "Auf dem Kunsthandwerksmarkt.", n: "cuero = Leder; cinturón = Gürtel." },
    kj21: { e: "Compré una bufanda de alpaca.", d: "Ich habe einen Alpaka-Schal gekauft.", s: "Im Andenland als Souvenir.", n: "Alpaka-Textilien sind in Peru und Bolivien typisch." },
    kj22: { e: "Para el volcán necesito guantes.", d: "Für den Vulkan brauche ich Handschuhe.", s: "Vor Touren in große Höhen.", n: "guantes = Handschuhe." },
    kj23: { e: "¿Dónde compro un traje de baño?", d: "Wo kaufe ich einen Badeanzug oder eine Badehose?", s: "Vor dem Strand- oder Pooltag.", n: "traje de baño gilt für beides; auch bañador." },
    kj24: { e: "Estas joyas son artesanales.", d: "Dieser Schmuck ist handgemacht.", s: "Auf dem Kunsthandwerksmarkt.", n: "joyas = echter Schmuck, bisutería = Modeschmuck." },
    kj25: { e: "Me gustan estos aretes de plata.", d: "Mir gefallen diese Silberohrringe.", s: "Beim Schmuckkauf.", n: "In LatAm aretes; in Spanien pendientes." },
    kj26: { e: "¿Cuánto cuesta este collar?", d: "Wie viel kostet diese Halskette?", s: "Auf dem Markt.", n: "collar = Halskette." },
    kj27: { e: "¿La cadena es de plata de verdad?", d: "Ist die Kette aus echtem Silber?", s: "Beim Schmuckkauf – Qualität prüfen.", n: "de plata de verdad = aus echtem Silber." },
    kj28: { e: "Me llevo esta pulsera, es bonita.", d: "Ich nehme dieses Armband, es ist schön.", s: "Als Souvenir.", n: "pulsera = Armband." },
    kj29: { e: "¿Tiene este anillo en otra medida?", d: "Haben Sie diesen Ring in einer anderen Größe?", s: "Beim Ringkauf.", n: "Ringgröße = medida/talla; anillo = Ring." },
    kj30: { e: "Compré una tobillera en la playa.", d: "Ich habe eine Fußkette am Strand gekauft.", s: "In Strandorten beliebt.", n: "tobillera = Fußkettchen (von tobillo, Knöchel)." },
    kj31: { e: "Se me paró el reloj.", d: "Meine Uhr ist stehengeblieben.", s: "Beim Uhrmacher oder auf dem Markt.", n: "reloj = Uhr (Armband- und Wanduhr)." },
    kj32: { e: "Este broche es de artesanía local.", d: "Diese Brosche ist lokales Kunsthandwerk.", s: "Auf dem Souvenirmarkt.", n: "broche = Brosche/Anstecker." },
    kj33: { e: "¿Es de plata o de oro?", d: "Ist das aus Silber oder aus Gold?", s: "Beim Schmuckkauf.", n: "plata = Silber (und umgangssprachlich Geld!), oro = Gold." },
    kj34: { e: "¿Qué talla es esta camisa?", d: "Welche Größe hat dieses Hemd?", s: "Beim Kleiderkauf.", n: "talla = Kleidergröße; Schuhe: número." },
    kj35: { e: "Me gusta. ¿Puedo probármelo?", d: "Es gefällt mir. Kann ich es anprobieren?", s: "Im Bekleidungsgeschäft.", n: "Umkleide: el probador; -melo = es mir." },
    kj36: { e: "Me queda chico. ¿Lo tiene en otra talla?", d: "Es ist mir zu klein. Haben Sie es in einer anderen Größe?", s: "Nach dem Anprobieren.", n: "me queda chico/grande = es ist mir zu klein/groß." },
    kj37: { e: "No me queda, es demasiado grande.", d: "Es passt mir nicht, es ist zu groß.", s: "Nach dem Anprobieren.", n: "demasiado = zu (sehr); kleiner: ¿más pequeño?" },

    // ===================== WEGBESCHREIBUNG =====================
    dir01: { e: "Dobla a la derecha en la esquina.", d: "Biege an der Ecke nach rechts ab.", s: "Wenn dir jemand den Weg beschreibt.", n: "derecha = rechts; nicht mit derecho (geradeaus) verwechseln!" },
    dir02: { e: "La farmacia está a la izquierda.", d: "Die Apotheke ist auf der linken Seite.", s: "Beim Suchen eines Ladens auf der Straße.", n: "a la izquierda = links / auf der linken Seite." },
    dir03: { e: "Sigue derecho hasta la plaza.", d: "Geh geradeaus bis zum Platz.", s: "Wenn der Weg ohne Abbiegen weitergeht.", n: "In LatAm hört man fast immer 'derecho', seltener 'recto'." },
    dir04: { e: "El cajero está en la esquina.", d: "Der Geldautomat ist an der Ecke.", s: "Als Orientierungspunkt beim Suchen.", n: "esquina = Straßenecke; 'a la vuelta de la esquina' = gleich um die Ecke." },
    dir05: { e: "Queda a tres cuadras de aquí.", d: "Es ist drei Häuserblocks von hier entfernt.", s: "Wenn dir die Entfernung in Blocks genannt wird.", n: "In ganz LatAm zählt man in cuadras, nicht in Metern." },
    dir06: { e: "¿En qué calle está el hostal?", d: "In welcher Straße ist das Hostel?", s: "Wenn du eine konkrete Adresse suchst.", n: "calle = Straße; größer/breiter: avenida." },
    dir07: { e: "El museo está sobre la avenida principal.", d: "Das Museum liegt an der Hauptstraße.", s: "Bei großen, breiten Straßen im Zentrum.", n: "Adressen kürzen die avenida oft als 'Av.' ab." },
    dir08: { e: "Tranquilo, está muy cerca.", d: "Keine Sorge, es ist ganz nah.", s: "Wenn das Ziel nur ein paar Schritte entfernt ist.", n: "cerca = nah; Gegenteil: lejos." },
    dir09: { e: "Uy, eso queda muy lejos, mejor toma un taxi.", d: "Oje, das ist sehr weit, nimm besser ein Taxi.", s: "Wenn das Ziel zu weit zum Laufen ist.", n: "lejos = weit; bei langen Strecken lohnt das colectivo oder Taxi." },
    dir10: { e: "Baja aquí, por favor.", d: "Steig bitte hier aus.", s: "Im Taxi oder colectivo, wenn du aussteigen willst.", n: "aquí = hier; 'acá' ist in vielen Ländern noch gebräuchlicher." },
    dir11: { e: "El baño está allí, al fondo.", d: "Die Toilette ist dort, ganz hinten.", s: "Wenn dir etwas in der Ferne gezeigt wird.", n: "allí/allá = dort; 'al fondo' = ganz hinten." },
    dir12: { e: "El hostal está enfrente de la iglesia.", d: "Das Hostel ist gegenüber der Kirche.", s: "Wenn ein Gebäude als Orientierung dient.", n: "enfrente de = gegenüber; nicht mit 'al lado de' (daneben) verwechseln." },
    dir13: { e: "La parada está al lado del mercado.", d: "Die Haltestelle ist neben dem Markt.", s: "Beim Beschreiben benachbarter Orte.", n: "al lado de = direkt daneben." },
    dir14: { e: "El cajero está detrás del banco.", d: "Der Geldautomat ist hinter der Bank.", s: "Wenn das Ziel nicht direkt sichtbar ist.", n: "detrás de = hinter; Gegenteil: delante de / enfrente de." },
    dir15: { e: "La tienda está entre el banco y la farmacia.", d: "Der Laden ist zwischen der Bank und der Apotheke.", s: "Zur genauen Lage zwischen zwei Punkten.", n: "entre A y B = zwischen A und B." },
    dir16: { e: "¿Me puede escribir la dirección?", d: "Können Sie mir die Adresse aufschreiben?", s: "Damit du sie dem Taxifahrer zeigen kannst.", n: "dirección = Adresse (und auch Richtung!); aufschreiben hilft enorm." },
    dir17: { e: "¿Me lo marca en el mapa?", d: "Markieren Sie es mir auf der Karte?", s: "Wenn Worte nicht reichen, zeig es auf der Karte.", n: "el mapa ist trotz -a maskulin: 'el mapa'." },
    dir18: { e: "Disculpe, ¿dónde está la escuela?", d: "Entschuldigung, wo ist die Schule?", s: "Die Standardfrage nach einem festen Ort.", n: "está (von estar) für Orte; bei Gebäuden auch 'queda'." },
    dir19: { e: "Perdón, ¿dónde queda el hostal Sol?", d: "Verzeihung, wo liegt das Hostel Sol?", s: "Beim Fragen nach deiner Unterkunft.", n: "'queda' für Lage ist in LatAm sehr verbreitet – wie 'wo liegt …'." },
    dir20: { e: "Perdón, ¿cómo llego al centro?", d: "Verzeihung, wie komme ich ins Zentrum?", s: "Wenn du den Weg zum Stadtzentrum brauchst.", n: "llegar a = ankommen bei; 'al' = a + el." },
    dir21: { e: "¿Puede decirme cómo llegar a la terminal?", d: "Können Sie mir sagen, wie ich zum Busbahnhof komme?", s: "Höfliche, vollständige Frage nach dem Weg.", n: "'¿Puede decirme …?' klingt besonders höflich." },
    dir22: { e: "Oiga, ¿dónde hay un cajero por acá?", d: "Hallo, wo gibt es hier in der Nähe einen Geldautomaten?", s: "Wenn du dringend Bargeld brauchst.", n: "'¿Dónde hay …?' fragt allgemein 'wo gibt es …?'." },
    dir23: { e: "¿Está lejos o cerca de aquí?", d: "Ist es weit weg oder nah von hier?", s: "Um zu entscheiden, ob du läufst oder fährst.", n: "Gleich nachfragen spart dir lange Umwege zu Fuß." },
    dir24: { e: "¿A cuántas cuadras está el mercado?", d: "Wie viele Blocks ist der Markt entfernt?", s: "Wenn die Antwort 'cerca' dir zu ungenau ist.", n: "Antworten kommen meist als 'a dos cuadras' o.ä." },
    dir25: { e: "¿Cuál es la dirección exacta?", d: "Wie lautet die genaue Adresse?", s: "Vor einer Taxifahrt oder zum Eintippen ins Handy.", n: "'¿Cuál es …?' fragt nach einer konkreten Angabe." },
    dir26: { e: "No entiendo bien. ¿Me lo muestra en el mapa?", d: "Ich verstehe nicht ganz. Zeigen Sie es mir auf der Karte?", s: "Wenn die Wegbeschreibung zu kompliziert wird.", n: "Karte zeigen lassen ist der sicherste Weg, sich nicht zu verlaufen." },
    dir27: { e: "Disculpe, ¿hay un banco por aquí?", d: "Entschuldigung, gibt es hier in der Nähe eine Bank?", s: "Auf der Suche nach Bank, Apotheke oder Supermarkt.", n: "'por aquí' = hier in der Gegend / in der Nähe." },
    dir28: { e: "Dobla a la derecha en el semáforo.", d: "Biege an der Ampel nach rechts ab.", s: "Typische Anweisung beim Wegbeschreiben.", n: "doblar = abbiegen; semáforo = Ampel." },
    dir29: { e: "Dobla a la izquierda después del parque.", d: "Biege nach dem Park nach links ab.", s: "Wenn ein Orientierungspunkt den Abbiegepunkt markiert.", n: "después de = nach; antes de = vor." },
    dir30: { e: "Sigue derecho dos cuadras más.", d: "Geh noch zwei Blocks geradeaus.", s: "Wenn der Weg eine Weile gerade weitergeht.", n: "'… dos cuadras más' = noch zwei Blocks weiter." },
    dir31: { e: "Cruza la calle con cuidado.", d: "Überquere die Straße vorsichtig.", s: "Wenn das Ziel auf der anderen Straßenseite liegt.", n: "cruzar = überqueren; 'con cuidado' = vorsichtig." },
    dir32: { e: "Camina dos cuadras y ahí está.", d: "Geh zwei Blocks und dort ist es.", s: "Kurze, klare Wegbeschreibung zu Fuß.", n: "caminar = (zu Fuß) gehen; 'ahí' = dort." },
    dir33: { e: "Toma la primera calle a la derecha.", d: "Nimm die erste Straße rechts.", s: "Beim genauen Abzählen der Abzweigungen.", n: "primera/segunda calle = erste/zweite Straße." },
    dir34: { e: "El restaurante está en la esquina, no tiene pierde.", d: "Das Restaurant ist an der Ecke, du kannst es nicht verfehlen.", s: "Beruhigende Wegauskunft.", n: "'no tiene pierde' = man kann es nicht verfehlen (sehr LatAm)." },
    dir35: { e: "La panadería está al lado del mercado.", d: "Die Bäckerei ist neben dem Markt.", s: "Lage über einen bekannten Nachbarort erklären.", n: "al lado del = a + el lado de el (Verschmelzung del)." },
    dir36: { e: "El hotel está enfrente de la iglesia.", d: "Das Hotel ist gegenüber der Kirche.", s: "Kirchen sind oft der beste Orientierungspunkt.", n: "Plaza und iglesia sind in jeder Stadt verlässliche Landmarken." },
    dir37: { e: "El cajero está entre el banco y la farmacia.", d: "Der Geldautomat ist zwischen der Bank und der Apotheke.", s: "Genaue Lage zwischen zwei Geschäften.", n: "entre … y … grenzt den Ort eindeutig ein." },
    dir38: { e: "Queda a dos cuadras de aquí, nomás.", d: "Es ist nur zwei Blocks von hier entfernt.", s: "Wenn das Ziel zum Glück ganz nah ist.", n: "'nomás' (= nur) ist ein typisches LatAm-Füllwort." },
    dir39: { e: "Camina hacia la plaza, hacia el norte.", d: "Geh in Richtung Platz, nach Norden.", s: "Wenn dir eine grobe Richtung statt eines Ziels genannt wird.", n: "hacia = in Richtung; gibt die Richtung an, nicht das genaue Ziel." },
    dir40: { e: "Sigue derecho hasta el semáforo.", d: "Geh geradeaus bis zur Ampel.", s: "Wenn ein Punkt das Ende der Strecke markiert.", n: "hasta = bis (zu); markiert den Endpunkt des Wegstücks." },
    dir41: { e: "El banco está diagonal al supermercado.", d: "Die Bank ist schräg gegenüber dem Supermarkt.", s: "Für eine Lage über Eck an einer Kreuzung.", n: "diagonal a = schräg/diagonal gegenüber." },
    dir42: { e: "El hostal está junto a la iglesia.", d: "Das Hostel ist direkt bei der Kirche.", s: "Für etwas unmittelbar daneben.", n: "junto a / próximo a = direkt bei / nahe bei." },
    dir43: { e: "Dobla a la derecha antes del puente.", d: "Bieg vor der Brücke rechts ab.", s: "Wenn der Abbiegepunkt vor einer Landmarke liegt.", n: "antes de = vor; del = de + el." },
    dir44: { e: "La farmacia está después del cruce.", d: "Die Apotheke ist nach der Kreuzung.", s: "Wenn das Ziel hinter einem Punkt liegt.", n: "después de = nach (örtlich wie zeitlich)." },
    dir45: { e: "El cajero está a la vuelta de la esquina.", d: "Der Geldautomat ist gleich um die Ecke.", s: "Wenn etwas ganz nah, nur um die Ecke ist.", n: "a la vuelta de la esquina = gleich um die Ecke." },
    dir46: { e: "Tranquilo, está a un paso de aquí.", d: "Keine Sorge, es ist nur einen Katzensprung entfernt.", s: "Wenn das Ziel sehr nah ist.", n: "a un paso = ganz nah, wörtlich 'einen Schritt' entfernt." },
    dir47: { e: "El mar queda hacia el norte.", d: "Das Meer liegt im Norden.", s: "Bei grober Orientierung nach Himmelsrichtung.", n: "Norte, Sur, Este, Oeste – die vier Himmelsrichtungen." },
    dir48: { e: "El centro está más al sur.", d: "Das Zentrum ist weiter südlich.", s: "Grobe Orientierung in der Stadt.", n: "'más al sur' = weiter südlich." },
    dir49: { e: "El sol sale por el este.", d: "Die Sonne geht im Osten auf.", s: "Eselsbrücke zur Orientierung.", n: "este = Osten; nicht mit 'este' (= dieser) verwechseln." },
    dir50: { e: "La playa está al oeste.", d: "Der Strand liegt im Westen.", s: "Orientierung Richtung Küste.", n: "oeste = Westen; dort geht die Sonne unter." },
    dir51: { e: "Dobla a la derecha en el semáforo.", d: "Bieg an der Ampel rechts ab.", s: "Ampeln sind klare Orientierungspunkte.", n: "semáforo = Ampel; wird oft als Wegmarke genannt." },
    dir52: { e: "Da la vuelta en la rotonda y sigue derecho.", d: "Fahr im Kreisverkehr herum und dann geradeaus.", s: "Beim Beschreiben eines Kreisverkehrs.", n: "rotonda; je nach Land auch glorieta (Mexiko) oder redondel." },
    dir53: { e: "Para en el próximo cruce, por favor.", d: "Halt bitte an der nächsten Kreuzung.", s: "Im Taxi oder colectivo zum Aussteigen.", n: "cruce = Kreuzung; auch intersección." },
    dir54: { e: "Cruza el puente y sigue derecho.", d: "Überquere die Brücke und geh geradeaus.", s: "Wenn der Weg über eine Brücke führt.", n: "puente = Brücke; eine gut sichtbare Landmarke." },
    dir55: { e: "La parada está al lado del mercado.", d: "Die Haltestelle ist neben dem Markt.", s: "Auf der Suche nach Bus oder colectivo.", n: "parada = Haltestelle; Busbahnhof: terminal." },
    dir56: { e: "Gira a la derecha en la esquina.", d: "Bieg an der Ecke rechts ab.", s: "Variante zu 'doblar' beim Wegbeschreiben.", n: "girar = abbiegen; in Mexiko auch 'voltear'." },
    dir57: { e: "Sube por esta calle hasta la plaza.", d: "Geh diese Straße hinauf bis zum Platz.", s: "Bei ansteigenden Straßen (Hügel).", n: "subir = hinaufgehen; in hügeligen Städten ständig gebraucht." },
    dir58: { e: "Baja por esta calle dos cuadras.", d: "Geh diese Straße zwei Blocks hinunter.", s: "Bei abfallenden Straßen.", n: "bajar = hinuntergehen; Gegenteil von subir." },
    dir59: { e: "Te pasaste, devuélvete una cuadra.", d: "Du bist zu weit, geh einen Block zurück.", s: "Wenn du zu weit gelaufen bist.", n: "devuélvete / regrésate = geh zurück (sehr LatAm)." },
    dir60: { e: "Pasa el semáforo y está a la izquierda.", d: "Geh an der Ampel vorbei, dann ist es links.", s: "Wenn das Ziel kurz hinter einem Punkt liegt.", n: "pasar = vorbeigehen / passieren." },
    dir61: { e: "Disculpe, ¿por dónde se va al mercado?", d: "Entschuldigung, wo geht's zum Markt lang?", s: "Allgemeine Frage nach der Richtung.", n: "'¿Por dónde se va a…?' = wie kommt man zu…?" },
    dir62: { e: "Perdón, ¿voy bien para la plaza?", d: "Verzeihung, bin ich auf dem richtigen Weg zur Plaza?", s: "Unterwegs kurz rückversichern.", n: "'¿Voy bien para…?' = bin ich richtig Richtung…?" },
    dir63: { e: "¿Dónde hay una tienda de ropa por aquí?", d: "Wo gibt es hier in der Nähe ein Bekleidungsgeschäft?", s: "Auf der Suche nach einem bestimmten Laden.", n: "'¿Dónde hay…?' fragt allgemein nach 'wo gibt es…?'." },
    dir64: { e: "¿Se puede ir caminando o mejor tomo un taxi?", d: "Kann man zu Fuß gehen oder nehme ich besser ein Taxi?", s: "Um den Aufwand abzuschätzen.", n: "ir caminando / a pie = zu Fuß gehen." },
    dir65: { e: "¿Cuánto se tarda a pie hasta el centro?", d: "Wie lange dauert es zu Fuß bis ins Zentrum?", s: "Die Gehzeit erfragen.", n: "'a pie' = zu Fuß; 'tardar' = (Zeit) brauchen." },

    // ===================== KONJUGIEREN (Verben im Präsens) =====================
    vb01: { e: "Voy a la terminal de buses.", d: "Ich fahre zum Busbahnhof.", s: "Wenn dich jemand fragt, wohin du unterwegs bist.", n: "ir + a = hingehen/hinfahren. Vor el wird daraus al: Voy al centro." },
    vb02: { e: "¿Vas a la fiesta del hostal esta noche?", d: "Gehst du heute Abend zur Hostel-Party?", s: "Smalltalk im Dorm oder in der Gemeinschaftsküche.", n: "Mit ¿Vas a …? lädst du ganz nebenbei zum Mitkommen ein." },
    vb03: { e: "Este bus va al aeropuerto, ¿verdad?", d: "Dieser Bus fährt zum Flughafen, oder?", s: "Vor dem Einsteigen kurz absichern.", n: "va gilt auch für usted: ¿Va al centro? = Fahren Sie ins Zentrum?" },
    vb04: { e: "Vamos a la playa, ¿te unes?", d: "Wir gehen an den Strand, kommst du mit?", s: "Pläne in der Hostel-Runde schmieden.", n: "¡Vamos! allein heißt 'Los geht's!' – eines der nützlichsten Wörter überhaupt." },
    vb05: { e: "Mis amigos van a Medellín mañana.", d: "Meine Freunde fahren morgen nach Medellín.", s: "Wenn du Reisepläne anderer weitergibst.", n: "van gilt für ellos UND ustedes: ¿Van al mismo hostal? = Geht ihr ins selbe Hostel?" },
    vb06: { e: "Doblo a la derecha en el semáforo, ¿no?", d: "Ich biege an der Ampel rechts ab, oder?", s: "Eine erklärte Route noch einmal rückversichern.", n: "Die ich-Form endet bei fast allen Verben auf -o – daran erkennst du den Sprecher sofort." },
    vb07: { e: "Doblas a la izquierda y ahí está la plaza.", d: "Du biegst links ab, und da ist der Platz.", s: "So klingt die Antwort, wenn dir jemand den Weg erklärt.", n: "Wegbeschreibungen kommen oft in der du-Form (-as) statt als Befehl – beides ist üblich." },
    vb08: { e: "El bus dobla en la esquina y para enfrente del mercado.", d: "Der Bus biegt an der Ecke ab und hält gegenüber dem Markt.", s: "Wenn dir jemand die Busroute beschreibt.", n: "Dieselbe Form für er/sie/usted – der Zusammenhang verrät, wer gemeint ist." },
    vb09: { e: "¿Doblamos aquí o en la próxima calle?", d: "Biegen wir hier ab oder an der nächsten Straße?", s: "Gemeinsam unterwegs, kurz die Route klären.", n: "-amos ist immer die wir-Form bei -ar-Verben: caminamos, tomamos, cruzamos." },
    vb10: { e: "Los taxis doblan aquí porque la calle está cerrada.", d: "Die Taxis biegen hier ab, weil die Straße gesperrt ist.", s: "Wenn jemand eine Umleitung erklärt.", n: "-an deckt sie UND ihr ab: ¿Doblan ustedes también? = Biegt ihr auch ab?" },
    vb11: { e: "Camino al centro, no está lejos.", d: "Ich gehe zu Fuß ins Zentrum, es ist nicht weit.", s: "Wenn du ein Taxi-Angebot freundlich ablehnst.", n: "Gleiches Muster wie doblo: Stamm camin- + -o. So funktionieren alle -ar-Verben." },
    vb12: { e: "Cruzas el puente y el hostal queda a la derecha.", d: "Du überquerst die Brücke, und das Hostel liegt rechts.", s: "Typischer Satz in einer Wegbeschreibung.", n: "cruzar, doblar, caminar, seguir – die vier Verben, mit denen fast jede Route erklärt wird." },
    vb13: { e: "Tomo el bus de las ocho a Salta.", d: "Ich nehme den Acht-Uhr-Bus nach Salta.", s: "Deine Reisepläne erzählen oder ein Ticket kaufen.", n: "tomar heißt auch trinken: Tomo un café = Ich trinke einen Kaffee." },
    vb14: { e: "Hablo un poco de español.", d: "Ich spreche ein bisschen Spanisch.", s: "Der ehrliche Eisbrecher in jedem Gespräch.", n: "Bescheiden bleiben lohnt sich – dein Gegenüber spricht dann automatisch langsamer." },
    vb15: { e: "¿Hablas inglés o solo español?", d: "Sprichst du Englisch oder nur Spanisch?", s: "Beim Kennenlernen im Hostel.", n: "Höflich an Fremde gerichtet: ¿Habla inglés? (usted-Form, ohne -s)." },
    vb16: { e: "Como en el mercado, es más barato.", d: "Ich esse auf dem Markt, das ist billiger.", s: "Backpacker-Spartipp beim Essen-Smalltalk.", n: "-er-Verben: -o/-es/-e/-emos/-en – fast wie -ar, nur mit e." },
    vb17: { e: "¿Comes carne o eres vegetariano?", d: "Isst du Fleisch oder bist du Vegetarier?", s: "Vor dem gemeinsamen Kochen oder Restaurantbesuch.", n: "Für Frauen: vegetariana. Praktisch beim Bestellen: sin carne = ohne Fleisch." },
    vb18: { e: "Hoy comemos todos juntos en el hostal.", d: "Heute essen wir alle zusammen im Hostel.", s: "Gemeinsames Abendessen im Hostel organisieren.", n: "comemos = wir essen; bei -ir-Verben wäre es -imos: vivimos." },
    vb19: { e: "Vivo en Alemania, pero viajo seis meses.", d: "Ich wohne in Deutschland, aber ich reise sechs Monate.", s: "Die Standard-Vorstellung unter Backpackern.", n: "Der Klassiker nach ¿De dónde eres? – kurz, ehrlich, gesprächsöffnend." },
    vb20: { e: "¿Vives aquí o también estás de viaje?", d: "Wohnst du hier oder bist du auch auf Reisen?", s: "Smalltalk im Café oder auf einer Tour.", n: "estar de viaje = auf Reisen sein – super Anschlussfrage zum Kennenlernen." },
    vb21: { e: "Estoy en la esquina, ¿dónde estás tú?", d: "Ich bin an der Ecke – wo bist du?", s: "Wenn ihr euch in der Stadt sucht (z. B. per WhatsApp).", n: "estar für Ort & Zustand: Estoy perdido = Ich habe mich verlaufen." },
    vb22: { e: "¿Estás cerca o tomamos un taxi?", d: "Bist du in der Nähe, oder nehmen wir ein Taxi?", s: "Treffen koordinieren, wenn die Zeit knapp ist.", n: "estás trägt den Akzent auf dem a – hörbar betont: es-TAS." },
    vb23: { e: "Disculpe, ¿dónde está la terminal?", d: "Entschuldigung, wo ist der Busbahnhof?", s: "DIE Frage, mit der jede Wegbeschreibung beginnt.", n: "Nach Orten IMMER mit estar fragen, nie mit ser: ¿Dónde está …?" },
    vb24: { e: "Ya estamos en el centro, ¿ahora a dónde?", d: "Wir sind schon im Zentrum – wohin jetzt?", s: "Unterwegs mit anderen die nächste Etappe klären.", n: "ya = schon/bereits; estamos = wir sind (am Ort)." },
    vb25: { e: "Soy de Alemania, ¿y tú?", d: "Ich bin aus Deutschland, und du?", s: "Die häufigste Frage im Hostel beantworten.", n: "Herkunft & Eigenschaften mit ser; Ort & Zustand mit estar – die wichtigste Unterscheidung." },
    vb26: { e: "¿Eres de aquí? Busco una buena arepería.", d: "Bist du von hier? Ich suche ein gutes Arepa-Lokal.", s: "Einheimische nach Geheimtipps fragen.", n: "Lokale Tipps schlagen jede App – die Frage öffnet fast immer ein nettes Gespräch." },
    vb27: { e: "Ella es mi amiga del hostal.", d: "Sie ist meine Freundin aus dem Hostel.", s: "Reisebekanntschaften einander vorstellen.", n: "es = er/sie/usted-Form von ser. Nicht verwechseln mit está (Ort/Zustand)." },
    vb28: { e: "Tengo una reserva a nombre de Marcel.", d: "Ich habe eine Reservierung auf den Namen Marcel.", s: "Beim Check-in im Hostel oder Hotel.", n: "tengo brauchst du ständig: Tengo hambre/sed/frío = Ich habe Hunger/Durst/mir ist kalt." },
    vb29: { e: "¿Tienes cambio para el bus?", d: "Hast du Kleingeld für den Bus?", s: "Unter Reisenden, bevor der colectivo kommt.", n: "cambio = Kleingeld/Wechselgeld – im Bus oft Pflicht, große Scheine sind unbeliebt." },
    vb30: { e: "¿Tiene una cama libre para esta noche?", d: "Haben Sie ein Bett frei für heute Nacht?", s: "Spontan ohne Buchung im Hostel ankommen.", n: "tiene = usted-Form – die höfliche Standardform an jeder Rezeption." },
    vb31: { e: "¿Puedo dejar mi mochila aquí?", d: "Kann ich meinen Rucksack hier lassen?", s: "Vor dem Check-in oder nach dem Check-out.", n: "puedo + Infinitiv = ich kann/darf …: ¿Puedo pagar con tarjeta? = Kann ich mit Karte zahlen?" },
    vb32: { e: "¿Puedes repetir más despacio, por favor?", d: "Kannst du das bitte langsamer wiederholen?", s: "Wenn die Antwort zu schnell kam.", n: "Stammwechsel o→ue: puedo, puedes, puede – nur podemos bleibt beim o." },
    vb33: { e: "¿Puede mostrarme en el mapa?", d: "Können Sie es mir auf der Karte zeigen?", s: "Wenn die Wegbeschreibung zu kompliziert wird.", n: "puede = höfliche Sie-Form. Der Karten-Trick rettet jede verlorene Wegbeschreibung." },
    vb34: { e: "Quiero un boleto a Cusco, por favor.", d: "Ich möchte ein Ticket nach Cusco, bitte.", s: "Am Busschalter oder bei der Agentur.", n: "quiero + Nomen oder Infinitiv: Quiero ir a Cusco = Ich will nach Cusco fahren." },
    vb35: { e: "¿Quieres ir a comer algo?", d: "Willst du etwas essen gehen?", s: "Jemanden aus dem Hostel locker einladen.", n: "Stammwechsel e→ie: quiero, quieres, quiere – queremos bleibt beim e." },
    vb36: { e: "Sigo derecho hasta la plaza, ¿verdad?", d: "Ich gehe weiter geradeaus bis zum Platz, richtig?", s: "Die gehörte Route zur Sicherheit wiederholen.", n: "Wer die Beschreibung in der ich-Form nachspricht, merkt sie sich doppelt so gut." },
    vb37: { e: "Sigues derecho dos cuadras más.", d: "Du gehst noch zwei Blocks geradeaus weiter.", s: "Der häufigste Satz in jeder Wegbeschreibung.", n: "seguir + derecho = geradeaus weitergehen; cuadra = Häuserblock (LatAm)." },
    vb38: { e: "Usted sigue por esta calle hasta el final.", d: "Sie gehen diese Straße bis zum Ende weiter.", s: "So erklären es dir ältere oder förmlichere Menschen.", n: "Auch als Anweisung üblich: ¡Siga derecho! – die höfliche Befehlsform." },
    vb39: { e: "Voy al centro a buscar un cajero.", d: "Ich gehe ins Zentrum, um einen Geldautomaten zu suchen.", s: "Kurz sagen, wohin du verschwindest.", n: "a + el verschmilzt zu al – Voy a el centro gibt es nicht." },
    vb40: { e: "Doblas a la derecha y sigues derecho hasta el parque.", d: "Du biegst rechts ab und gehst geradeaus weiter bis zum Park.", s: "Eine komplette Mini-Wegbeschreibung verstehen.", n: "Zwei du-Endungen hintereinander (-as, -es) – hör auf die Endungen, nicht auf Pronomen." },
    vb41: { e: "Mañana vamos a Cusco en bus nocturno.", d: "Morgen fahren wir mit dem Nachtbus nach Cusco.", s: "Reisepläne mit anderen teilen.", n: "vamos a + Ort = wir fahren nach; vamos a + Verb = wir werden … (nahe Zukunft!)." },
    vb42: { e: "¿Puede hablar más despacio? Estoy aprendiendo español.", d: "Können Sie langsamer sprechen? Ich lerne gerade Spanisch.", s: "Wenn die Antwort auf deine Frage zu schnell kommt.", n: "Der Zusatz Estoy aprendiendo zaubert fast immer ein Lächeln und viel Geduld hervor." },

    // ===================== ZEITEN (Tiempos) =====================
    tp01: { e: "Llegué ayer en la noche.", d: "Ich bin gestern Abend angekommen.", s: "Im Hostel erzählen, seit wann du da bist.", n: "Indefinido: abgeschlossene Vergangenheit mit klarem Zeitpunkt (ayer). llegar → llegué (g→gu vor e)." },
    tp02: { e: "Tomé el bus equivocado.", d: "Ich habe den falschen Bus genommen.", s: "Erklären, warum du zu spät oder am falschen Ort bist.", n: "tomar → tomé. Die -ar-Vergangenheit der ich-Form endet immer auf -é." },
    tp03: { e: "Compramos los boletos en la terminal.", d: "Wir haben die Tickets am Busbahnhof gekauft.", s: "Erzählen, wo ihr eure Fahrkarten besorgt habt.", n: "Bei -ar-Verben ist die wir-Form im Indefinido gleich wie in der Gegenwart (compramos) – der Satz verrät die Zeit." },
    tp04: { e: "Estuve en Cusco tres días.", d: "Ich war drei Tage in Cusco.", s: "Von deiner Route und vergangenen Stationen erzählen.", n: "estar ist unregelmäßig: estuve/estuviste/estuvo. Nicht 'esté'." },
    tp05: { e: "Ayer fuimos a la playa todo el día.", d: "Gestern waren wir den ganzen Tag am Strand.", s: "Vom gestrigen Ausflug erzählen.", n: "ir und ser teilen dieselbe Vergangenheit: fui/fuiste/fue/fuimos/fueron. Der Kontext sagt, welches gemeint ist." },
    tp06: { e: "Me gustó mucho el ceviche.", d: "Das Ceviche hat mir sehr gefallen.", s: "Nach dem Essen ein Kompliment machen.", n: "gustar in der Vergangenheit: me gustó (Einzahl), me gustaron (Mehrzahl)." },
    tp07: { e: "¿Qué hiciste el fin de semana?", d: "Was hast du am Wochenende gemacht?", s: "Smalltalk im Hostel oder mit Reisebekanntschaften.", n: "hacer ist unregelmäßig: hice/hiciste/hizo. Beliebte Gesprächs-Eröffnung." },
    tp08: { e: "Perdí mi pasaporte en el bus.", d: "Ich habe meinen Pass im Bus verloren.", s: "Der Ernstfall – bei Polizei, Botschaft oder Hostel-Rezeption.", n: "perder → perdí. -er/-ir-Verben enden in der ich-Vergangenheit auf -í." },
    tp09: { e: "Ayer llovió toda la tarde.", d: "Gestern hat es den ganzen Nachmittag geregnet.", s: "Übers Wetter und verschobene Pläne reden.", n: "llovió = es regnete (einmaliges Ereignis). 'llovía' wäre der andauernde Hintergrund." },
    tp10: { e: "Ya he comido, gracias.", d: "Ich habe schon gegessen, danke.", s: "Ein Angebot höflich ablehnen.", n: "Perfecto: haber + Partizip (he comido). 'ya' (schon) ist das typische Signalwort." },
    tp11: { e: "¿Has visto Machu Picchu alguna vez?", d: "Hast du Machu Picchu schon mal gesehen?", s: "Nach Reise-Erfahrungen fragen.", n: "ver hat ein unregelmäßiges Partizip: visto (nicht 'veído')." },
    tp12: { e: "Nunca he estado aquí, soy nuevo.", d: "Ich war noch nie hier, ich bin neu.", s: "Um eine Empfehlung oder Hilfe bitten.", n: "Perfecto für Lebens-Erfahrung: 'nunca he estado' = noch nie gewesen." },
    tp13: { e: "Hemos llegado hace cinco minutos.", d: "Wir sind vor fünf Minuten angekommen.", s: "An der Rezeption beim Einchecken.", n: "wir-Form des Perfekts: hemos + Partizip. Für gerade eben Geschehenes." },
    tp14: { e: "El hostal era muy bonito y tranquilo.", d: "Das Hostel war sehr schön und ruhig.", s: "Eine Unterkunft weiterempfehlen oder beschreiben.", n: "Imperfecto für Beschreibungen: era (ser). Kein klarer Endpunkt, sondern ein Zustand." },
    tp15: { e: "De niño viajaba mucho con mi familia.", d: "Als Kind bin ich viel mit meiner Familie gereist.", s: "Beim Erzählen aus der Vergangenheit, von Gewohnheiten.", n: "Imperfecto für Gewohnheiten: viajaba = reiste regelmäßig (-aba bei -ar-Verben)." },
    tp16: { e: "Hola, solo quería preguntar una cosa.", d: "Hallo, ich wollte nur etwas fragen.", s: "Höflich ein Anliegen einleiten.", n: "'quería' (Imperfekt) klingt sanfter und höflicher als das direkte 'quiero'." },
    tp17: { e: "¿A qué hora sale el próximo bus?", d: "Wann fährt der nächste Bus?", s: "Am Schalter oder Busbahnhof nach dem Fahrplan fragen.", n: "Gegenwart für Festes wie Fahrpläne: sale (salir) = fährt ab." },
    tp18: { e: "Hoy me quedo en el hostal a descansar.", d: "Heute bleibe ich zum Ausruhen im Hostel.", s: "Pläne für den Tag mitteilen.", n: "Gegenwart für das, was heute gilt. quedarse = bleiben (reflexiv: me quedo)." },
    tp19: { e: "Voy a tomar el bus de las ocho.", d: "Ich werde den Acht-Uhr-Bus nehmen.", s: "Deinen nächsten Schritt ankündigen.", n: "ir a + Infinitiv = nahe Zukunft. Der einfachste Weg, Pläne auszudrücken." },
    tp20: { e: "Vamos a salir mañana temprano.", d: "Wir werden morgen früh aufbrechen.", s: "Eine gemeinsame Abfahrt planen.", n: "vamos a + Infinitiv = wir werden … Achtung: 'vamos a' kann auch 'lass uns …' heißen." },
    tp21: { e: "¿Qué vas a hacer en La Paz?", d: "Was wirst du in La Paz machen?", s: "Nach den Plänen deiner Reisebekanntschaft fragen.", n: "vas a + Infinitiv. Sehr häufige Frage unter Reisenden." },
    tp22: { e: "Lleva paraguas, va a llover.", d: "Nimm einen Schirm mit, es wird regnen.", s: "Eine Wetter-Warnung oder einen Tipp geben.", n: "va a llover = es wird regnen. Wetter-Verben gibt es nur in der er/es-Form." },
    tp23: { e: "Voy a hacer una reserva para dos noches.", d: "Ich werde eine Reservierung für zwei Nächte machen.", s: "An der Rezeption oder am Telefon buchen.", n: "ir a + hacer. hacer una reserva = reservieren/buchen." },
    tp24: { e: "Llegaré mañana por la mañana.", d: "Ich werde morgen früh ankommen.", s: "Deine Ankunft beim Gastgeber ankündigen.", n: "Futuro simple: Infinitiv llegar + é. Endung -é/-ás/-á/-emos/-án für alle Verben." },
    tp25: { e: "Un taxi al aeropuerto será caro.", d: "Ein Taxi zum Flughafen wird teuer sein.", s: "Kosten abschätzen, bevor du dich entscheidest.", n: "Futur auch für Vermutungen: 'será caro' = das ist wohl/wird teuer." },
    tp26: { e: "No sé todavía, ya veremos.", d: "Ich weiß noch nicht, wir werden sehen.", s: "Eine Entscheidung offen lassen.", n: "'Ya veremos' ist eine feste Floskel – sehr gebräuchlich in ganz LatAm." },
    tp27: { e: "Querría una habitación privada, por favor.", d: "Ich hätte gern ein Privatzimmer, bitte.", s: "Höflich an der Rezeption nach einem Zimmer fragen.", n: "Condicional 'querría' (oder 'me gustaría') ist die höflichste Art zu bestellen." },
    tp28: { e: "¿Podría ayudarme con la dirección?", d: "Könnten Sie mir mit der Adresse helfen?", s: "Jemanden höflich um Hilfe bitten.", n: "'¿Podría?' ist höflicher als '¿Puede?' – ideal bei Fremden und in Ämtern." },
    tp29: { e: "Ayer estaba cansado, pero hoy estoy bien.", d: "Gestern war ich müde, aber heute geht's mir gut.", s: "Übers eigene Befinden reden.", n: "estaba (Imperfekt, Zustand gestern) vs. estoy (Gegenwart, jetzt). Signalwörter: ayer/hoy." },
    tp30: { e: "Mañana voy a Lima en avión.", d: "Morgen fliege ich nach Lima.", s: "Den nächsten Reise-Abschnitt ankündigen.", n: "Fürs ganz Nahe reicht oft die Gegenwart: 'mañana voy' statt 'iré'. Das Wort mañana macht die Zukunft klar." },
    tp31: { e: "Estoy comiendo, te llamo después.", d: "Ich esse gerade, ich rufe dich später an.", s: "Kurz sagen, dass du gerade beschäftigt bist.", n: "estar + Gerundio (-ando/-iendo) = genau jetzt im Gange. Nicht für die Zukunft verwenden." },
    tp32: { e: "¿Qué estás haciendo aquí?", d: "Was machst du gerade hier?", s: "Eine bekannte Person überrascht antreffen.", n: "haciendo ist das Gerundio von hacer. estás + Gerundio fragt nach dem Moment." },
    tp33: { e: "Estamos esperando el bus desde hace una hora.", d: "Wir warten schon seit einer Stunde auf den Bus.", s: "Sich über eine lange Wartezeit austauschen.", n: "esperando = wartend. 'desde hace' drückt aus, seit wann etwas läuft." },
    tp34: { e: "No salgas, está lloviendo fuerte.", d: "Geh nicht raus, es regnet stark.", s: "Vor schlechtem Wetter warnen.", n: "Wetter im Moment: está lloviendo. Das Gerundio von llover ist lloviendo." },
    tp35: { e: "Estoy buscando un hostal barato cerca del centro.", d: "Ich suche gerade ein günstiges Hostel nahe dem Zentrum.", s: "Bei der Ankunft nach einer Unterkunft fragen.", n: "buscando = suchend. Tipp: 'estoy buscando' klingt aktiver als nur 'busco'." },
    tp36: { e: "Dígame, ¿en qué le puedo ayudar?", d: "Sagen Sie, womit kann ich Ihnen helfen?", s: "So wirst du oft an der Rezeption begrüßt.", n: "Dígame ist der höfliche Befehl (usted) von decir – am Telefon auch einfach 'Hallo?'." },
    tp37: { e: "Siga derecho y doble en la esquina.", d: "Gehen Sie geradeaus und biegen Sie an der Ecke ab.", s: "Eine Wegbeschreibung verstehen oder geben.", n: "Siga = höflicher Befehl von seguir. Befehle an 'usted' enden bei -ir/-er-Verben auf -a." },
    tp38: { e: "Espere un momento, por favor.", d: "Warten Sie bitte einen Moment.", s: "Jemanden höflich um kurze Geduld bitten.", n: "Espere = Befehl (usted) von esperar. -ar-Verben enden im usted-Befehl auf -e." },
    tp39: { e: "Ayúdeme, por favor, estoy perdido.", d: "Helfen Sie mir bitte, ich habe mich verlaufen.", s: "Im Notfall oder bei Orientierungslosigkeit.", n: "ayudar → ayude (usted) + me = ayúdeme. Das angehängte me bekommt einen Akzent." },
    tp40: { e: "Tráigame la cuenta, por favor.", d: "Bringen Sie mir bitte die Rechnung.", s: "Im Restaurant nach der Rechnung fragen.", n: "traer → traiga (usted) + me = tráigame. la cuenta = die Rechnung." },
    tp41: { e: "Dime, ¿cómo llego a la plaza?", d: "Sag mir, wie komme ich zum Platz?", s: "Vertraut jemanden um eine Auskunft bitten.", n: "Dime ist die vertraute Form (tú) von decir. Locker unter Reisenden gleichen Alters." },
    tp42: { e: "Ven, el bus ya está aquí.", d: "Komm, der Bus ist schon da.", s: "Eine vertraute Person zur Eile antreiben.", n: "Ven ist ein unregelmäßiger tú-Befehl von venir – ganz kurz, nur ein Wort." },
    tp43: { e: "Mira, ese es nuestro hostal.", d: "Schau, das ist unser Hostel.", s: "Jemanden auf etwas aufmerksam machen.", n: "Mira (von mirar) heißt wörtlich 'schau' – wird oft nur als 'hey, pass auf' benutzt." },
    tp44: { e: "Acabo de llegar a la ciudad.", d: "Ich bin gerade in der Stadt angekommen.", s: "Sagen, dass du eben erst da bist.", n: "acabar de + Infinitiv = gerade eben getan. Praktischer als das Perfekt für 'soeben'." },
    tp45: { e: "El bus acaba de salir, hay otro en una hora.", d: "Der Bus ist gerade abgefahren, in einer Stunde gibt es einen anderen.", s: "Wenn du den Anschluss knapp verpasst hast.", n: "acaba de salir = ist gerade abgefahren. acabar passt sich der Person an (acabo/acaba)." },
    tp46: { e: "¿Hay wifi aquí? ¿Cuál es la contraseña?", d: "Gibt es hier WLAN? Wie lautet das Passwort?", s: "Im Café, Hostel oder am Busbahnhof.", n: "hay = es gibt (für eins oder viele gleich). Sehr häufige Reise-Frage." },
    tp47: { e: "No había agua caliente en la ducha.", d: "Es gab kein warmes Wasser in der Dusche.", s: "An der Rezeption ein Problem melden.", n: "había = es gab (Imperfekt von hay), für andauernde Zustände in der Vergangenheit." },
    tp48: { e: "¿Habrá un bus nocturno a Arequipa?", d: "Wird es einen Nachtbus nach Arequipa geben?", s: "Nach künftigen Verbindungen fragen.", n: "habrá = es wird geben (Futur von hay). Eine Form für eins oder viele." },
    tp49: { e: "Tuve un problema con la reserva.", d: "Ich hatte ein Problem mit der Reservierung.", s: "Eine Schwierigkeit beim Einchecken erklären.", n: "tener wird in der Vergangenheit zu tuve/tuvo – Stammwechsel, kein Akzent." },
    tp50: { e: "No pude dormir por el ruido.", d: "Ich konnte wegen des Lärms nicht schlafen.", s: "Über eine schlechte Nacht im Hostel klagen.", n: "poder → pude (kein Akzent). 'No pude' = ich schaffte es nicht / konnte nicht." },
    tp51: { e: "El taxista me dijo que es caro.", d: "Der Taxifahrer hat mir gesagt, dass es teuer ist.", s: "Etwas weitergeben, das dir jemand gesagt hat.", n: "decir → dijo (mit j). 'me dijo que …' = er/sie sagte mir, dass …" },
    tp52: { e: "¿Cuándo viniste a Bolivia?", d: "Wann bist du nach Bolivien gekommen?", s: "Smalltalk über die Reise des anderen.", n: "venir → viniste (du). Stammwechsel ven- → vin-, ohne Akzent." },
    tp53: { e: "Le di el dinero al chofer y bajé.", d: "Ich gab dem Fahrer das Geld und stieg aus.", s: "Vom Bezahlen im Sammeltaxi oder Bus erzählen.", n: "dar → di (nur zwei Buchstaben!). chofer = Fahrer in LatAm." },
    tp54: { e: "Perdón, ¿qué has dicho?", d: "Entschuldigung, was hast du gesagt?", s: "Höflich um Wiederholung bitten.", n: "dicho ist das unregelmäßige Partizip von decir (nicht 'decido')." },
    tp55: { e: "Ya he abierto la puerta, pasa.", d: "Ich habe die Tür schon geöffnet, komm rein.", s: "Jemandem signalisieren, dass offen ist.", n: "abierto = Partizip von abrir. Auch als Schild: 'Abierto' = geöffnet." },
    tp56: { e: "Todavía no han hecho la habitación.", d: "Sie haben das Zimmer noch nicht gemacht.", s: "Wenn dein Zimmer beim Check-in noch nicht fertig ist.", n: "hecho = Partizip von hacer. 'hacer la habitación' = das Zimmer herrichten." },
    tp57: { e: "He roto mis lentes, necesito una óptica.", d: "Ich habe meine Brille kaputt gemacht, ich brauche einen Optiker.", s: "Ein kleines Reise-Missgeschick erklären.", n: "roto = Partizip von romper. lentes (auch gafas/anteojos) = Brille." },
    tp58: { e: "Cuando llegué, ya era tarde.", d: "Als ich ankam, war es schon spät.", s: "Den Hintergrund einer Geschichte schildern.", n: "era (Imperfekt von ser) beschreibt den Rahmen; llegué (Indefinido) ist das Ereignis." },
    tp59: { e: "No conocía la ciudad, así que usé el mapa.", d: "Ich kannte die Stadt nicht, also benutzte ich die Karte.", s: "Erklären, warum du dich erst orientieren musstest.", n: "conocer im Imperfekt (conocía) = kannte (Zustand). conocer = kennen/kennenlernen." },
    tp60: { e: "Teníamos hambre y buscamos un mercado.", d: "Wir hatten Hunger und suchten einen Markt.", s: "Von einer gemeinsamen Situation erzählen.", n: "tener hambre = Hunger haben. Im Imperfekt: teníamos (andauernder Zustand)." },
    tp61: { e: "Te voy a llamar más tarde, ¿está bien?", d: "Ich rufe dich später an, okay?", s: "Ein Treffen oder einen Anruf vereinbaren.", n: "ir a + Infinitiv für die nahe Zukunft. te … llamar = dich anrufen." },
    tp62: { e: "¿Cuánto tiempo te vas a quedar en Cusco?", d: "Wie lange wirst du in Cusco bleiben?", s: "Reisepläne der anderen Person erfragen.", n: "quedarse = bleiben (reflexiv). vas a quedarte / te vas a quedar – beides geht." },
    tp63: { e: "El tour es caro, pero valdrá la pena.", d: "Die Tour ist teuer, aber es wird sich lohnen.", s: "Eine Ausgabe vor dir selbst rechtfertigen.", n: "valer → valdrá (unregelmäßiges Futur). valer la pena = sich lohnen." },
    tp64: { e: "¿Qué me recomendaría para comer aquí?", d: "Was würden Sie mir hier zu essen empfehlen?", s: "Im Restaurant höflich um einen Tipp bitten.", n: "Condicional (recomendaría) klingt höflicher als die direkte Frage 'qué recomienda'." },
    tp65: { e: "Preferiría ir a pie, no está lejos.", d: "Ich würde lieber zu Fuß gehen, es ist nicht weit.", s: "Höflich eine Vorliebe äußern.", n: "preferir → preferiría (Condicional). ir a pie = zu Fuß gehen." },
    tp66: { e: "Debería tomar un taxi, ya es de noche.", d: "Sie sollten ein Taxi nehmen, es ist schon dunkel.", s: "Jemandem einen vorsichtigen Rat geben.", n: "debería (von deber) = sollte – die höfliche Art, einen Rat zu geben." },

    // ===================== FARBEN =====================
    col01: { e: "¿Tiene esta camiseta en rojo?", d: "Haben Sie dieses T-Shirt in Rot?", s: "Beim Klamotten-Kauf am Markt oder im Laden.", n: "Farbe steht meist nach dem Nomen: una mochila roja, una bici roja." },
    col02: { e: "Me gusta más la azul.", d: "Die blaue gefällt mir besser.", s: "Wenn du zwischen mehreren Varianten wählst.", n: "Die Farbe passt sich an: el azul / la azul je nach Gegenstand." },
    col03: { e: "¿El semáforo ya está en verde?", d: "Ist die Ampel schon grün?", s: "An der Straße, bevor du losgehst.", n: "verde bleibt gleich für männlich/weiblich: un carro verde, una puerta verde." },
    col04: { e: "El taxi amarillo es el oficial.", d: "Das gelbe Taxi ist das offizielle.", s: "Beim Taxi-Suchen in vielen Städten.", n: "amarillo/-a passt sich an: una flor amarilla." },
    col05: { e: "Quiero el jugo de naranja, el de color naranja.", d: "Ich möchte den Orangensaft, den orangefarbenen.", s: "Beim Bestellen, wenn die Farbe hilft zu zeigen.", n: "naranja als Farbe bleibt oft unverändert: dos camisetas naranja." },
    col06: { e: "Mi mochila es la negra, la grande.", d: "Mein Rucksack ist der schwarze, der große.", s: "Am Gepäckband oder im Sammeltaxi dein Gepäck beschreiben.", n: "negro/-a passt sich an: una maleta negra." },
    col07: { e: "Busco una casa blanca con puerta azul.", d: "Ich suche ein weißes Haus mit blauer Tür.", s: "Beim Suchen einer Unterkunft nach Beschreibung.", n: "blanco/-a passt sich an: una pared blanca." },
    col08: { e: "El edificio gris, a la derecha.", d: "Das graue Gebäude, rechts.", s: "Wegbeschreibung an Merkmalen festmachen.", n: "gris bleibt gleich für beide Geschlechter: una nube gris." },
    col09: { e: "La casa rosada de la esquina es el hostal.", d: "Das rosa Haus an der Ecke ist das Hostel.", s: "Eine Adresse über die Hausfarbe finden.", n: "In LatAm sehr oft rosado/-a; rosa bleibt meist unverändert." },
    col10: { e: "¿Lo tiene en café en vez de negro?", d: "Haben Sie es in Braun statt Schwarz?", s: "Beim Schuh- oder Taschenkauf nach der Farbe fragen.", n: "In LatAm sagt man meist café für Braun, seltener marrón." },
    col11: { e: "¿De qué color es tu mochila? Es café.", d: "Welche Farbe hat dein Rucksack? Er ist braun.", s: "Wenn du Gepäck oder einen Gegenstand beschreibst.", n: "el color = die Farbe; ¿De qué color? = welche Farbe?" },
    col12: { e: "¿Lo quiere claro u oscuro?", d: "Möchten Sie es hell oder dunkel?", s: "Bei Kaffee, Bier oder beim Aussuchen einer Farbnuance.", n: "claro = hell, oscuro = dunkel – auch für café claro / café oscuro." },
    col13: { e: "La línea morada del metro va al centro.", d: "Die lila Metro-Linie fährt ins Zentrum.", s: "Beim Orientieren im Nahverkehr nach Linienfarben.", n: "In LatAm meist morado für Lila/Violett, in Spanien eher violeta." },
    col14: { e: "El agua aquí es de un celeste increíble.", d: "Das Wasser ist hier von einem unglaublichen Himmelblau.", s: "Beim Schwärmen über Strände, Lagunen oder Flüsse.", n: "celeste = himmelblau/hellblau; sehr verbreitet in ganz LatAm." },
    col15: { e: "El uniforme es violeta, no azul.", d: "Die Uniform ist violett, nicht blau.", s: "Wenn du etwas genauer von einer Farbe abgrenzt.", n: "violeta bleibt meist unverändert: dos camisas violeta." },
    col16: { e: "Las aguas termales tienen un color turquesa.", d: "Die heißen Quellen haben eine türkise Farbe.", s: "Beim Beschreiben von Natur, Pools oder Schmuck.", n: "turquesa bleibt unverändert: un mar turquesa, una piedra turquesa." },
    col17: { e: "Los pantalones beige van con todo.", d: "Die beigen Hosen passen zu allem.", s: "Beim Klamotten-Kauf oder Outfit-Tipp.", n: "beige bleibt unverändert; sprich es etwa „BEISCH“." },
    col18: { e: "¿Tiene aretes dorados?", d: "Haben Sie goldene Ohrringe?", s: "Beim Schmuck- oder Souvenir-Kauf am Markt.", n: "dorado/-a = golden; plateado/-a = silbern." },
    col19: { e: "Prefiero el reloj plateado.", d: "Ich bevorzuge die silberne Uhr.", s: "Bei der Auswahl von Schmuck, Uhren oder Deko.", n: "plateado/-a passt sich an: una cadena plateada." },
    col20: { e: "El atardecer se pone color vino.", d: "Der Sonnenuntergang wird weinrot.", s: "Beim Beschreiben einer dunkelroten Farbe.", n: "vino oder bordó für Weinrot; tinto meint speziell den Rotwein selbst." },

<script>
/*
 * context.js  (SC.context) – hängt den Reise-Kontext an die Karten. LOGIK-Modul
 * (wie srs/matcher), bewusst getrennt von den reinen Daten in data.js.
 *
 * Lädt NACH data.js und contextdata.js. Quelle der handgeschriebenen Inhalte ist
 * SC.contextData (kompakt { e, d, s, n }); reine Zahlen-Karten bekommen einen
 * praktischen Preis-/Mengen-Kontext generiert.
 *
 * Precedence pro Karte: handgeschriebener Eintrag aus contextData  >  generierte Zahl.
 * (Karten ohne beides bleiben ohne Kontext – der 🧭-Button erscheint dann nicht.)
 */
(function () {
  "use strict";

  // Praktischer Kontext für reine Zahlen-Karten (id "z" + Ziffern). Statt eines
  // erfundenen Satzes pro Ziffer bekommen Zahlen die häufigste Reise-Verwendung:
  // den Preis hören und verstehen. Hinweise variieren nach Größenordnung.
  //
  // Spanische Grammatik korrekt halten (LatAm-Inhalte sind "heilig"):
  //   - genau 1: "Es un peso" (Singular, apokopiertes "un").
  //   - Zahlen auf "uno": vor dem Nomen "un" / "veintiún" (z. B. veintiún pesos).
  //   - "de pesos" NUR, wenn die Zahl auf millón/millones ENDET (un millón de pesos),
  //     nicht bei Tausender-Rest (un millón quinientos mil pesos – ohne "de").
  function numberContext(card) {
    const es = card.es;                                   // z.B. "cincuenta y siete"
    const deNum = String(card.de).replace(/\s*\(.*\)\s*/g, "").trim(); // "57", "1.000"
    const value = Number(deNum.replace(/[.\s]/g, "")) || 0;

    // "uno" am Wortende vor dem Nomen apokopieren: veintiuno -> veintiún (mit Akzent),
    // sonst -> un (treinta y uno -> treinta y un, ciento uno -> ciento un).
    const apocope = (n) => /veintiuno$/i.test(n) ? n.replace(/veintiuno$/i, "veintiún")
                                                 : n.replace(/uno$/i, "un");
    const endsInMillion = /mill(?:ó|o)n(?:es)?$/i.test(es);
    let amountEs, verbEs, pesoDe;
    if (value === 1) {
      amountEs = "un peso"; verbEs = "Es"; pesoDe = "Peso";   // genau 1: Singular
    } else if (endsInMillion) {
      // Singular/Plural sauber trennen: genau "un millón" ist ein Singular-Subjekt
      // ("Es un millón de pesos"), ab "dos millones" Plural ("Son dos millones de pesos").
      const singularMillion = /^un\s+mill(?:ó|o)n$/i.test(es.trim());
      amountEs = `${es} de pesos`; verbEs = singularMillion ? "Es" : "Son"; pesoDe = "Pesos";
    } else {
      amountEs = `${apocope(es)} pesos`; verbEs = "Son"; pesoDe = "Pesos";
    }

    // 0 ergibt keinen sinnvollen Preis -> echter Reise-Gebrauch von "cero".
    if (value === 0) {
      return {
        sentenceEs: "Me quedan cero pesos, necesito un cajero.",
        sentenceDe: "Mir bleiben null Pesos, ich brauche einen Geldautomaten.",
        situation: "Wenn dein Bargeld alle ist.",
        note: "cero = null; praktisch, um zu sagen, dass etwas leer oder aus ist.",
      };
    }

    let situation, note;
    if (value < 100) {
      situation = "Beim Bezahlen, bei Mengen, Personen oder einer Zimmernummer.";
      note = "Kleine Zahlen brauchst du ständig – für Anzahl, Personen oder die Hausnummer.";
    } else if (value < 10000) {
      situation = "Beim Bezahlen an der Kasse, im Markt oder im Taxi.";
      note = "In vielen Ländern (z. B. Kolumbien, Chile) sind selbst kleine Preise schnell vierstellig.";
    } else {
      situation = "Beim Bezahlen größerer Beträge: Hostel-Nacht, Tour oder am Geldautomaten.";
      note = "Große Beträge schnell zu erkennen, schützt dich beim Wechselgeld vor Fehlern.";
    }
    return {
      sentenceEs: `${verbEs} ${amountEs}.`,
      sentenceDe: `Das macht ${deNum} ${pesoDe}.`,
      situation,
      note,
    };
  }

  // Kompakte Schreibweise { e, d, s, n } -> volles context-Objekt.
  const expand = (x) => ({ sentenceEs: x.e, sentenceDe: x.d, situation: x.s, note: x.n });

  // Kontext an die Karten hängen (mutiert die übergebene Liste – einmalig beim Start).
  function attach(cards, contextData) {
    const map = contextData || {};
    (cards || []).forEach((card) => {
      if (card.context) return;                          // bereits gesetzt? unangetastet
      if (map[card.id]) { card.context = expand(map[card.id]); return; }
      if (/^z\d+$/.test(card.id)) card.context = numberContext(card);
    });
    return cards;
  }

  const SC = window.SC || (window.SC = {});
  SC.context = { numberContext, attach };
  // Beim Laden direkt auf die echten Karten anwenden (data.js + contextdata.js sind da).
  if (SC.data && SC.data.CARDS) attach(SC.data.CARDS, SC.contextData);
})();

</script>
