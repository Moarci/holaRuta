<script>
/*
 * srs.js  (SC.srs) – Spaced Repetition, vereinfachtes SM-2. REINE FUNKTIONEN.
 * Kennt weder UI noch Speicher. Nimmt einen Zustand + Bewertung, gibt NEUEN
 * Zustand zurück (immutabel – nie das Original verändern).
 *
 * Karten-Lernzustand: { ease, interval(Tage), due(ms), reps }
 *
 * Robustheit: korrupte Eingaben (Strings, NaN, null aus manipuliertem
 * localStorage) werden auf Defaults gezogen, ease ist auf [1.3, 3.0]
 * geklemmt – auf ALLEN Pfaden. So kann nie NaN/0 persistiert werden.
 */
(function () {
  "use strict";

  const DAY_MS = 24 * 60 * 60 * 1000;
  const RATING = { AGAIN: "again", GOOD: "good", EASY: "easy" };
  const EASE_MIN = 1.3;
  const EASE_MAX = 3.0;

  // Endliche Zahl oder Default (Schutz vor NaN/Strings/null).
  function num(x, fallback) {
    return typeof x === "number" && isFinite(x) ? x : fallback;
  }

  function clampEase(e) {
    return Math.min(EASE_MAX, Math.max(EASE_MIN, e));
  }

  // Lokale Mitternacht des Tages "heute + days". Karten mit Intervall >= 1 Tag
  // sind so den GANZEN Zieltag fällig – sonst klebt die Fälligkeit an der
  // Uhrzeit der Bewertung (23:30 bewertet -> am Folgetag um 21:00 noch nicht
  // fällig). Über Date gerechnet, damit Sommer-/Winterzeit korrekt bleibt.
  function dueAtMidnight(now, days) {
    const d = new Date(now);
    d.setHours(0, 0, 0, 0);
    d.setDate(d.getDate() + days);
    return d.getTime();
  }

  function freshState() {
    return { ease: 2.5, interval: 0, due: 0, reps: 0 };
  }

  // now ist optional (Default: Date.now()) – macht die Funktion testbar und
  // hält alle Zeitrechnungen einer Bewertung auf demselben Zeitpunkt.
  function review(state, rating, now) {
    const t = typeof now === "number" && isFinite(now) ? now : Date.now();
    const s = state || freshState();
    let ease = clampEase(num(s.ease, 2.5));
    const reps = Math.max(0, num(s.reps, 0));
    const interval = Math.max(0, num(s.interval, 0));
    const due = num(s.due, 0);

    if (rating === RATING.AGAIN) {
      return {
        ease: clampEase(ease - 0.2),
        interval: 0,
        reps: 0,
        due: t + 60 * 1000, // ~1 Minute -> in derselben Sitzung nochmal
      };
    }

    if (rating === RATING.EASY) ease = clampEase(ease + 0.15);

    let nextInterval;
    if (reps === 0) nextInterval = rating === RATING.EASY ? 3 : 1;
    else if (reps === 1) nextInterval = rating === RATING.EASY ? 6 : 3;
    else {
      // Early-Review-Dämpfung: wird eine noch nicht fällige Karte bewertet
      // (freies Üben), zählt nur die tatsächlich verstrichene Zeit seit der
      // letzten Bewertung – sonst springt z.B. eine erst in 29 Tagen fällige
      // Karte bei GOOD sofort auf ~75 Tage (Intervall-Inflation).
      let base = interval || 1;
      if (due > t) {
        const elapsedDays = interval - (due - t) / DAY_MS;
        base = Math.max(1, Math.min(base, elapsedDays)); // Untergrenze 1 Tag
      }
      nextInterval = Math.max(1, Math.round(base * ease));
    }

    return {
      ease,
      interval: nextInterval,
      reps: reps + 1,
      due: dueAtMidnight(t, nextInterval),
    };
  }

  function isDue(state) {
    if (!state || !state.due) return true; // neu -> sofort fällig
    return state.due <= Date.now();
  }

  window.SC = window.SC || {};
  window.SC.srs = { RATING, freshState, review, isDue };
})();

</script>
<script>
/*
 * store.js  (SC.store) – Persistenz. Kapselt localStorage komplett weg.
 * Speichert Lernfortschritt (pro Karte) und Einstellungen (z.B. Modus).
 * Wenn localStorage fehlt/fehlschlägt, läuft die App trotzdem (nur ohne Speichern).
 */
(function () {
  "use strict";

  const PROGRESS_KEY = "spanischcard.progress.v2";
  const SETTINGS_KEY = "spanischcard.settings.v1";
  const USERCARDS_KEY = "spanischcard.usercards.v1";
  const GAMESTATS_KEY = "spanischcard.gamestats.v1";
  // Zuletzt gesehene App-Version (für den „Was ist neu?"-Hinweis nach Updates).
  // Bewusst NICHT in KNOWN_KEYS: das ist gerätelokaler Anzeige-Status, kein
  // Nutzer-Inhalt – ein Backup-Import von einem anderen Gerät soll ihn nicht
  // überschreiben und so einen falschen Update-Hinweis auslösen.
  const SEENVERSION_KEY = "spanischcard.seenVersion.v1";
  // Alle Keys, die zu HolaRuta gehören – Basis für Export/Import (Backup).
  const KNOWN_KEYS = [PROGRESS_KEY, SETTINGS_KEY, USERCARDS_KEY, GAMESTATS_KEY];

  function readJson(key, fallback) {
    let raw = null;
    try {
      raw = localStorage.getItem(key);
    } catch (err) {
      console.warn("store: lesen fehlgeschlagen", key, err);
      return fallback;
    }
    if (!raw) return fallback;
    try {
      return JSON.parse(raw);
    } catch (err) {
      // Korruptes JSON: Roh-String unter <key>.corrupt retten, BEVOR der
      // Fallback greift – sonst wäre der Stand unwiederbringlich verloren.
      console.warn("store: korruptes JSON, sichere Rohdaten", key, err);
      try { localStorage.setItem(key + ".corrupt", raw); } catch (e) { /* egal */ }
      return fallback;
    }
  }

  // Gibt zurück, ob das Schreiben geklappt hat (false z.B. bei vollem
  // Speicher/Private Mode – der Aufrufer kann den Nutzer warnen, R4).
  function writeJson(key, value) {
    try {
      localStorage.setItem(key, JSON.stringify(value));
      return true;
    } catch (err) {
      console.warn("store: schreiben fehlgeschlagen", key, err);
      return false;
    }
  }

  // ----- Schema-Migration -----
  // Die KEYS oben tragen Versionssuffixe (z.B. progress.v2). Wird eine Version
  // erhöht, MUSS hier die passende Migration ergänzt werden – sonst verliert
  // der Nutzer beim Update stillschweigend seinen gesamten Fortschritt.
  // migrate() läuft einmal beim Laden des Moduls. Schablone für einen
  // künftigen Bump (v2 -> v3):
  //   const old = readJson("spanischcard.progress.v2", null);
  //   if (old && !localStorage.getItem(PROGRESS_KEY)) {
  //     writeJson(PROGRESS_KEY, transformV2toV3(old));
  //   }
  function migrate() {
    // Aktuell keine ausstehenden Migrationen (no-op).
  }

  // Strukturwächter: externes/korrumpiertes localStorage darf die App nicht crashen.
  const isPlainObject = (v) => v && typeof v === "object" && !Array.isArray(v);

  // Endliche Zahl (auch als String, z.B. "2.5" aus manipuliertem Storage)
  // oder Default. null/true/Objekte zählen NICHT als Zahl.
  function asNum(x, fallback) {
    const n = typeof x === "number" ? x
      : typeof x === "string" && x.trim() !== "" ? Number(x)
      : NaN;
    return isFinite(n) ? n : fallback;
  }

  // Einzel-Record des Lernfortschritts heilen: Zahlenfelder koerzieren,
  // ease auf [1.3, 3.0] klemmen, history auf gültige Zeichen filtern.
  // Ohne das macht ein korrupter Record die Karte "für immer fällig"
  // (due als String) oder "nie wieder lernbar" (ease -> NaN -> 0).
  function sanitizeRecord(rec) {
    if (!isPlainObject(rec)) return null;
    const history = Array.isArray(rec.history)
      ? rec.history.filter((ch) => ch === "a" || ch === "g" || ch === "e")
      : [];
    return Object.assign({}, rec, {
      ease: Math.min(3.0, Math.max(1.3, asNum(rec.ease, 2.5))),
      interval: asNum(rec.interval, 0),
      due: asNum(rec.due, 0),
      reps: asNum(rec.reps, 0),
      seen: asNum(rec.seen, 0),
      history,
    });
  }

  function loadProgress() {
    const v = readJson(PROGRESS_KEY, {});
    if (!isPlainObject(v)) return {};
    const out = {};
    Object.keys(v).forEach((id) => {
      const rec = sanitizeRecord(v[id]);
      if (rec) out[id] = rec;
    });
    return out;
  }
  function loadSettings() {
    const v = readJson(SETTINGS_KEY, { mode: "flip" });
    return isPlainObject(v) ? v : { mode: "flip" };
  }
  function loadUserCards() {
    const v = readJson(USERCARDS_KEY, []);
    if (!Array.isArray(v)) return [];
    // Nur plausible Karten behalten: gültige id, de/es/cat als nicht-leere
    // Strings mit vernünftiger Länge (verhindert "undefined"-Karten, Crashes
    // und absurde Einträge aus fremdem/manipuliertem Storage).
    const okStr = (s, max) => typeof s === "string" && s.length > 0 && s.length <= max;
    return v.filter((c) =>
      c && typeof c === "object" &&
      okStr(c.id, 100) &&
      okStr(c.de, 500) &&
      okStr(c.es, 500) &&
      okStr(c.cat, 100));
  }

  // ----- Backup: Export/Import aller HolaRuta-Daten (R4) -----
  // Export: alle bekannten spanischcard.*-Keys als ein Objekt (für eine
  // JSON-Datei). Korrupte Einzel-Keys werden ausgelassen statt zu crashen.
  function exportData() {
    const data = {};
    KNOWN_KEYS.forEach((key) => {
      let raw = null;
      try { raw = localStorage.getItem(key); } catch (e) { /* egal */ }
      if (!raw) return;
      try { data[key] = JSON.parse(raw); } catch (e) { /* korrupt -> auslassen */ }
    });
    return {
      app: "holaruta",
      format: 1,
      exportedAt: new Date().toISOString(),
      data,
    };
  }

  // Import: nur bekannte spanischcard.*-Keys übernehmen (fremde Keys werden
  // ignoriert). Gibt die Anzahl übernommener Keys zurück (0 = ungültig/leer).
  function importData(payload) {
    if (!isPlainObject(payload) || !isPlainObject(payload.data)) return 0;
    let imported = 0;
    KNOWN_KEYS.forEach((key) => {
      if (!(key in payload.data)) return;
      if (writeJson(key, payload.data[key])) imported++;
    });
    return imported;
  }

  // Spiel-Zähler fürs Badge-System ("Ruta-Pass"): Streak, Tageszeit, "Nochmal"-
  // Drücke und die Map freigeschalteter Badges. Defaults für alte/leere Stände.
  function freshGameStats() {
    return {
      reviews: 0,           // Gesamtzahl Bewertungen
      againPresses: 0,      // wie oft "Otra vez" gedrückt
      dailyStreak: 0,       // aktuelle Tage-in-Folge-Serie
      longestStreak: 0,     // längste je erreichte Serie
      lastStudyDate: null,  // letztes Lern-Datum als "YYYY-MM-DD" (lokal)
      nightOwl: false,      // schon mal nach 22 Uhr gelernt
      earlyBird: false,     // schon mal vor 9 Uhr gelernt
      // ----- Hostel Mode (Üben zu zweit) -----
      battlesPlayed: 0,     // abgeschlossene Battles
      battlesWon: 0,        // Battles mit klarem Sieger (kein Unentschieden)
      perfectBattles: 0,    // Battles, in denen ein Spieler volle Punkte holte
      comebacks: 0,         // Battles nach Rückstand gewonnen
      roleplaysSeen: {},    // Map roleplayId -> true (distinkt gespielte Rollenspiele)
      challengesDone: {},   // Map challengeId -> true (erledigte Real-Life-Challenges)
      // ----- Definiciones (Zuordnen-Quiz) -----
      quizzesPlayed: 0,     // abgeschlossene Quiz-Runden
      quizzesPerfect: 0,    // Quiz-Runden ohne Fehler
      // ----- Frases flexibles (Satzbaukasten) -----
      frasesPlayed: 0,      // abgeschlossene Satzbaukasten-Runden
      frasesPerfect: 0,     // Runden ohne Fehler
      frasesThemesDone: {}, // Map themaId -> true (distinkt abgeschlossene Themen, ohne "Gemischt")
      // ----- Hören: Escuchar (Dictado) & Precios (Preis-Hörtrainer) -----
      listenReviews: 0,     // im Hör-Modus bewertete Karten
      preciosPlayed: 0,     // abgeschlossene Preis-Hörrunden
      preciosPerfect: 0,    // Preis-Hörrunden ohne Fehler
      // ----- Ruta del día (tägliche Mini-Runde) -----
      rutaDays: {},         // Map "YYYY-MM-DD" -> true (Tage mit gestarteter Ruta del día)
      // ----- Reise-Kontext (🧭 Kontext-Button) -----
      contextCardsSeen: {}, // Map cardId -> true (distinkt geöffnete Kontexte)
      // ----- El Cuerpo (interaktive Körperkarte) -----
      bodyPartsSeen: {},    // Map bodyPartId -> true (distinkt erkundete Körperteile)
      // ----- Einkaufszettel (interaktive Einkaufsliste) -----
      shoppingSeen: {},     // Map shoppingItemId -> true (distinkt abgehakte Einkaufs-Items)
      unlocked: {},         // Map badgeId -> Zeitstempel der Freischaltung
    };
  }
  function loadGameStats() {
    const v = readJson(GAMESTATS_KEY, null);
    if (!isPlainObject(v)) return freshGameStats();
    // Strukturwächter: jedes Feld typisieren. Korruptes/manipuliertes localStorage
    // (z.B. "5" statt 5) darf sonst Streak-/Badge-Logik verfälschen (Streichketten
    // wie "5"+1 = "51"). unlocked muss ein Objekt sein (sonst Crash beim Diffen).
    const num = (x) => (typeof x === "number" && isFinite(x) ? x : 0);
    return {
      reviews: num(v.reviews),
      againPresses: num(v.againPresses),
      dailyStreak: num(v.dailyStreak),
      longestStreak: num(v.longestStreak),
      lastStudyDate: typeof v.lastStudyDate === "string" ? v.lastStudyDate : null,
      nightOwl: !!v.nightOwl,
      earlyBird: !!v.earlyBird,
      battlesPlayed: num(v.battlesPlayed),
      battlesWon: num(v.battlesWon),
      perfectBattles: num(v.perfectBattles),
      comebacks: num(v.comebacks),
      roleplaysSeen: isPlainObject(v.roleplaysSeen) ? v.roleplaysSeen : {},
      challengesDone: isPlainObject(v.challengesDone) ? v.challengesDone : {},
      quizzesPlayed: num(v.quizzesPlayed),
      quizzesPerfect: num(v.quizzesPerfect),
      frasesPlayed: num(v.frasesPlayed),
      frasesPerfect: num(v.frasesPerfect),
      frasesThemesDone: isPlainObject(v.frasesThemesDone) ? v.frasesThemesDone : {},
      listenReviews: num(v.listenReviews),
      preciosPlayed: num(v.preciosPlayed),
      preciosPerfect: num(v.preciosPerfect),
      rutaDays: isPlainObject(v.rutaDays) ? v.rutaDays : {},
      contextCardsSeen: isPlainObject(v.contextCardsSeen) ? v.contextCardsSeen : {},
      bodyPartsSeen: isPlainObject(v.bodyPartsSeen) ? v.bodyPartsSeen : {},
      shoppingSeen: isPlainObject(v.shoppingSeen) ? v.shoppingSeen : {},
      unlocked: isPlainObject(v.unlocked) ? v.unlocked : {},
    };
  }

  migrate();

  window.SC = window.SC || {};
  window.SC.store = {
    loadProgress,
    saveProgress: (p) => writeJson(PROGRESS_KEY, p),
    resetProgress: () => {
      try { localStorage.removeItem(PROGRESS_KEY); } catch (e) { /* egal */ }
    },
    loadSettings,
    saveSettings: (s) => writeJson(SETTINGS_KEY, s),
    loadUserCards,
    saveUserCards: (c) => writeJson(USERCARDS_KEY, c),
    exportData,
    importData,
    freshGameStats,
    loadGameStats,
    saveGameStats: (g) => writeJson(GAMESTATS_KEY, g),
    resetGameStats: () => {
      try { localStorage.removeItem(GAMESTATS_KEY); } catch (e) { /* egal */ }
    },
    // Zuletzt gesehene App-Version. null = noch nie vermerkt (frische Installation
    // oder Bestandsnutzer vor diesem Feature) -> dann KEIN Update-Hinweis, nur
    // still nachtragen.
    loadSeenVersion() {
      const v = readJson(SEENVERSION_KEY, null);
      return typeof v === "string" ? v : null;
    },
    saveSeenVersion: (v) => writeJson(SEENVERSION_KEY, String(v)),
  };
})();

</script>
<script>
/*
 * usercards.js  (SC.userCards) – Eigene, vom Nutzer angelegte Karten.
 * Domänen-Logik (Anlegen/Löschen/Prüfen). Persistenz läuft über SC.store.
 *
 * Eigene Karten haben dieselbe Form wie die fest eingebauten
 * (id, cat, lvl, de, es, tip) plus `custom: true`, damit der Rest der App sie
 * ohne Sonderbehandlung verarbeiten kann. Sie werden in app.js mit data.CARDS
 * zusammengeführt.
 */
(function () {
  "use strict";

  const store = window.SC.store;

  // In-Memory-Kopie, beim Start aus dem Speicher geladen.
  let cards = store.loadUserCards();

  function list() {
    return cards.slice(); // Kopie -> Aufrufer kann nichts versehentlich mutieren
  }

  // Eindeutige, kollisionsarme Id (Präfix "u" trennt von eingebauten Karten).
  function genId() {
    return "u" + Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
  }

  // Pflichtfelder prüfen -> Liste von Fehlertexten (leer = ok).
  function validate(input) {
    const errs = [];
    if (!String(input && input.de || "").trim()) errs.push("Bitte die Frage (Deutsch) ausfüllen.");
    if (!String(input && input.es || "").trim()) errs.push("Bitte die Antwort (Spanisch) ausfüllen.");
    return errs;
  }

  // Legt eine neue Karte an (immutabel) und speichert. Gibt die Karte zurück.
  function add(input) {
    const card = {
      id: genId(),
      cat: String(input.cat || "alltag"),
      lvl: Number(input.lvl) || 1,
      de: String(input.de || "").trim(),
      es: String(input.es || "").trim(),
      tip: String(input.tip || "").trim(),
      custom: true,
    };
    cards = cards.concat(card);
    store.saveUserCards(cards);
    return card;
  }

  // Entfernt eine eigene Karte.
  function remove(id) {
    cards = cards.filter((c) => c.id !== id);
    store.saveUserCards(cards);
  }

  window.SC = window.SC || {};
  window.SC.userCards = { list, add, remove, validate };
})();

</script>
<script>
/*
 * matcher.js  (SC.matcher) – prüft getippte Antworten. REINE FUNKTIONEN.
 * Großzügig: ignoriert Groß-/Kleinschreibung, Akzente (á=a), Satzzeichen
 * (¿¡?!.,;:), Klammern, Währungszeichen ($/€), Apostrophe, Mehrfach-Leerzeichen
 * und behandelt ß/ss als gleichwertig (Reise-Handys haben oft keine ß-Taste).
 * Slash und Gedankenstrich gelten als Wortgrenze.
 *
 * Bewusste Toleranz: die Akzent-Normalisierung (NFD) kollabiert auch ñ→n –
 * "ano" wird für "año" akzeptiert. Das ist gewollt: auf Tastaturen ohne ñ
 * wäre die Karte sonst unlösbar; die seltene echte Verwechslung (año/ano)
 * nehmen wir dafür in Kauf.
 *
 * Mehrere gültige Antworten: mit " / " getrennt (es UND de), explizit per
 * card.alt (nur Spanisch). Klammerzusätze sind OPTIONAL – siehe candidates().
 */
(function () {
  "use strict";

  function normalize(str) {
    return String(str)
      .toLowerCase()
      .replace(/ß/g, "ss")                   // ß ↔ ss gleichwertig
      .normalize("NFD")
      .replace(/[̀-ͯ]/g, "")       // Akzente entfernen (á→a, ñ→n – bewusst, s.o.)
      .replace(/['’`´]/g, "")                // Apostrophe entfernen (geht's → gehts)
      .replace(/[¿?¡!.,;:()$€"„“”«»]/g, "")  // Satzzeichen, Klammern, Währung entfernen
      .replace(/[\/\-–—]/g, " ")             // Slash, Binde-/Gedankenstrich als Wortgrenze
      .replace(/\s+/g, " ")
      .trim();
  }

  // Anzeige-Antworten einer Karte (UNnormalisiert, z.B. fürs Vorlesen).
  // field: "es" (Standard, Spanisch) | "de" (Deutsch, für Richtung ES→DE).
  // card.alt gilt nur für die spanische Antwort.
  function acceptedAnswers(card, field) {
    field = field || "es";
    if (field === "es" && Array.isArray(card.alt) && card.alt.length) return card.alt;
    return String(card[field]).split("/").map((s) => s.trim()).filter(Boolean);
  }

  // Kandidaten-Generierung: Liste akzeptierter NORMALISIERTER Eingaben.
  // Akzeptiert werden (für es ohne alt[] und für de gleichermaßen):
  //  - die wörtliche Volleingabe ("links / rechts" exakt wie angezeigt)
  //  - jede Slash-Alternative einzeln ("links", "rechts")
  //  - " – "/" — "-Teile (Preis-Karten: "$ 45.000 – Hostel-Nacht" → "45.000",
  //    "Hostel-Nacht")
  //  - Klammerzusätze sind optional: "1. (erster/erste)" → "1.", "erster",
  //    "erste" und die Volleingabe zählen alle.
  function candidates(card, field) {
    field = field || "es";
    const out = [];
    const add = (s) => {
      const n = normalize(s);
      if (n && out.indexOf(n) === -1) out.push(n);
    };

    // card.alt zählt nur für Spanisch und ersetzt dort die generierten Varianten.
    if (field === "es" && Array.isArray(card.alt) && card.alt.length) {
      card.alt.forEach(add);
      return out;
    }

    const raw = String(card[field]);
    // Varianten-Basis: Original, ohne Klammerzusätze, jeder Klammerinhalt einzeln.
    const variants = [raw, raw.replace(/\([^)]*\)/g, " ")];
    const parens = /\(([^)]*)\)/g;
    let m;
    while ((m = parens.exec(raw)) !== null) variants.push(m[1]);

    variants.forEach((v) => {
      add(v);                                 // Volleingabe der Variante
      v.split(/\/|\s[–—]\s/).forEach(add);    // jede Alternative einzeln
    });
    return out;
  }

  // Prüft Eingabe gegen eine Karte. -> { correct, answers }
  // field bestimmt die Zielsprache der erwarteten Antwort (siehe oben).
  function check(input, card, field) {
    const norm = normalize(input);
    const accepted = candidates(card, field);
    const correct = norm.length > 0 && accepted.indexOf(norm) !== -1;
    return { correct, answers: acceptedAnswers(card, field) };
  }

  window.SC = window.SC || {};
  window.SC.matcher = { normalize, acceptedAnswers, candidates, check };
})();

</script>
<script>
/*
 * stats.js  (SC.stats) – Auswertung pro Karte. REINE FUNKTIONEN, kein Speicher/UI.
 *
 * Der Lern-Datensatz einer Karte (in progress[id]) trägt zusätzlich zu den
 * SRS-Feldern (ease, interval, due, reps) folgende Statistik-Felder:
 *   seen        – wie oft insgesamt bewertet
 *   again/good/easy – Zähler je Bewertung
 *   lapses      – wie oft eine bereits gelernte Karte wieder vergessen wurde
 *   firstAt/lastAt  – Zeitstempel (ms) erste/letzte Bewertung
 *   firstRating – allererste Bewertung ('again' | 'good' | 'easy')
 *   history     – kompakter Verlauf, je Bewertung ein Zeichen: a|g|e (max. 50)
 *
 * Alte Datensätze (nur SRS-Felder) werden überall als 0/leer behandelt.
 */
(function () {
  "use strict";

  const HISTORY_MAX = 50;
  // Ab diesem Intervall (Tage) gilt eine Karte als "gemeistert" (kommt erst in 1 Woche+ wieder).
  const MASTERED_DAYS = 7;
  // Unter dieser Trefferquote (%) bei >=2 Wiederholungen gilt eine Karte als "schwierig".
  const HARD_BELOW = 60;

  // Verbucht eine Bewertung. srsNext = bereits berechneter SRS-Zustand.
  // Gibt einen NEUEN, zusammengeführten Datensatz zurück (immutabel).
  function record(prev, srsNext, rating, now) {
    const p = prev || {};
    const hadReps = (p.reps || 0) > 0; // war schon gelernt -> 'again' = Rückfall
    const history = (Array.isArray(p.history) ? p.history : []).slice(-(HISTORY_MAX - 1));
    history.push(rating.charAt(0)); // 'a' | 'g' | 'e'

    return Object.assign({}, srsNext, {
      seen: (p.seen || 0) + 1,
      again: (p.again || 0) + (rating === "again" ? 1 : 0),
      good: (p.good || 0) + (rating === "good" ? 1 : 0),
      easy: (p.easy || 0) + (rating === "easy" ? 1 : 0),
      lapses: (p.lapses || 0) + (rating === "again" && hadReps ? 1 : 0),
      firstAt: p.firstAt || now,
      lastAt: now,
      firstRating: p.firstRating || rating,
      history,
    });
  }

  // Status einer Karte: 'new' | 'learning' | 'mastered'.
  function statusOf(r) {
    if (!r || !r.seen) return "new";
    if ((r.interval || 0) >= MASTERED_DAYS) return "mastered";
    return "learning";
  }

  // Einheitliche Auswertung eines Karten-Datensatzes (auch für unbekannte/alte).
  function cardSummary(rec) {
    const r = rec || {};
    const seen = r.seen || 0;
    const again = r.again || 0;
    const good = r.good || 0;
    const easy = r.easy || 0;
    const correct = good + easy;
    const rate = seen ? Math.round((correct / seen) * 100) : null;
    const status = statusOf(r);
    return {
      seen, again, good, easy,
      correct,
      lapses: r.lapses || 0,
      rate,                              // Trefferquote in % oder null (nie gesehen)
      status,
      firstAt: r.firstAt || null,
      lastAt: r.lastAt || null,
      firstRating: r.firstRating || null,
      reps: r.reps || 0,
      ease: r.ease || null,
      interval: r.interval || 0,
      due: r.due || 0,
      history: Array.isArray(r.history) ? r.history : [],
      // Auf Anhieb gewusst: erste Bewertung Gut/Einfach und nie "Nochmal".
      firstTry: seen > 0 && r.firstRating && r.firstRating !== "again" && again === 0,
      // Schwierig: mehrfach gesehen, aber niedrige Trefferquote.
      hard: seen >= 2 && rate !== null && rate < HARD_BELOW,
    };
  }

  // Gesamtauswertung über eine Kartenliste + progress-Map.
  function overview(cards, progress) {
    let neu = 0, learning = 0, mastered = 0;
    let totalSeen = 0, totalCorrect = 0;
    let firstTry = 0, needPractice = 0, hard = 0;

    cards.forEach((c) => {
      const s = cardSummary(progress[c.id]);
      if (s.status === "new") neu++;
      else if (s.status === "mastered") mastered++;
      else learning++;

      totalSeen += s.seen;
      totalCorrect += s.correct;
      if (s.seen > 0) (s.firstTry ? firstTry++ : needPractice++);
      if (s.hard) hard++;
    });

    return {
      total: cards.length,
      neu, learning, mastered,
      seenCards: learning + mastered,
      rate: totalSeen ? Math.round((totalCorrect / totalSeen) * 100) : null,
      firstTry, needPractice, hard,
      totalSeen,
    };
  }

  window.SC = window.SC || {};
  window.SC.stats = { record, statusOf, cardSummary, overview, HARD_BELOW, MASTERED_DAYS };
})();

</script>

/*

 *
 * Idee: Badges fühlen sich an wie kleine Reisestempel im Pass. Sie belohnen
 * nicht nur "viel gelernt", sondern verschiedene Arten von Fortschritt:
 * Lernmenge, Regelmäßigkeit (Streak), Kategorien-Meisterschaft und Spezielles.
 *
 * Datenfluss:  progress + counters --buildMetrics--> metrics --evaluate--> Liste
 *
 * Ein Badge ist reine Beschreibung. Ob es freigeschaltet ist, ergibt sich aus
 * einer Metrik (metric) und einer Schwelle (threshold) – so bleibt die Logik
 * generisch und neue Badges sind nur ein Eintrag im Array.
 *
 * type:
 *   "counter"         – metrics[metric] >= threshold (z.B. cardsReviewed >= 50)
 *   "flag"            – metrics[metric] === true (z.B. nightOwl)
 *   "categoryMastery" – Anteil gemeisterter Karten einer Kategorie >= threshold
 *   "allReviewed"     – alle Karten mindestens einmal gelernt (Schwelle = Gesamt)
 *
 * Optionale Felder:
 *   secret  – Badge wird als "???" angezeigt, solange es nicht freigeschaltet ist.
 */
(function () {
  "use strict";

  // "Gemeistert" ist die Wahrheit aus stats.js (SC.stats.statusOf). Wir greifen
  // darauf zu, statt die Regel (interval >= 7) zu duplizieren – so können
  // Statistik und Ruta-Pass nie auseinanderlaufen. Der Fallback greift nur, falls
  // stats (noch) nicht geladen ist (Graceful Degradation, eigenständig testbar).
  const MASTERED_DAYS_FALLBACK = 7;
  function isMastered(r) {
    const st = window.SC && window.SC.stats;
    if (st && st.statusOf) return st.statusOf(r) === "mastered";

    // ---------- Definiciones (Zuordnen-Quiz) ----------
    { id: "quiz_first",   group: "quiz", icon: "🧩", name: "Erste Zuordnung",   type: "counter", metric: "quizzesPlayed", threshold: 1,
      description: "Schließe dein erstes Definiciones-Quiz ab.", unlockedText: "Du lernst Wörter jetzt auch über ihre Bedeutung." },
    { id: "quiz_10",      group: "quiz", icon: "📖", name: "Wort-Detektiv",     type: "counter", metric: "quizzesPlayed", threshold: 10,
      description: "Schließe 10 Definiciones-Quizze ab.",       unlockedText: "Du erkennst Begriffe an ihrer Beschreibung – stark." },
    { id: "quiz_perfect", group: "quiz", icon: "💯", name: "Sin errores",       type: "counter", metric: "quizzesPerfect", threshold: 1,
      description: "Beende ein Quiz ohne Fehler.",              unlockedText: "Fehlerfrei durchgespielt – alles richtig zugeordnet." },

    // ---------- Satzbaukasten (Frases flexibles) ----------
    { id: "frases_first",   group: "construir", icon: "🧱", name: "Erster Baustein",   type: "counter", metric: "frasesPlayed", threshold: 1,
      description: "Schließe deine erste Satzbaukasten-Runde ab.", unlockedText: "Du baust Sätze jetzt selbst zusammen, statt nur zu übersetzen." },
    { id: "frases_10",      group: "construir", icon: "🏗️", name: "Satz-Architekt",    type: "counter", metric: "frasesPlayed", threshold: 10,

    { id: "precios_perfect",group: "listening", icon: "💯", name: "Sin perder un peso", type: "counter", metric: "preciosPerfect", threshold: 1,
      description: "Beende eine Preis-Hörrunde ohne Fehler.", unlockedText: "Jeden Betrag richtig gehört – kein Wechselgeld-Fehler mehr." },

    // ---------- Mutproben (Real-Life Challenges) ----------
    { id: "challenge_first", group: "reallife", icon: "💬", name: "Mutiger erster Satz", type: "counter", metric: "challengesCompleted", threshold: 1,
      description: "Hake deine erste Real-Life Challenge ab.", unlockedText: "Du hast Spanisch nicht nur gelernt, sondern benutzt." },
    { id: "challenge_5",     group: "reallife", icon: "🚪", name: "Comfort Zone Exit",   type: "counter", metric: "challengesCompleted", threshold: 5,
      description: "Hake 5 Real-Life Challenges ab.", unlockedText: "Raus aus der App, rein ins echte Sprechen." },

    // ---------- El Cuerpo (interaktive Körperkarte) ----------
    { id: "cuerpo_first", group: "cuerpo", icon: "👆", name: "Primer toque",   type: "counter", metric: "bodyPartsExplored", threshold: 1,
      description: "Tippe dein erstes Körperteil an.", unlockedText: "Du erkundest den Körper jetzt auf Spanisch." },
    { id: "cuerpo_10",    group: "cuerpo", icon: "🦴", name: "Anatomista",     type: "counter", metric: "bodyPartsExplored", threshold: 10,
      description: "Erkunde 10 verschiedene Körperteile.", unlockedText: "Halber Körper sitzt – beim Arzt zeigst du jetzt mit Worten." },
    { id: "cuerpo_all",   group: "cuerpo", icon: "🧍", name: "Cuerpo completo", type: "counter", metric: "bodyPartsExplored", threshold: 20,
      description: "Erkunde alle Körperteile auf der Karte.", unlockedText: "Von «la cabeza» bis «los pies» – alles erkundet." },

    // ---------- Spezial ----------
    { id: "night_owl",  group: "special", icon: "🌙", name: "Midnight Español",         type: "flag", metric: "nightOwl", secret: true,
      description: "Lerne nach 22 Uhr.",        unlockedText: "Noch schnell ein bisschen Spanisch vor dem Schlafen." },
    { id: "early_bird", group: "special", icon: "☕", name: "Café con Vocabulario",     type: "flag", metric: "earlyBird", secret: true,
      description: "Lerne vor 9 Uhr.",          unlockedText: "Spanisch gelernt, bevor der Tag richtig losging." },
    { id: "many_again", group: "special", icon: "🔁", name: "Nochmal ist kein Scheitern", type: "counter", metric: "againPresses", threshold: 20,
      description: "Drücke 20× „Otra vez“.",    unlockedText: "Du hast weitergemacht, obwohl es nicht sofort saß." },
    { id: "persistent", group: "special", icon: "💪", name: "Drangeblieben",            type: "counter", metric: "totalReviews", threshold: 500,
      description: "Sammle 500 Bewertungen.",   unlockedText: "Fünfhundert Bewertungen – das ist Ausdauer." },
  ];

  const BY_ID = BADGES.reduce((acc, b) => { acc[b.id] = b; return acc; }, {});
  const byId = (id) => BY_ID[id] || null;

  // ----- Metriken aus Lernfortschritt + Zählern ableiten (rein) -----
  // cards    : vollständige Kartenliste (eingebaut + eigene)
  // progress : Map cardId -> Lern-Datensatz
  // counters : persistierte Spiel-Zähler (Streak, Tageszeit, "Nochmal", …)
  function buildMetrics(cards, progress, counters) {
    const prog = progress || {};
    const c = counters || {};
    let cardsReviewed = 0, cardsMastered = 0;
    const catTotal = {}, catMastered = {};

    cards.forEach((card) => {
      const r = prog[card.id] || {};
      const seen = r.seen || 0;
      const mastered = isMastered(r);
      catTotal[card.cat] = (catTotal[card.cat] || 0) + 1;
      if (seen > 0) cardsReviewed++;
      if (mastered) { cardsMastered++; catMastered[card.cat] = (catMastered[card.cat] || 0) + 1; }
    });

    const categoryMastery = {};
    Object.keys(catTotal).forEach((cat) => {
      categoryMastery[cat] = catTotal[cat] ? (catMastered[cat] || 0) / catTotal[cat] : 0;
    });

    return {
      cardsReviewed,
      cardsMastered,
      totalCards: cards.length,
      totalReviews: c.reviews || 0,
      dailyStreak: c.dailyStreak || 0,
      longestStreak: c.longestStreak || 0,
      againPresses: c.againPresses || 0,
      nightOwl: !!c.nightOwl,
      earlyBird: !!c.earlyBird,
      // Hostel Mode: Battle-Zähler direkt, Rollenspiele als distinkte Anzahl.
      battlesPlayed: c.battlesPlayed || 0,
      battlesWon: c.battlesWon || 0,
      perfectBattles: c.perfectBattles || 0,
      comebacks: c.comebacks || 0,
      roleplaysCompleted: c.roleplaysSeen ? Object.keys(c.roleplaysSeen).length : 0,
      challengesCompleted: c.challengesDone ? Object.keys(c.challengesDone).length : 0,
      // Definiciones: abgeschlossene und fehlerfreie Quiz-Runden.
      quizzesPlayed: c.quizzesPlayed || 0,
      quizzesPerfect: c.quizzesPerfect || 0,
      // Frases flexibles (Satzbaukasten): abgeschlossene und fehlerfreie Runden
      // sowie distinkt abgeschlossene Themen (für den "Alle Themen"-Badge).
      frasesPlayed: c.frasesPlayed || 0,
      frasesPerfect: c.frasesPerfect || 0,
      frasesThemesCompleted: c.frasesThemesDone ? Object.keys(c.frasesThemesDone).length : 0,
      // Hören: im Hör-Modus bewertete Karten + Preis-Hörtrainer-Runden.
      listenReviews: c.listenReviews || 0,
      preciosPlayed: c.preciosPlayed || 0,
      preciosPerfect: c.preciosPerfect || 0,
      // Ruta del día: distinkte Tage mit gestarteter täglicher Mini-Runde.
      rutaDays: c.rutaDays ? Object.keys(c.rutaDays).length : 0,
      // Reise-Kontext: distinkt geöffnete Kontext-Karten (für die 🧭-Badges).
      contextCardsViewed: c.contextCardsSeen ? Object.keys(c.contextCardsSeen).length : 0,
      // El Cuerpo: distinkt angetippte Körperteile (für die 🧍-Badges).
      bodyPartsExplored: c.bodyPartsSeen ? Object.keys(c.bodyPartsSeen).length : 0,
      categoryMastery,
      categoryTotals: catTotal,
    };
  }

  // Aktueller Wert einer Badge-Metrik (für Fortschrittsanzeige).
  function valueOf(badge, m) {
    switch (badge.type) {
      case "counter":         return m[badge.metric] || 0;
      case "flag":            return m[badge.metric] ? 1 : 0;
      case "categoryMastery": return (m.categoryMastery && m.categoryMastery[badge.category]) || 0;
      case "allReviewed":     return m.cardsReviewed || 0;
      default:                return 0;
    }
  }

  // Zielwert/Schwelle einer Badge-Metrik.
  function targetOf(badge, m) {
    switch (badge.type) {
      case "flag":            return 1;
      case "categoryMastery": return badge.threshold;
      case "allReviewed":     return m.totalCards || 0;
      default:                return badge.threshold;
    }
  }

  // Ist das Badge erreicht?
  function isSatisfied(badge, m) {
    if (badge.type === "categoryMastery") {
      const tot = m.categoryTotals ? m.categoryTotals[badge.category] : 0;
      return !!tot && valueOf(badge, m) >= badge.threshold;
    }
    if (badge.type === "allReviewed") {
      const t = targetOf(badge, m);
      return t > 0 && valueOf(badge, m) >= t;
    }
    return valueOf(badge, m) >= targetOf(badge, m);
  }

  // Fortschritt 0..1 (für den Balken bei noch nicht erreichten Badges).
  function progressOf(badge, m) {
    const t = targetOf(badge, m);
    if (!t) return 0;
    return Math.max(0, Math.min(1, valueOf(badge, m) / t));
  }

  // Ids aller aktuell erfüllten Badges (für die Freischalt-Erkennung).
  function satisfiedIds(m) {
    return BADGES.filter((b) => isSatisfied(b, m)).map((b) => b.id);
  }

  // Vollständige Auswertung für die UI. unlocked = Map id -> Zeitstempel.
  // Ein Badge gilt als freigeschaltet, sobald es erfüllt ist ODER bereits in der
  // unlocked-Map steht (Freischaltung bleibt erhalten, auch wenn sich Werte ändern).
  function evaluate(m, unlocked) {
    const u = unlocked || {};
    return BADGES.map((b) => {
      const satisfied = isSatisfied(b, m);
      const value = valueOf(b, m);
      const target = targetOf(b, m);
      return Object.assign({}, b, {
        satisfied,
        unlocked: satisfied || !!u[b.id],
        value,
        target,
        progress: progressOf(b, m),
        unlockedAt: u[b.id] || null,
      });
    });
  }

  window.SC = window.SC || {};
  // Schlanke öffentliche API – die Auswertungs-Helfer (valueOf/targetOf/…) bleiben
  // modul-intern.
  window.SC.badges = {
    GROUPS,
    byId,
    buildMetrics,
    evaluate,
    satisfiedIds,
  };
})();

</script>
<script>
/*
 * speech.js  (SC.speech) – Sprachausgabe der spanischen Antwort.
 * Nutzt die im Browser eingebaute Web Speech API (SpeechSynthesis) – keine
 * Abhängigkeit, kein Server. Wählt nach Möglichkeit eine lateinamerikanische
 * Stimme. Wenn der Browser keine Sprachausgabe kann, passiert einfach nichts.
 */
(function () {
  "use strict";

  const synth = typeof window !== "undefined" ? window.speechSynthesis : null;

  function isSupported() {
    return !!synth;
  }

  // Beste passende Stimme suchen: bevorzugt LatAm-Spanisch, sonst irgendein Spanisch.
  function pickVoice() {
    if (!synth) return null;
    const voices = synth.getVoices() || [];
    const spanish = voices.filter((v) => /^es/i.test(v.lang));
    const latam = spanish.find((v) => /es[-_](419|MX|US|AR|CO|CL|PE|EC|BO|UY|PY|VE|GT|CR)/i.test(v.lang));
    return latam || spanish[0] || null;
  }

  // Spricht den Text. Bricht eine eventuell laufende Ausgabe vorher ab.
  // cancel() nur bei Bedarf: ein bedingungsloses cancel() direkt vor speak()
  // verschluckt auf iOS gelegentlich die erste Utterance.
  function speak(text) {
    if (!synth || !text) return;
    try {
      if (synth.speaking || synth.pending) synth.cancel();
      const u = new SpeechSynthesisUtterance(String(text));
      const voice = pickVoice();
      if (voice) {
        u.voice = voice;
        u.lang = voice.lang;
      } else {
        u.lang = "es-ES"; // Fallback, falls (noch) keine Stimme geladen ist
      }
      u.rate = 0.95; // etwas langsamer – besser zum Nachsprechen
      synth.speak(u);
    } catch (err) {
      console.warn("speech: Ausgabe fehlgeschlagen", err);
    }
  }

  // Manche Browser laden Stimmen asynchron – einmal antriggern.
  if (synth && typeof synth.getVoices === "function") {
    synth.getVoices();
    if ("onvoiceschanged" in synth) {
      synth.onvoiceschanged = () => { /* Liste ist jetzt verfügbar */ };
    }
  }

  window.SC = window.SC || {};
  window.SC.speech = { speak, isSupported, pickVoice };
})();

</script>
<script>
/*
 * share.js  (SC.share) – Sharepic-Generator. Zeichnet ein teilbares Bild (PNG)
 * auf ein <canvas> und teilt es per Web Share API bzw. lädt es als Fallback
 * herunter. KENNT KEINEN ZUSTAND – bekommt fertige Anzeige-Daten.
 *
 * Zwei Motive (Umschalter):
 *   buildCard(payload, aspect)  – eine einzelne Vokabel (DE → ES + Aussprache)
 *   buildStats(payload, aspect) – der eigene Lernfortschritt (Kennzahlen)
 *
 * Zwei Formate (aspect):
 *   "square" – 1080×1080 (Insta-Feed/WhatsApp)
 *   "story"  – 1080×1920 (Insta-/WhatsApp-Status, 9:16)
 *
 * Öffentliche Funktion:
 *   shareImage(kind, payload, aspect) – baut das Bild und teilt/lädt es. async.
 */
(function () {
  "use strict";

  const W = 1080;             // Breite (beide Formate sind 1080 breit)
  const PAD = 88;             // Außenrand
  const BRAND = "HolaRuta";
  const TAGLINE = "Dein Reise-Spanisch für echte Situationen";
  const FONT = '"Segoe UI", system-ui, -apple-system, Roboto, Arial, sans-serif';
  const INK = "#0f172a";      // dunkler Text
  const MUTE = "#64748b";     // gedämpfter Text

  function heightFor(aspect) {
    return aspect === "story" ? 1920 : 1080;
  }

  // ---------- kleine Zeichen-Helfer ----------
  function font(weight, px) {
    return `${weight} ${px}px ${FONT}`;
  }

  function roundRect(ctx, x, y, w, h, r) {
    const rr = Math.min(r, w / 2, h / 2);
    ctx.beginPath();
    ctx.moveTo(x + rr, y);
    ctx.arcTo(x + w, y, x + w, y + h, rr);
    ctx.arcTo(x + w, y + h, x, y + h, rr);
    ctx.arcTo(x, y + h, x, y, rr);
    ctx.arcTo(x, y, x + w, y, rr);
    ctx.closePath();
  }

  // Bricht Text auf maximale Breite um -> Array von Zeilen.
  function wrap(ctx, text, maxW) {
    const words = String(text).split(/\s+/).filter(Boolean);
    const lines = [];
    let line = "";
    words.forEach((w) => {
      const test = line ? line + " " + w : w;
      if (ctx.measureText(test).width > maxW && line) {
        lines.push(line);
        line = w;
      } else {
        line = test;
      }
    });
    if (line) lines.push(line);
    return lines;
  }

  // Mehrzeiligen, zentrierten Text zeichnen. Verkleinert die Schrift, bis er
  // sowohl in die Breite (maxW) ALS AUCH in die Höhe (maxH) passt – so kann der
  // Text nie über sein Budget hinauslaufen und nachfolgende Elemente überlappen.
  // Gibt die untere Y-Kante zurück (für Folgeelemente).
  function fitText(ctx, text, cx, top, maxW, opts) {
    const o = opts || {};
    let px = o.px || 64;
    const min = o.min || 28;
    const weight = o.weight || "700";
    const lh = o.lineHeight || 1.18;
    const maxLines = o.maxLines || 4;
    const maxH = o.maxH || Infinity;
    let lines = wrap(ctx, text, maxW);
    while (px > min) {
      ctx.font = font(weight, px);
      lines = wrap(ctx, text, maxW);
      const blockH = px + (lines.length - 1) * px * lh; // Höhe des Textblocks
      if (lines.length <= maxLines && blockH <= maxH) break;
      px -= 4;
    }
    if (px < min) px = min;
    ctx.font = font(weight, px);
    lines = wrap(ctx, text, maxW);
    ctx.fillStyle = o.color || INK;
    ctx.textAlign = "center";
    ctx.textBaseline = "alphabetic";
    const step = px * lh;
    let y = top + px; // erste Grundlinie
    lines.forEach((ln) => {
      ctx.fillText(ln, cx, y);
      y += step;
    });
    return y - step + px * (lh - 1); // ungefähre Unterkante
  }

  function bgGradient(ctx, from, to, h) {
    const g = ctx.createLinearGradient(0, 0, W, h);
    g.addColorStop(0, from);
    g.addColorStop(1, to);
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, h);
    // dezenter Lichtschein oben links für etwas Tiefe
    const glow = ctx.createRadialGradient(W * 0.28, h * 0.18, 0, W * 0.28, h * 0.18, h * 0.7);
    glow.addColorStop(0, "rgba(255,255,255,0.18)");
    glow.addColorStop(1, "rgba(255,255,255,0)");
    ctx.fillStyle = glow;
    ctx.fillRect(0, 0, W, h);
  }

  // Marken-Fußzeile (auf farbigem Grund, weiß).
  function brandFooter(ctx, h) {
    ctx.textAlign = "center";
    ctx.fillStyle = "rgba(255,255,255,0.96)";
    ctx.font = font("800", 46);
    ctx.fillText("🇪🇸 " + BRAND, W / 2, h - 96);
    ctx.fillStyle = "rgba(255,255,255,0.78)";
    ctx.font = font("500", 30);
    ctx.fillText(TAGLINE, W / 2, h - 52);
  }

  function newCanvas(h) {
    const c = document.createElement("canvas");
    c.width = W; c.height = h;
    return c;
  }

  // ---------- Motiv 1: einzelne Vokabel ----------
  // payload: { de, es, tip, catLabel, catIcon, accent:[from,to], levelLabel? }
  function buildCard(payload, aspect) {
    const h = heightFor(aspect);
    const c = newCanvas(h);
    const ctx = c.getContext("2d");
    const accent = payload.accent && payload.accent.length === 2 ? payload.accent : ["#6366f1", "#22d3ee"];
    const cx = W / 2;

    bgGradient(ctx, accent[0], accent[1], h);

    // Mittiges weißes Karten-Panel; Höhe je Format, vertikal zentriert.
    const isStory = aspect === "story";
    const panelH = isStory ? 920 : 640;
    const panelY = Math.round((h - panelH) / 2);
    const px = PAD, pw = W - PAD * 2;
    const innerW = pw - 112;

    // Kopf über dem Panel: Bereich (+ Stufe)
    ctx.textAlign = "center";
    ctx.fillStyle = "rgba(255,255,255,0.95)";
    ctx.font = font("700", 40);
    const head = `${payload.catIcon || "📚"}  ${(payload.catLabel || "").toUpperCase()}`;
    ctx.fillText(head, cx, panelY - 96);
    if (payload.levelLabel) {
      ctx.fillStyle = "rgba(255,255,255,0.82)";
      ctx.font = font("600", 28);
      ctx.fillText(payload.levelLabel, cx, panelY - 50);
    }

    // Panel
    ctx.save();
    ctx.shadowColor = "rgba(0,0,0,0.22)";
    ctx.shadowBlur = 48;
    ctx.shadowOffsetY = 22;
    ctx.fillStyle = "#ffffff";
    roundRect(ctx, px, panelY, pw, panelH, 56);
    ctx.fill();
    ctx.restore();

    // Inhaltsbereich mit Innenrand. Feste Zonen verhindern Überlappungen:
    //   [ DEUTSCH-Label + Frage ] · Trenner · [ ESPAÑOL-Label + Antwort + Tipp ]
    const contentTop = panelY + 56;
    const contentBottom = panelY + panelH - 56;
    const contentH = contentBottom - contentTop;
    const dividerY = Math.round(contentTop + contentH * 0.42);
    const gap = 24;
    const tipH = payload.tip ? (isStory ? 120 : 96) : 0;

    // Deutsch (Frage) – obere Zone, begrenzt durch den Trenner.
    ctx.fillStyle = MUTE;
    ctx.textAlign = "center";
    ctx.font = font("600", 30);
    ctx.fillText("DEUTSCH", cx, contentTop + 30);
    const deTop = contentTop + 50;
    fitText(ctx, payload.de, cx, deTop, innerW, {
      px: 58, min: 32, weight: "600", color: INK, maxLines: 2,
      maxH: dividerY - gap - deTop,
    });

    // Trenner – feste Position in der Panel-Mitte.
    ctx.strokeStyle = "rgba(15,23,42,0.10)";
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(cx - 70, dividerY);
    ctx.lineTo(cx + 70, dividerY);
    ctx.stroke();

    // Spanisch (Antwort) – hervorgehoben; Höhe so begrenzt, dass darunter
    // immer Platz für den Aussprache-Tipp bleibt (kein Überlappen mehr).
    ctx.fillStyle = accent[0];
    ctx.font = font("600", 30);
    ctx.fillText("ESPAÑOL", cx, dividerY + 56);
    const esTop = dividerY + 76;
    const esBottom = fitText(ctx, payload.es, cx, esTop, innerW, {
      px: 88, min: 38, weight: "800", color: accent[0], maxLines: 2,
      maxH: contentBottom - tipH - gap - esTop,
    });

    // Aussprache-Tipp – dicht unter der Antwort, aber innerhalb des Panels.
    if (payload.tip) {
      const tipTop = Math.min(esBottom + gap, contentBottom - tipH);
      fitText(ctx, "🗣️ " + payload.tip, cx, tipTop, innerW, {
        px: 34, min: 24, weight: "500", color: MUTE, maxLines: 2,
        maxH: contentBottom - tipTop,
      });
    }

    brandFooter(ctx, h);
    return c;
  }

  // ---------- Motiv 2: Lernfortschritt ----------
  // payload: { rate, mastered, seenCards, total, hard, learning, neu, firstTry }
  function buildStats(payload, aspect) {
    const h = heightFor(aspect);
    const c = newCanvas(h);
    const ctx = c.getContext("2d");
    bgGradient(ctx, "#6366f1", "#22d3ee", h);
    const cx = W / 2;

    // Layout je Format (vertikal gestreckt für Story).
    const L = aspect === "story"
      ? { kicker: 360, title: 446, ringY: 780, R: 168, ringW: 36, numPx: 116, ringLbl: 36,
          tilesY: 1120, tileH: 200, tileNum: 70, tileLbl: 30, barGap: 70 }
      : { kicker: 150, title: 232, ringY: 430, R: 132, ringW: 30, numPx: 96, ringLbl: 32,
          tilesY: 642, tileH: 168, tileNum: 60, tileLbl: 28, barGap: 56 };

    // Titel
    ctx.textAlign = "center";
    ctx.fillStyle = "rgba(255,255,255,0.95)";
    ctx.font = font("700", 40);
    ctx.fillText("MEIN FORTSCHRITT", cx, L.kicker);
    ctx.font = font("800", 66);
    ctx.fillText("¡Estoy aprendiendo!", cx, L.title);

    // Großer Trefferquote-Ring
    const rate = payload.rate === null || payload.rate === undefined ? 0 : payload.rate;
    ctx.lineWidth = L.ringW;
    ctx.lineCap = "round";
    ctx.strokeStyle = "rgba(255,255,255,0.25)";
    ctx.beginPath();
    ctx.arc(cx, L.ringY, L.R, 0, Math.PI * 2);
    ctx.stroke();
    ctx.strokeStyle = "#ffffff";
    ctx.beginPath();
    ctx.arc(cx, L.ringY, L.R, -Math.PI / 2, -Math.PI / 2 + (Math.PI * 2 * rate) / 100);
    ctx.stroke();
    ctx.fillStyle = "#ffffff";
    ctx.font = font("800", L.numPx);
    ctx.textBaseline = "middle";
    ctx.fillText(payload.rate === null || payload.rate === undefined ? "–" : rate + "%", cx, L.ringY - 6);
    ctx.font = font("600", L.ringLbl);
    ctx.fillText("Trefferquote", cx, L.ringY + L.R - 6);
    ctx.textBaseline = "alphabetic";

    // drei Kennzahl-Kacheln
    const tiles = [
      { num: `${payload.mastered}`, lbl: "Gemeistert" },
      { num: `${payload.seenCards}/${payload.total}`, lbl: "Gelernt" },
      { num: `${payload.hard}`, lbl: "Schwierig" },
    ];
    const gap = 28;
    const tw = (W - PAD * 2 - gap * 2) / 3;
    tiles.forEach((t, i) => {
      const x = PAD + i * (tw + gap);
      ctx.fillStyle = "rgba(255,255,255,0.16)";
      roundRect(ctx, x, L.tilesY, tw, L.tileH, 32);
      ctx.fill();
      ctx.fillStyle = "#ffffff";
      ctx.textAlign = "center";
      ctx.font = font("800", L.tileNum);
      ctx.fillText(t.num, x + tw / 2, L.tilesY + L.tileH * 0.55);
      ctx.fillStyle = "rgba(255,255,255,0.85)";
      ctx.font = font("600", L.tileLbl);
      ctx.fillText(t.lbl, x + tw / 2, L.tilesY + L.tileH - 30);
    });

    // Verteilungs-Balken (Gemeistert / Am Lernen / Neu)
    const total = payload.total || 1;
    const barY = L.tilesY + L.tileH + L.barGap, barH = 34, barW = W - PAD * 2;
    const segs = [
      { n: payload.mastered, col: "#34d399" },
      { n: payload.learning, col: "#fbbf24" },
      { n: payload.neu, col: "rgba(255,255,255,0.45)" },
    ];
    ctx.save();
    roundRect(ctx, PAD, barY, barW, barH, barH / 2);
    ctx.clip();
    let xCur = PAD;
    segs.forEach((s) => {
      const w = (Math.max(0, s.n) / total) * barW;
      ctx.fillStyle = s.col;
      ctx.fillRect(xCur, barY, w + 0.5, barH);
      xCur += w;
    });
    ctx.restore();

    // Legende unter dem Balken
    ctx.textAlign = "center";
    ctx.fillStyle = "rgba(255,255,255,0.85)";
    ctx.font = font("600", 28);
    ctx.fillText(`Gemeistert ${payload.mastered}  ·  Am Lernen ${payload.learning}  ·  Neu ${payload.neu}`, cx, barY + barH + 48);

    brandFooter(ctx, h);
    return c;
  }

  // ---------- Canvas -> Blob ----------
  function toBlob(canvas) {
    return new Promise((resolve, reject) => {
      if (canvas.toBlob) {
        canvas.toBlob((b) => (b ? resolve(b) : reject(new Error("toBlob lieferte null"))), "image/png");
      } else {
        try {
          const data = canvas.toDataURL("image/png").split(",")[1];
          const bin = atob(data);
          const arr = new Uint8Array(bin.length);
          for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
          resolve(new Blob([arr], { type: "image/png" }));
        } catch (e) { reject(e); }
      }
    });
  }

  // PNG herunterladen (Fallback / Desktop).
  function download(blob, filename) {
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 4000);
  }

  // Begleittext zum geteilten Bild (erscheint z.B. als Bildunterschrift in
  // WhatsApp/Telegram). Bei einer Vokabel wird die Karte selbst zitiert.
  function shareText(kind, payload) {
    const p = payload || {};
    if (kind === "stats") {
      const r = (p.rate === null || p.rate === undefined) ? null : p.rate;
      const facts = [];
      if (r !== null) facts.push(`${r}% Trefferquote`);
      if (p.mastered) facts.push(`${p.mastered} Vokabeln gemeistert`);
      const tail = facts.length ? " – " + facts.join(", ") : "";
      return `📍 Mein Reise-Spanisch mit HolaRuta${tail}. Lernst du mit? 🌎`;
    }
    const es = String(p.es || "").trim();
    const de = String(p.de || "").trim();
    const head = es && de ? `„${es}" = ${de}` : (es || de || "eine neue Vokabel");
    const tip = String(p.tip || "").trim();
    let t = `📍 Spanisch für unterwegs: ${head}`;
    if (tip) t += `\n🗣️ Aussprache: ${tip}`;
    t += `\n\nGelernt mit HolaRuta – dein Reise-Spanisch für echte Situationen. 🌎`;
    return t;
  }

  // Baut das Bild und teilt es. Erst Web Share API (mit Datei), sonst Download.
  // Gibt zurück: 'shared' | 'downloaded' | 'cancelled' | 'error'.
  async function shareImage(kind, payload, aspect) {
    const fmt = aspect === "story" ? "story" : "square";
    let canvas;
    try {
      canvas = kind === "stats" ? buildStats(payload, fmt) : buildCard(payload, fmt);
    } catch (e) {
      console.warn("Sharepic konnte nicht gezeichnet werden", e);
      return "error";
    }

    let blob;
    try {
      blob = await toBlob(canvas);
    } catch (e) {
      console.warn("Sharepic-Export fehlgeschlagen", e);
      return "error";
    }

    const base = kind === "stats" ? "holaruta-fortschritt" : "holaruta-vokabel";
    const filename = `${base}-${fmt}.png`;
    const title = kind === "stats" ? "Mein Reise-Spanisch-Fortschritt" : "Reise-Spanisch lernen";
    const text = shareText(kind, payload); // Begleittext (z.B. unter dem WhatsApp-Bild)

    // Web Share API mit Datei (Handy: Insta/WhatsApp etc.)
    try {
      if (navigator.canShare && typeof File === "function") {
        const file = new File([blob], filename, { type: "image/png" });
        if (navigator.canShare({ files: [file] })) {
          await navigator.share({ files: [file], title, text });
          return "shared";
        }
      }
    } catch (e) {
      if (e && e.name === "AbortError") return "cancelled"; // Nutzer hat abgebrochen
      // sonst: auf Download zurückfallen
    }

    try {
      download(blob, filename);
      return "downloaded";
    } catch (e) {
      console.warn("Sharepic-Download fehlgeschlagen", e);
      return "error";
    }
  }

  window.SC = window.SC || {};
  window.SC.share = { shareImage, buildCard, buildStats };
})();

</script>
<script>
/*
 * install.js  (SC.install) – „Zum Startbildschirm hinzufügen" (PWA-Installation).
 *
 * Hintergrund: Wer HolaRuta als Einzeldatei per file:// öffnet, muss die Datei
 * jedes Mal im Dateimanager suchen. Läuft die App dagegen von einer echten
 * Web-Adresse (z. B. GitHub Pages), lässt sie sich mit einem eigenen App-Icon
 * auf den Startbildschirm legen – ein Tipp genügt, kein Datei-Suchen, offline.
 *
 * Dieses Modul kapselt die Browser-Eigenheiten dafür:
 *   - Android/Chromium feuert `beforeinstallprompt`; wir fangen es ab und bieten
 *     einen eigenen Knopf an, der den nativen Installations-Dialog auslöst.
 *   - iOS/Safari kennt keinen Prompt – dort zeigen wir nur eine kurze Anleitung.
 *
 * KENNT KEINEN App-Zustand. Der Controller (app.js) fragt den Status ab und
 * bekommt per setOnChange() Bescheid, wenn sich etwas ändert (Re-Render).
 *
 * Öffentlich (window.SC.install):
 *   shouldOffer()   – soll der Startbildschirm-Hinweis im Profil erscheinen?
 *   canPrompt()     – ist der native Installations-Dialog verfügbar? (Android)
 *   isIOS()         – braucht es die manuelle iOS-Anleitung?
 *   promptInstall() – nativen Dialog zeigen -> 'accepted'|'dismissed'|'unavailable'
 *   isInstalled()   – läuft die App bereits installiert (standalone)?
 *   setOnChange(fn) – Callback für „Status hat sich geändert" setzen.
 */
(function () {
  "use strict";

  let deferred = null;   // gestashtes beforeinstallprompt-Event (nur Android/Chromium)
  let installed = false; // läuft die App bereits als installierte PWA?
  let onChange = null;   // Re-Render-Callback (vom Controller gesetzt)

  // Läuft die App im eigenständigen App-Fenster (also bereits installiert)?
  function standalone() {
    return (window.matchMedia && window.matchMedia("(display-mode: standalone)").matches)
      || window.navigator.standalone === true; // iOS Safari kennt nur dieses Flag
  }

  // iPhone/iPad? (iPadOS gibt sich neuerdings als „Macintosh" mit Touch aus.)
  function isIOS() {
    const ua = navigator.userAgent || "";
    return /iPad|iPhone|iPod/.test(ua)
      || (/Macintosh/.test(ua) && navigator.maxTouchPoints > 1);
  }

  // Echte Web-Adresse (http/https) – nur dann ist eine Installation überhaupt
  // möglich. Als file:// Einzeldatei gibt es keinen Service Worker und keinen
  // Install-Prompt, deshalb bieten wir dort nichts an.
  function hosted() {
    return location.protocol === "https:" || location.protocol === "http:";
  }

  function canPrompt() {
    return !!deferred;
  }

  function isInstalled() {
    return installed || standalone();
  }

  // Soll im Profil der „Auf den Startbildschirm"-Hinweis auftauchen?
  function shouldOffer() {
    if (isInstalled()) return false; // schon installiert -> nichts zu tun
    if (!hosted()) return false;     // Einzeldatei -> Installation nicht möglich
    return canPrompt() || isIOS();   // Android-Dialog ODER iOS-Anleitung
  }

  // Nativen Installations-Dialog zeigen (nur Android/Chromium).
  // Gibt zurück: 'accepted' | 'dismissed' | 'unavailable'.
  async function promptInstall() {
    if (!deferred) return "unavailable";
    const evt = deferred;
    deferred = null; // jedes beforeinstallprompt-Event ist nur einmal verwendbar
    try {
      evt.prompt();
      const choice = await evt.userChoice;
      if (onChange) onChange();
      return choice && choice.outcome === "accepted" ? "accepted" : "dismissed";
    } catch (e) {
      if (onChange) onChange();
      return "dismissed";
    }
  }

  installed = standalone();

  // Android/Chromium: Mini-Infobar unterdrücken und Event für unseren Knopf merken.
  window.addEventListener("beforeinstallprompt", (e) => {
    e.preventDefault();
    deferred = e;
    if (onChange) onChange();
  });

  // Erfolgreich installiert: Hinweis ausblenden.
  window.addEventListener("appinstalled", () => {
    installed = true;
    deferred = null;
    if (onChange) onChange();
  });

  window.SC = window.SC || {};
  window.SC.install = {
    shouldOffer,
    canPrompt,
    isIOS,
    promptInstall,
    isInstalled,
    setOnChange(fn) { onChange = typeof fn === "function" ? fn : null; },
  };
})();

</script>
