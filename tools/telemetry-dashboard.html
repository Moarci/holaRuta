<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex, nofollow" />
<meta name="color-scheme" content="light dark" />
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' https://holaruta.com; object-src 'none'; base-uri 'none'; form-action 'none'" />
<title>HolaRuta — Admin</title>
<script>
// Theme VOR dem ersten Paint setzen (kein Flash). Gleiche Logik/Key wie boot.js
// der App: gespeicherte Wahl -> OS-Präferenz -> hell. Eigener Key, damit das
// Admin-Theme unabhängig von der App-Einstellung umschaltbar bleibt.
(function(){
  try {
    var t = localStorage.getItem("holaruta.admintheme.v1");
    if (t !== "dark" && t !== "light") {
      t = (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) ? "dark" : "light";
    }
    document.documentElement.dataset.theme = t;
  } catch (e) { document.documentElement.dataset.theme = "light"; }
})();
</script>
<style>
  /* Selbst gehostete App-Schriften. Im dist-Build (admin.html im Root) liegen sie
     unter fonts/; im Self-Host-Modus (tools/telemetry-server.js) fehlen sie und
     der Stack fällt sauber auf System-Schriften zurück. */
  @font-face { font-family:"Instrument Sans"; src:url("fonts/instrument-sans-400-700-latin.woff2") format("woff2"); font-weight:400 700; font-display:swap; }
  @font-face { font-family:"Bricolage Grotesque"; src:url("fonts/bricolage-grotesque-600-800-latin.woff2") format("woff2"); font-weight:200 800; font-display:swap; }

  /* ---- HolaRuta-Design-Tokens (1:1 aus styles.css der App) ---------------- */
  :root {
    --page:#241510; --surface:#F7EFE3; --card:#FFFDF6; --cream:#FBF3E4; --on-accent:#fff;
    --ink:#2D1B12; --ink-soft:#6E5A4C; --muted:#6E5848; --faint:#7C6453;
    --line:rgba(45,27,18,0.14); --line-strong:rgba(45,27,18,0.22);
    --sunken:rgba(45,27,18,0.07);
    --brand:#C2502E; --brand-ink:#A23E20;
    --ok:#3F7355; --no:#B5302A; --easy:#2F6B70; --warn:#B97C24;
    --r-lg:26px; --r-md:16px; --r-sm:12px; --r-tile:18px;
    --shadow:0 2px 0 rgba(45,27,18,0.10);
    --shadow-lg:0 12px 0 -6px rgba(45,27,18,0.14);
    --font:"Instrument Sans","Segoe UI",-apple-system,BlinkMacSystemFont,Roboto,sans-serif;
    --font-display:"Bricolage Grotesque","Segoe UI",-apple-system,BlinkMacSystemFont,sans-serif;
    --maxw-admin:1180px;
    color-scheme: light;
  }
  [data-theme="dark"] {
    --page:#0E0907; --surface:#17100C; --card:#221811; --on-accent:#241510;
    --ink:#F0E6D8; --ink-soft:#C3B2A1; --muted:#A8917D; --faint:#968069;
    --line:rgba(251,243,228,0.12); --line-strong:rgba(251,243,228,0.22);
    --sunken:rgba(251,243,228,0.07);
    --brand:#E06A40; --brand-ink:#F0996B;
    --ok:#5FA77C; --no:#E5736A; --easy:#4FA0A6; --warn:#D89B3E;
    --shadow:0 2px 0 rgba(0,0,0,0.35);
    --shadow-lg:0 12px 0 -6px rgba(0,0,0,0.45);
    color-scheme: dark;
  }

  * { box-sizing:border-box; }
  /* Muss VOR den display-Regeln stehen bzw. !important sein: ein author-seitiges
     `display:flex` schlägt sonst das UA-`[hidden]{display:none}` und die Toolbar
     bliebe auf der Login-Maske sichtbar (Buttons, die dort nur 401 liefern). */
  [hidden] { display:none !important; }
  body {
    margin:0; background:var(--surface); color:var(--ink);
    font-family:var(--font); font-size:15px; line-height:1.5;
    -webkit-font-smoothing:antialiased;
  }
  /* Regenbogenband: stärkste Brand-Signatur der App (styles.css .topstripe). */
  .topstripe {
    height:8px;
    background:linear-gradient(90deg,#C2502E 0% 16%,#E9A23B 16% 33%,#3F7355 33% 50%,#2F6B70 50% 66%,#7D4A8E 66% 83%,#B5302A 83% 100%);
  }

  /* ---- Kopfzeile --------------------------------------------------------- */
  header { border-bottom:1.5px solid var(--line); background:var(--card); }
  .hwrap {
    max-width:var(--maxw-admin); margin:0 auto; padding:14px 24px;
    display:flex; align-items:center; gap:14px; flex-wrap:wrap;
  }
  .brand { display:flex; align-items:center; gap:10px; }
  .brand__logo { width:38px; height:38px; border-radius:11px; overflow:hidden; box-shadow:var(--shadow); flex:none; }
  .brand__name { font-family:var(--font-display); font-size:1.18rem; font-weight:800; letter-spacing:-0.01em; color:var(--ink); }
  .brand__name span { color:var(--brand); }
  .spacer { flex:1; }
  .sub { color:var(--muted); font-size:13px; font-variant-numeric:tabular-nums; }
  .tools { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }

  /* ---- Bedienelemente ---------------------------------------------------- */
  button {
    font-family:inherit; font-size:13px; font-weight:700; cursor:pointer;
    color:var(--ink-soft); background:var(--card);
    border:1.5px solid var(--line-strong); border-radius:999px;
    padding:8px 14px; min-height:40px;
    box-shadow:var(--shadow);
    transition:background .15s ease, color .15s ease, border-color .15s ease;
  }
  button:hover { border-color:var(--brand); color:var(--brand-ink); }
  button:active { transform:translateY(1px); }
  button.active, button[aria-pressed="true"] {
    background:color-mix(in srgb, var(--brand) 12%, transparent);
    border-color:color-mix(in srgb, var(--brand) 45%, transparent);
    color:var(--brand-ink);
  }
  .segbtns { display:inline-flex; gap:6px; }
  /* Fokus bleibt IMMER sichtbar (die App entfernt das native Tap-Highlight). */
  :where(button,input,a,[tabindex]):focus-visible { outline:2px solid var(--brand); outline-offset:2px; border-radius:6px; }

  input[type=password] {
    font-family:inherit; font-size:15px; color:var(--ink);
    background:var(--surface); border:1.5px solid var(--line-strong); border-radius:var(--r-md);
    padding:12px 14px; min-height:48px; width:100%;
    transition:border-color .15s ease, box-shadow .15s ease;
  }
  input[type=password]:focus-visible {
    outline:none; border-color:var(--brand);
    box-shadow:0 0 0 3px color-mix(in srgb, var(--brand) 22%, transparent);
  }

  /* ---- Layout ------------------------------------------------------------ */
  main { max-width:var(--maxw-admin); margin:0 auto; padding:24px 24px 64px; }
  .grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  /* Grid-Items haben per Default min-width:auto — eine lange Überschrift zieht die
     Spalte dann über die Seitenbreite hinaus und die GANZE Seite scrollt seitlich.
     Gleiche Absicherung wie .kpi in styles.css der App. */
  .grid > * { min-width:0; }
  @media (max-width:860px){ .grid { grid-template-columns:1fr; } }

  /* Typo-Rampe: 11 / 13 / 15 / 20 / 30 / 48 — bewusst nur sechs Stufen. */
  h1 { font-family:var(--font-display); font-size:20px; font-weight:800; letter-spacing:-0.02em; margin:0; }
  h2.sec { font-family:var(--font-display); font-size:20px; font-weight:800; letter-spacing:-0.02em; margin:28px 0 14px; }
  h2.sec:first-child { margin-top:0; }
  h2.sec small { font-family:var(--font); font-size:13px; font-weight:400; color:var(--muted); letter-spacing:0; }
  .eyebrow {
    font-size:11px; font-weight:800; letter-spacing:0.08em; text-transform:uppercase;
    color:var(--muted); margin:22px 0 8px;
  }
  .panel {
    background:var(--card); border:1.5px solid var(--line); border-radius:var(--r-lg);
    padding:18px; margin-bottom:16px; box-shadow:var(--shadow-lg);
  }
  .panel h3 { font-size:15px; font-weight:800; margin:0 0 12px; color:var(--ink); overflow-wrap:anywhere; }
  .panel h3 small { font-size:13px; font-weight:400; color:var(--muted); }
  .panel h4 { font-size:13px; font-weight:800; margin:16px 0 8px; color:var(--ink-soft); text-transform:uppercase; letter-spacing:0.05em; }

  /* ---- Hero: die eine North-Star-Kennzahl -------------------------------- */
  .hero {
    background:var(--card); border:1.5px solid var(--line); border-radius:var(--r-lg);
    padding:22px 24px; margin-bottom:16px; box-shadow:var(--shadow-lg);
    display:flex; gap:28px; align-items:flex-start; flex-wrap:wrap;
  }
  .hero__main { min-width:220px; }
  .hero__val {
    font-family:var(--font-display); font-size:48px; font-weight:800; line-height:1;
    letter-spacing:-0.03em; color:var(--brand); font-variant-numeric:tabular-nums;
    display:flex; align-items:baseline; gap:12px; flex-wrap:wrap;
  }
  .hero__lbl { font-size:13px; font-weight:700; color:var(--ink-soft); margin-top:8px; }
  .hero__hint { font-size:11px; color:var(--muted); margin-top:4px; }
  .hero__side { display:flex; gap:24px; flex-wrap:wrap; align-items:flex-start; }
  .hero__stat .v { font-family:var(--font-display); font-size:20px; font-weight:800; font-variant-numeric:tabular-nums; }
  .hero__stat .l { font-size:11px; color:var(--muted); margin-top:2px; }
  .hero__spark { margin-left:auto; }

  /* ---- KPI-Kacheln, drei Gewichtsstufen ---------------------------------- */
  .kpis { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:12px; margin-bottom:6px; }
  @media (max-width:860px){ .kpis { grid-template-columns:1fr 1fr; } }
  @media (max-width:460px){ .kpis { grid-template-columns:1fr; } }
  .kpi {
    background:var(--card); border:1.5px solid var(--line); border-radius:var(--r-md);
    padding:14px; box-shadow:var(--shadow); min-height:106px;
    display:flex; flex-direction:column; gap:2px;
  }
  .kpi .v {
    font-family:var(--font-display); font-weight:800; letter-spacing:-0.02em;
    font-variant-numeric:tabular-nums; line-height:1.1; overflow-wrap:anywhere;
  }
  .kpi--t1 .v { font-size:30px; }
  .kpi--t2 .v { font-size:24px; }
  .kpi--t3 .v { font-size:20px; }
  .kpi .l { font-size:13px; font-weight:700; color:var(--ink-soft); margin-top:2px; }
  .kpi .h { font-size:11px; color:var(--muted); margin-top:auto; padding-top:6px; }
  /* Leer = grauer Gedankenstrich, NIE eine fette Null (sonst liest sich
     "noch nichts gemessen" wie ein gemessenes Ergebnis von null). */
  .kpi.is-empty .v { color:var(--faint); font-weight:400; }

  /* Zielchip: macht den Benchmark aus INVESTOR-KPIS.md sichtbar UND ersetzt
     Farbe-als-einzigen-Kanal (Barrierefreiheit). */
  .chip {
    display:inline-flex; align-items:center; gap:5px; align-self:flex-start;
    font-size:11px; font-weight:800; line-height:1.3;
    border-radius:999px; padding:3px 9px; margin-top:6px;
    border:1.5px solid currentColor;
  }
  .chip--ok { color:var(--ok); background:color-mix(in srgb, var(--ok) 12%, transparent); }
  .chip--bad { color:var(--no); background:color-mix(in srgb, var(--no) 12%, transparent); }
  .chip--na { color:var(--muted); background:var(--sunken); border-color:var(--line-strong); }

  /* ---- Balkenlisten ------------------------------------------------------ */
  .row { display:flex; align-items:center; gap:10px; margin:6px 0; }
  .row .lab { width:150px; flex:none; color:var(--ink-soft); font-size:13px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .row .barwrap { flex:1; background:var(--sunken); border-radius:999px; overflow:hidden; height:18px; }
  .row .bar { height:100%; border-radius:999px; }
  .row .n { width:56px; flex:none; text-align:right; font-variant-numeric:tabular-nums; font-size:13px; font-weight:700; }
  @media (max-width:520px){ .row .lab { width:100px; } }

  /* ---- Diagramme: Achsen als HTML, damit sie nicht mitverzerrt werden ----- */
  .chart { display:grid; grid-template-columns:auto 1fr; grid-template-rows:auto auto; gap:4px 8px; }
  .chart__y {
    grid-row:1; grid-column:1; height:190px;
    display:flex; flex-direction:column; justify-content:space-between;
    font-size:11px; color:var(--muted); font-variant-numeric:tabular-nums; text-align:right;
  }
  .chart__plot { grid-row:1; grid-column:2; height:190px; }
  .chart__plot svg { display:block; width:100%; height:100%; }
  .chart__x { grid-row:2; grid-column:2; display:flex; justify-content:space-between; font-size:11px; color:var(--muted); }
  .chart__legend { grid-row:3; grid-column:2; font-size:11px; color:var(--muted); margin-top:4px; }

  /* ---- Trichter ---------------------------------------------------------- */
  .funnel { display:flex; flex-direction:column; gap:8px; }
  .fstep { display:flex; align-items:center; gap:10px; }
  .fstep .flab { width:150px; flex:none; color:var(--ink-soft); font-size:13px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .fstep .fbarwrap { flex:1; }
  .fstep .fbar {
    background:var(--brand); height:28px; border-radius:999px;
    min-width:40px; display:flex; align-items:center; justify-content:center;
    color:var(--on-accent); font-weight:800; font-size:12px; font-variant-numeric:tabular-nums;
    transition:width .3s ease;
  }
  .fstep .fmeta { width:100px; flex:none; text-align:right; font-size:12px; color:var(--muted); font-variant-numeric:tabular-nums; }
  @media (max-width:520px){ .fstep .flab { width:92px; } .fstep .fmeta { width:74px; } }

  /* ---- Tabellen ---------------------------------------------------------- */
  /* Scrollbare Bereiche brauchen tabindex, sonst kommt man mit der Tastatur
     nicht an den überstehenden Inhalt (auf schmalen Screens die halbe Heatmap). */
  .tablewrap { overflow-x:auto; }
  .tablewrap:focus-visible { outline:2px solid var(--brand); outline-offset:2px; }
  /* Nur für Screenreader: trägt die Bedeutung, die sonst allein an einem Glyph
     oder einer Farbe hängen würde. */
  .sr { position:absolute; width:1px; height:1px; margin:-1px; padding:0; overflow:hidden; clip-path:inset(50%); white-space:nowrap; border:0; }
  .skip {
    position:absolute; left:-9999px; top:0; z-index:100;
    background:var(--brand); color:var(--on-accent); font-weight:700;
    padding:10px 16px; border-radius:0 0 var(--r-sm) 0; text-decoration:none;
  }
  .skip:focus, .skip:focus-visible { left:8px; top:8px; }
  .heat-na { color:var(--faint); }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th, td { text-align:left; padding:8px 10px; border-bottom:1px solid var(--line); font-variant-numeric:tabular-nums; }
  th { color:var(--brand-ink); font-weight:800; white-space:nowrap; }
  td.num, th.num { text-align:right; }
  table.heat th, table.heat td { text-align:center; border:1px solid var(--surface); padding:4px 6px; font-size:12px; }
  table.heat td.lab, table.heat th.lab { text-align:left; color:var(--muted); white-space:nowrap; }
  .heat-legend { display:flex; align-items:center; gap:8px; margin-top:10px; color:var(--muted); font-size:11px; flex-wrap:wrap; }
  .heat-legend .grad { flex:1; min-width:80px; max-width:180px; height:10px; border-radius:999px; background:linear-gradient(90deg, color-mix(in srgb, var(--ok) 10%, transparent), var(--ok)); }

  /* ---- Leer-Zustände ----------------------------------------------------- */
  .empty {
    color:var(--muted); font-size:13px; padding:14px;
    border:1.5px dashed var(--line-strong); border-radius:var(--r-md);
    background:var(--sunken); margin:0;
  }
  .empty b { color:var(--ink-soft); font-weight:700; }
  /* Erstlauf-Erklärung: ersetzt die Kachelwand, solange nichts gemessen wurde. */
  .firstrun {
    background:color-mix(in srgb, var(--brand) 8%, var(--card));
    border:1.5px dashed color-mix(in srgb, var(--brand) 38%, var(--line));
    border-radius:var(--r-lg); padding:20px 22px; margin-bottom:18px;
  }
  .firstrun h3 { margin:0 0 8px; font-size:15px; font-weight:800; }
  .firstrun p { margin:0 0 10px; font-size:13px; color:var(--ink-soft); max-width:70ch; }
  .firstrun ul { margin:0; padding-left:20px; font-size:13px; color:var(--ink-soft); }
  .firstrun li { margin:4px 0; }
  .firstrun code { background:var(--sunken); padding:1px 6px; border-radius:6px; font-size:0.92em; }

  /* ---- Login ------------------------------------------------------------- */
  .gate {
    max-width:440px; margin:64px auto;
    background:var(--card); border:1.5px solid var(--line); border-radius:var(--r-lg);
    padding:26px; box-shadow:var(--shadow-lg);
  }
  .gate h2 { font-family:var(--font-display); font-size:20px; font-weight:800; margin:0 0 6px; letter-spacing:-0.02em; }
  .gate p { color:var(--muted); font-size:13px; margin:0 0 16px; }
  .gate label { display:block; font-size:13px; font-weight:700; color:var(--ink-soft); margin-bottom:6px; }
  .gate__actions { margin-top:12px; }
  .gate__submit {
    width:100%; background:var(--brand); border-color:var(--brand); color:var(--on-accent);
    border-radius:var(--r-md); min-height:48px; font-size:15px;
  }
  .gate__submit:hover { background:var(--brand); border-color:var(--brand); color:var(--on-accent); filter:brightness(1.04); }
  .gate__submit[disabled] { opacity:.6; cursor:progress; }
  .gate .err {
    color:var(--no); font-size:13px; margin-top:12px; font-weight:700;
    background:color-mix(in srgb, var(--no) 10%, transparent);
    border:1.5px solid color-mix(in srgb, var(--no) 28%, transparent);
    border-radius:var(--r-md); padding:10px 12px;
  }
  .gate details { margin-top:14px; font-size:12px; color:var(--muted); }
  .gate summary { cursor:pointer; font-weight:700; }

  footer {
    max-width:var(--maxw-admin); margin:0 auto; padding:0 24px 48px;
    color:var(--muted); font-size:12px;
  }
  footer code { background:var(--sunken); padding:1px 6px; border-radius:6px; }
  hr.sec-sep { border:none; border-top:1.5px solid var(--line); margin:32px 0; }

  /* ---- Bereichs-Navigation (sticky) -------------------------------------- */
  /* Ein Cockpit mit ~30 Panels braucht eine Karte: die Subnav benennt die acht
     Bereiche und zeigt per Scrollspy, wo man gerade ist. */
  .subnav {
    position:sticky; top:0; z-index:50;
    background:color-mix(in srgb, var(--surface) 88%, transparent);
    backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
    border-bottom:1.5px solid var(--line);
  }
  .subnav__wrap {
    max-width:var(--maxw-admin); margin:0 auto; padding:8px 24px;
    display:flex; gap:6px; overflow-x:auto; scrollbar-width:none;
  }
  .subnav__wrap::-webkit-scrollbar { display:none; }
  .subnav a {
    flex:none; text-decoration:none; font-size:12px; font-weight:700;
    color:var(--ink-soft); border:1.5px solid transparent; border-radius:999px;
    padding:6px 12px; white-space:nowrap;
    transition:background .15s ease, color .15s ease, border-color .15s ease;
  }
  .subnav a:hover { color:var(--brand-ink); border-color:var(--line-strong); }
  .subnav a[aria-current="true"] {
    background:color-mix(in srgb, var(--brand) 12%, transparent);
    border-color:color-mix(in srgb, var(--brand) 45%, transparent);
    color:var(--brand-ink);
  }

  /* ---- Bereiche mit Beschreibung ----------------------------------------- */
  /* scroll-margin: sonst verschwindet die Überschrift beim Anker-Sprung unter
     der sticky Subnav. */
  section.zone { scroll-margin-top:64px; }
  .zone__head { margin:36px 0 6px; display:flex; align-items:baseline; gap:10px; flex-wrap:wrap; }
  .zone__head h2 { font-family:var(--font-display); font-size:20px; font-weight:800; letter-spacing:-0.02em; margin:0; }
  .zone__head .znum {
    font-family:var(--font-display); font-size:13px; font-weight:800;
    color:var(--on-accent); background:var(--brand); border-radius:999px;
    width:24px; height:24px; display:inline-flex; align-items:center; justify-content:center;
    flex:none; transform:translateY(-2px);
  }
  .zone__head small { font-family:var(--font); font-size:13px; font-weight:400; color:var(--muted); }
  /* Die Leitfrage + Lesehilfe je Bereich: max 74ch, damit die Zeile lesbar bleibt. */
  .zone__desc { color:var(--ink-soft); font-size:13px; margin:0 0 14px; max-width:74ch; }
  .zone__desc b { color:var(--ink); }
  section.zone:first-of-type .zone__head { margin-top:8px; }

  /* Kurze Lesehilfe direkt unter der Panel-Überschrift. */
  .panel__desc { color:var(--muted); font-size:12px; margin:-6px 0 12px; max-width:70ch; }
  .panel__foot { margin-top:10px; font-size:11px; color:var(--muted); }

  /* ---- Donut + Legende ---------------------------------------------------- */
  .donutwrap { display:flex; gap:18px; align-items:center; flex-wrap:wrap; }
  .donutwrap svg { flex:none; }
  .donut__c { font-family:var(--font-display); font-weight:800; font-size:26px; fill:var(--ink); }
  .donut__cl { font-size:10px; fill:var(--muted); }
  .legend { display:flex; flex-direction:column; gap:6px; min-width:150px; flex:1; }
  .legend__i { display:flex; align-items:center; gap:8px; font-size:13px; color:var(--ink-soft); }
  .legend__i .sw { width:12px; height:12px; border-radius:4px; flex:none; }
  .legend__i .k { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .legend__i .n { margin-left:auto; font-weight:700; font-variant-numeric:tabular-nums; color:var(--ink); }
  .legend__i .p { width:52px; text-align:right; font-variant-numeric:tabular-nums; color:var(--muted); font-size:12px; }

  /* ---- Klartext-Zusammenfassung ------------------------------------------ */
  .digest {
    background:var(--cream); border:1.5px solid var(--line); border-radius:var(--r-lg);
    padding:16px 20px; margin-bottom:16px; box-shadow:var(--shadow);
    font-size:13px; color:var(--ink-soft); max-width:none;
  }
  [data-theme="dark"] .digest { background:var(--card); }
  .digest b { color:var(--ink); }
  .digest .dt { font-weight:800; color:var(--brand-ink); margin-right:6px; }

  /* ---- Glossar ------------------------------------------------------------ */
  details.gloss {
    background:var(--card); border:1.5px solid var(--line); border-radius:var(--r-md);
    padding:12px 16px; margin:0 0 16px; font-size:13px; color:var(--ink-soft);
  }
  details.gloss summary { cursor:pointer; font-weight:800; color:var(--ink); }
  details.gloss dl { margin:10px 0 0; display:grid; grid-template-columns:auto 1fr; gap:6px 14px; }
  details.gloss dt { font-weight:700; color:var(--brand-ink); white-space:nowrap; }
  details.gloss dd { margin:0; max-width:70ch; }
  @media (max-width:640px){ details.gloss dl { grid-template-columns:1fr; gap:2px; } details.gloss dd { margin-bottom:8px; } }

  /* ---- Diagramm-Tooltip (eine Instanz, per Delegation gefüllt) ------------ */
  .tip {
    position:fixed; z-index:200; pointer-events:none;
    background:var(--ink); color:var(--surface);
    font-size:12px; font-weight:700; font-variant-numeric:tabular-nums;
    padding:6px 10px; border-radius:8px; box-shadow:var(--shadow-lg);
    max-width:260px; opacity:0; transition:opacity .1s ease;
  }
  .tip.on { opacity:1; }
  [data-tip]:hover { filter:brightness(1.12); cursor:default; }

  /* ---- Druck / PDF-Export -------------------------------------------------- */
  /* Der Drucken-Button macht aus dem Cockpit ein Data-Room-taugliches PDF:
     Bedienelemente raus, Panels nicht über Seitengrenzen brechen. */
  @media print {
    .subnav, .tools, .skip, .tip { display:none !important; }
    body { background:#fff; }
    .panel, .hero, .kpi, .digest { box-shadow:none; break-inside:avoid; }
    section.zone { break-before:auto; }
    a { text-decoration:none; color:inherit; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration:.001ms !important; transition-duration:.001ms !important; }
  }
</style>
</head>

<!-- Bereichs-Navigation: wird von render() gefüllt (die Bereiche stehen als
     SECTIONS-Registry im reinen Skriptteil) und bleibt bis dahin versteckt. -->
<nav class="subnav" id="subnav" aria-label="Bereiche" hidden><div class="subnav__wrap" id="subnavwrap"></div></nav>
<p id="live" class="sr" role="status" aria-live="polite"></p>
<main id="app" tabindex="-1"><p class="empty">Lade …</p></main>
<footer id="foot" hidden>
  Zugriff per <code>ADMIN_TELEMETRY_TOKEN</code> · Daten kommen ausschließlich von Geräten mit <b>aktivierter</b> opt-in-Statistik.
  Feld-Definitionen: <code>docs/TELEMETRIE.md</code> · Kennzahlen-Spec: <code>docs/INVESTOR-KPIS.md</code>. „Nutzer“ = distinkte pseudonyme <code>clientId</code>.
</footer>
<script>
"use strict";
var $ = function (id) { return document.getElementById(id); };
function esc(s){ return String(s==null?"":s).replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c];}); }
function fmtDur(sec){ sec=sec|0; if(sec<60) return sec+" s"; var m=Math.floor(sec/60), s=sec%60; if(m<60) return m+" min "+(s?(s+" s"):""); var h=Math.floor(m/60); return h+" h "+(m%60)+" min"; }
// EINE Zahlenformatierung für die ganze Seite (de-DE: 12.345 / 3,4). Vorher liefen
// manche Werte durch fmtN und andere roh -> dieselbe Kennzahl stand zweimal
// unterschiedlich formatiert auf der Seite.
function fmtN(v){ return (typeof v==="number" && isFinite(v)) ? v.toLocaleString("de-DE") : v; }
function numlead(s){ var m=String(s).match(/\d+/); return m?parseInt(m[0],10):0; }
function sortBuckets(arr){ return (arr||[]).slice().sort(function(a,b){return numlead(a.key)-numlead(b.key);}); }
function pct(v){ return fmtN(v)+" %"; }

// Einheitlicher Leer-Zustand: sagt IMMER, was Daten erzeugen würde.
function empty(what, why){
  return '<p class="empty"><b>'+esc(what)+'</b>'+(why? ' — '+esc(why) : '')+'</p>';
}

// Trichter-Stufen kommen als stabile Event-Schlüssel vom Server (die gehören da
// auch hin — CSV-Export und API dürfen sich nicht mit der Oberflächensprache
// ändern). Übersetzt wird deshalb erst hier, in der Anzeigeschicht. Unbekannte
// Schlüssel fallen absichtlich unübersetzt durch, damit eine neue Server-Stufe
// sichtbar bleibt statt still zu verschwinden.
var STEP_LABELS = {
  // Onboarding (aggregate(): funnel)
  intro: "Einstieg gesehen",
  profile: "Profil angelegt",
  trip: "Reiseziel gewählt",
  complete: "Onboarding beendet",
  // Aktivierung (aggregate(): investor.activation.funnel)
  "new": "Neu im Fenster",
  onboarding_complete: "Onboarding beendet",
  first_session: "Erste Lernrunde",
  returning: "Wiedergekommen"
};
function stepLabel(k){ return STEP_LABELS[k] || String(k==null?"":k); }

// Textfassung einer Zeitreihe für Screenreader. Ein <svg> voller <title> auf
// nicht-fokussierbaren Punkten ist per Tastatur unerreichbar — die Kernaussage
// (Spanne, Höchstwert, aktueller Wert) muss als Text existieren.
function seriesSummary(series, unit){
  if(!series || !series.length) return "Keine Daten.";
  var max = series[0], min = series[0];
  series.forEach(function(d){
    if((d.count||0) > (max.count||0)) max = d;
    if((d.count||0) < (min.count||0)) min = d;
  });
  var last = series[series.length-1];
  var u = unit || "";
  return series.length + " Werte von " + series[0].day + " bis " + last.day
    + ". Höchstwert " + fmtN(max.count||0) + u + " am " + max.day
    + ", niedrigster " + fmtN(min.count||0) + u + " am " + min.day
    + ", zuletzt " + fmtN(last.count||0) + u + ".";
}

// Horizontale Balkenliste: data = [{key/label, count, color?}]
function hbars(data, opts){
  opts = opts || {};
  if(!data || !data.length) return empty(opts.emptyWhat||"Keine Daten", opts.emptyWhy||"");
  var max = data.reduce(function(m,d){ return Math.max(m, d.count||0); }, 0) || 1;
  var base = opts.color || "var(--easy)";
  return data.map(function(d){
    var label = d.label!=null?d.label:d.key;
    var w = Math.round(((d.count||0)/max)*100);
    var n = opts.fmt ? opts.fmt(d) : fmtN(d.count);
    var color = d.color || base;
    return '<div class="row"><div class="lab" title="'+esc(label)+'">'+esc(label)+'</div>'
      + '<div class="barwrap"><div class="bar" style="width:'+w+'%;background:'+color+'"></div></div>'
      + '<div class="n">'+esc(n)+'</div></div>';
  }).join("");
}

// Winzige Sparkline für Hero/Kacheln.
function spark(series, opts){
  opts = opts || {};
  series = series || [];
  if(series.length < 2) return "";
  var W=140, H=34, pad=2, color=opts.color||"var(--brand)";
  var max = series.reduce(function(m,d){ return Math.max(m, d.count||0); }, 0) || 1;
  var n = series.length;
  var xs = function(i){ return pad + (i/(n-1))*(W-2*pad); };
  var ys = function(v){ return H-pad - ((v||0)/max)*(H-2*pad); };
  var pts = series.map(function(d,i){ return xs(i).toFixed(1)+","+ys(d.count).toFixed(1); });
  var area = "M"+xs(0).toFixed(1)+","+(H-pad)+" L"+pts.join(" L")+" L"+xs(n-1).toFixed(1)+","+(H-pad)+" Z";
  return '<svg viewBox="0 0 '+W+' '+H+'" width="'+W+'" height="'+H+'" aria-hidden="true">'
    + '<path d="'+area+'" fill="'+color+'" opacity="0.16"/>'
    + '<polyline points="'+pts.join(" ")+'" fill="none" stroke="'+color+'" stroke-width="1.5"/>'
    + '</svg>';
}

// Achsen-Deckenwert: rundet auf eine "schöne" Zahl auf (1/2/4/5/10 × 10^n),
// damit oben an der y-Achse "50" steht statt "47" — und der Mittel-Tick eine
// halbwegs lesbare Hälfte hat (25 statt 23,5).
function niceMax(v){
  v = Number(v) || 0;
  if(v <= 0) return 1;
  var p = Math.pow(10, Math.floor(Math.log10(v)));
  var m = v / p;
  var f = m <= 1 ? 1 : m <= 2 ? 2 : m <= 4 ? 4 : m <= 5 ? 5 : 10;
  return f * p;
}

// Rahmen für Zeitreihen: Achsenbeschriftung liegt als HTML AUSSERHALB des SVG.
// Grund: das Plot-SVG wird mit preserveAspectRatio="none" auf die Panelbreite
// gezogen; SVG-<text> darin würde mitverzerrt (auf dem Handy zu ~3px-Glyphen
// zusammengequetscht). HTML-Labels bleiben in jeder Breite lesbar.
// Drei y-Ticks (max/Hälfte/0) statt zwei: erst der Mittelwert macht ablesbar,
// ob ein Punkt "knapp unter Spitze" oder "gut die Hälfte" ist.
function chartFrame(plotSvg, max, labels, legend, summary){
  return '<div class="chart">'
    + (summary? '<p class="sr">'+esc(summary)+'</p>' : '')
    + '<div class="chart__y" aria-hidden="true"><span>'+esc(fmtN(max))+'</span><span>'+esc(fmtN(max/2))+'</span><span>0</span></div>'
    + '<div class="chart__plot">'+plotSvg+'</div>'
    + '<div class="chart__x" aria-hidden="true">'+labels.map(function(l){ return '<span>'+esc(l)+'</span>'; }).join("")+'</div>'
    + (legend? '<div class="chart__legend">'+legend+'</div>' : '')
    + '</div>';
}
function xLabels(series, fn){
  var n = series.length;
  var f = fn || function(d){ return String(d.day).slice(5); };
  if(n===1) return [f(series[0])];
  if(n===2) return [f(series[0]), f(series[1])];
  return [f(series[0]), f(series[Math.floor(n/2)]), f(series[n-1])];
}
// Gitterlinien auf halber und voller Höhe der Skala — als eigene Ebene UNTER
// den Daten. vector-effect hält die Strichstärke trotz preserveAspectRatio:none.
function gridLines(W, ys, max){
  return [max, max/2].map(function(v){
    var y = ys(v).toFixed(1);
    return '<line x1="0" y1="'+y+'" x2="'+W+'" y2="'+y+'" stroke="var(--line)" stroke-width="1" vector-effect="non-scaling-stroke"/>';
  }).join("");
}

// Zeitreihe als Fläche+Linie mit optionalem gleitendem Mittel.
// Punkte tragen data-tip (Datum · Wert) für den delegierten HTML-Tooltip —
// <title> im aria-hidden-SVG wäre für niemanden erreichbar und auf Touch stumm.
function lineChart(series, opts){
  opts = opts || {};
  if(!series || !series.length) return empty("Keine Zeitreihe", "entsteht mit dem ersten app_open");
  var W=1000, H=200, color = opts.color || "var(--brand)";
  var raw = series.reduce(function(m,d){ return Math.max(m, d.count||0); }, 0) || 1;
  var max = niceMax(raw);
  var n = series.length;
  var xs = function(i){ return n<2?0:(i/(n-1))*W; };
  var ys = function(v){ return H - ((v||0)/max)*(H-8) - 4; };
  var pts = series.map(function(d,i){ return xs(i).toFixed(1)+","+ys(d.count).toFixed(1); });
  var area = 'M'+xs(0).toFixed(1)+','+H+' L'+pts.join(' L')+' L'+xs(n-1).toFixed(1)+','+H+' Z';
  var maLine = "";
  if(opts.ma && n >= opts.ma){
    var w = opts.ma, mapts = [];
    for(var i=0;i<n;i++){ if(i < w-1) continue; var sum=0; for(var j=i-w+1;j<=i;j++) sum+=series[j].count||0; mapts.push(xs(i).toFixed(1)+","+ys(sum/w).toFixed(1)); }
    maLine = '<polyline points="'+mapts.join(" ")+'" fill="none" stroke="var(--warn)" stroke-width="2" vector-effect="non-scaling-stroke"/>';
  }
  // r=6 unsichtbar-großzügig als Trefferfläche, der sichtbare Punkt ist r=2:
  // auf 2px-Ziele trifft am Handy niemand.
  var dots = series.map(function(d,i){
    var tip = esc(d.day)+" · "+esc(fmtN(d.count||0))+(opts.unit?esc(opts.unit):"");
    return '<circle cx="'+xs(i).toFixed(1)+'" cy="'+ys(d.count).toFixed(1)+'" r="2" fill="'+color+'" vector-effect="non-scaling-stroke"/>'
      + '<circle cx="'+xs(i).toFixed(1)+'" cy="'+ys(d.count).toFixed(1)+'" r="6" fill="transparent" vector-effect="non-scaling-stroke" data-tip="'+tip+'"/>';
  }).join("");
  var svg = '<svg viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="none" aria-hidden="true" focusable="false">'
    + gridLines(W, ys, max)
    + '<path d="'+area+'" fill="'+color+'" opacity="0.14"/>'
    + '<polyline points="'+pts.join(" ")+'" fill="none" stroke="'+color+'" stroke-width="1.8" vector-effect="non-scaling-stroke"/>'
    + maLine + dots + '</svg>';
  // Die Quadrate tragen nur die Farbzuordnung; vorgelesen ergäben sie
  // "schwarzes Quadrat täglich schwarzes Quadrat 7-Tage-Mittel".
  var legend = opts.ma ? '<span style="color:'+color+'" aria-hidden="true">■</span> täglich · <span style="color:var(--warn)" aria-hidden="true">■</span> '+opts.ma+'-Tage-Mittel' : "";
  return chartFrame(svg, max, xLabels(series, opts.xlabel), legend, seriesSummary(series, opts.unit));
}

// Vertikales Balkendiagramm.
function vbars(series, opts){
  opts = opts || {};
  if(!series || !series.length) return empty("Keine Daten", opts.emptyWhy||"");
  var W=1000, H=200;
  var raw = series.reduce(function(m,d){ return Math.max(m, d.count||0); }, 0) || 1;
  var max = niceMax(raw);
  var n = series.length, gap = n>60?0.5:2;
  var bw = W/n - gap;
  var color = opts.color || "var(--easy)";
  var ys = function(v){ return H - ((v||0)/max)*(H-4); };
  var bars = series.map(function(d,i){
    var h = Math.round(((d.count||0)/max)*(H-4));
    var x = i*(W/n);
    var tip = esc(opts.xlabel? opts.xlabel(d) : d.day)+" · "+esc(fmtN(d.count||0));
    return '<rect x="'+x.toFixed(1)+'" y="'+(H-h)+'" width="'+Math.max(1,bw).toFixed(1)+'" height="'+h+'" rx="1.5" style="fill:'+color+'" data-tip="'+tip+'"/>';
  }).join("");
  var svg = '<svg viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="none" aria-hidden="true" focusable="false">'
    + gridLines(W, ys, max) + bars + '</svg>';
  return chartFrame(svg, max, xLabels(series, opts.xlabel), "", seriesSummary(series, opts.unit));
}

// Donut für Anteils-Fragen (Plattform, Edition): bei 2–6 Kategorien liest sich
// "wie verteilt sich das Ganze?" als Kreis schneller als als Balkenliste.
// Ab der 7. Kategorie wird zu "Andere" zusammengefasst — mehr Segmente kann
// niemand mehr einer Legende zuordnen. Anteile stehen als TEXT in der Legende
// und als sr-Absatz; der Kreis ist nur der zweite Kanal.
var DONUT_COLORS = ["var(--brand)","var(--easy)","var(--ok)","var(--warn)","var(--no)","var(--brand-ink)"];
function donut(data, opts){
  opts = opts || {};
  data = (data||[]).filter(function(d){ return (d.count||0) > 0; });
  if(!data.length) return empty(opts.emptyWhat||"Keine Daten", opts.emptyWhy||"");
  var sorted = data.slice().sort(function(a,b){ return (b.count||0)-(a.count||0); });
  var main = sorted.slice(0, 5), rest = sorted.slice(5);
  if(rest.length === 1) main = sorted.slice(0, 6);
  else if(rest.length) main.push({ label:"Andere ("+rest.length+")", count:rest.reduce(function(s,d){ return s+(d.count||0); },0) });
  var total = main.reduce(function(s,d){ return s+(d.count||0); }, 0) || 1;
  var R=48, CX=60, CY=60, C=2*Math.PI*R;
  var off = 0;
  var slices = main.map(function(d,i){
    var frac = (d.count||0)/total;
    var len = frac*C;
    var s = '<circle cx="'+CX+'" cy="'+CY+'" r="'+R+'" fill="none" stroke="'+DONUT_COLORS[i%DONUT_COLORS.length]+'" stroke-width="22" '
      + 'stroke-dasharray="'+len.toFixed(2)+' '+(C-len).toFixed(2)+'" stroke-dashoffset="'+(-off).toFixed(2)+'" transform="rotate(-90 '+CX+' '+CY+')"/>';
    off += len;
    return s;
  }).join("");
  var legend = main.map(function(d,i){
    var label = d.label!=null?d.label:d.key;
    var p = Math.round(((d.count||0)/total)*100);
    return '<div class="legend__i"><span class="sw" style="background:'+DONUT_COLORS[i%DONUT_COLORS.length]+'"></span>'
      + '<span class="k" title="'+esc(label)+'">'+esc(label)+'</span>'
      + '<span class="n">'+esc(fmtN(d.count||0))+'</span><span class="p">'+p+' %</span></div>';
  }).join("");
  var sr = fmtN(total)+" gesamt. " + main.map(function(d){
    var label = d.label!=null?d.label:d.key;
    return label+": "+fmtN(d.count||0)+" ("+Math.round(((d.count||0)/total)*100)+" %)";
  }).join(", ")+".";
  return '<div class="donutwrap"><p class="sr">'+esc(sr)+'</p>'
    + '<svg viewBox="0 0 120 120" width="132" height="132" aria-hidden="true" focusable="false">'+slices
    + '<text x="60" y="58" text-anchor="middle" class="donut__c">'+esc(fmtN(total))+'</text>'
    + '<text x="60" y="74" text-anchor="middle" class="donut__cl">'+esc(opts.centerLabel||"gesamt")+'</text>'
    + '</svg><div class="legend">'+legend+'</div></div>';
}

// Klartext-Zusammenfassung: die fünf Investor-Antworten als Sätze, nicht als
// Kachelwand. Nur MESSBARES wird behauptet — eine n/a-Retention taucht als
// "noch nicht messbar" auf, nicht als 0 %.
function execSummary(s){
  var u = s.users||{}, inv = s.investor||{};
  if(!u.total) return "";
  var nsm = inv.nsm||{}, act = inv.activation||{}, growth = inv.growth||{};
  var parts = [];
  parts.push('<b>'+fmtN(u.total)+'</b> Personen waren im '+esc(s.windowDays)+'-Tage-Fenster aktiv, '
    + '<b>'+fmtN(nsm.wal||0)+'</b> davon haben in den letzten 7 Tagen mindestens eine Lernrunde beendet (WAL, '
    + arrow((nsm.trend||{}).deltaPct)+' zur Vorwoche).');
  if(act.newUsers){
    parts.push('Von <b>'+fmtN(act.newUsers)+'</b> neuen Personen kamen <b>'+pct(act.ratePct||0)+'</b> bis zur ersten Lernrunde'
      + ((act.ratePct||0) > 40 ? ' — über dem 40-%-Ziel.' : ' (Ziel: über 40 %).'));
  }
  var r7 = retEntry(u, 7);
  if(!r7.na){
    parts.push('D7-Retention: <b>'+r7.pct+' %</b>'+(r7.pct>=15?' — über dem 15-%-Ziel.':' (Ziel: ≥ 15 %).'));
  } else {
    parts.push('D7-Retention ist im gewählten Fenster noch nicht messbar.');
  }
  if(growth.churned || growth.newUsers || growth.resurrected){
    var qr = growth.quickRatio||0;
    parts.push('Quick Ratio <b>'+fmtN(qr)+'</b>: '+(qr>1?'es kommen mehr Personen hinzu als abwandern.':'die Abwanderung überwiegt die Zugänge.'));
  }
  var errs = (s.totals||{}).errors||0;
  parts.push(errs ? '<b>'+fmtN(errs)+'</b> JS-Fehler im Fenster — siehe Bereich Qualität.' : 'Keine JS-Fehler im Fenster.');
  return '<div class="digest"><span class="dt">Kurzfassung</span>'+parts.join(" ")+'</div>';
}

// Bereichs-Registry: EINE Quelle für Subnav (DOM-Teil) und Sektionsköpfe
// (render()). id = Anker, q = Leitfrage, desc = Lesehilfe unter dem Kopf.
var SECTIONS = [
  { id:"overview",   title:"Überblick",             q:"Wie steht es insgesamt?",
    desc:"North-Star-Metrik, Kurzfassung in Sätzen und die Kern-Bestandszahlen. Alles Weitere ist nach dem AARRR-Rahmen geordnet: erst gewinnen, dann aktivieren, dann halten." },
  { id:"growth",     title:"Wachstum & Akquise",    q:"Woher kommen sie — und wächst es von selbst?",
    desc:"Zugänge gegen Abwanderung (Growth Accounting), Herkunftskanäle der Erstkontakte und der virale Kreislauf aus Teilen und Share-Installs." },
  { id:"activation", title:"Aktivierung",           q:"Kommen Neue bis zum ersten Lern-Erfolg?",
    desc:"Der Weg von „App zum ersten Mal geöffnet“ bis „erste Lernrunde beendet“. Jede Stufe zeigt den Drop-off — dort, wo er am größten ist, lohnt Produktarbeit am meisten." },
  { id:"retention",  title:"Retention",             q:"Bleiben sie? (Der Kern jeder Bewertung)",

// Panel-Helfer: Überschrift + optionale Lesehilfe + Inhalt. Die Lesehilfe sagt
// in einem Satz, WIE man das Diagramm liest — nicht, was ohnehin dransteht.
function panelHtml(o){
  return '<div class="panel"'+(o.style? ' style="'+o.style+'"' : '')+'>'
    + '<h3'+(o.titleStyle? ' style="'+o.titleStyle+'"' : '')+'>'+o.title+(o.small? ' <small>'+o.small+'</small>' : '')+'</h3>'
    + (o.desc? '<p class="panel__desc">'+esc(o.desc)+'</p>' : '')
    + o.body
    + (o.foot? '<div class="panel__foot">'+o.foot+'</div>' : '')
    + '</div>';
}

// Trichter.
//
// Zwei Wege, auf denen ein "Trichter" keiner ist — beide real erreichbar, weil
// die Stufen aus voneinander UNABHÄNGIGEN Event-Mengen gezählt werden (s.funnel:
// `onboarding_step:intro` vs. `onboarding_complete`) und das Zeitfenster mitten
// durch eine Nutzerreise schneiden kann:
//   a) Einstiegsstufe 0, spätere Stufe > 0  (intro vor dem Fenster, Abschluss darin)
//   b) irgendeine Stufe > Einstiegsstufe    (dieselbe Ursache, nur teilweise)
// In beiden Fällen ist die Quote nicht definiert. Sie trotzdem auszurechnen
// ergab vorher Werte wie "300 %". Jetzt: Quote = n/a, Balken werden am GRÖSSTEN
// Wert skaliert (sonst stünden alle Stufen auf 100 % und der Balken trüge
// überhaupt keine Information mehr), plus ein Hinweis, warum.
function funnelChart(steps, emptyWhy){
  steps = (steps||[]).map(function(s){ return { label: s.label!=null?s.label:stepLabel(s.step), count: s.count||0 }; });
  if(!steps.length || !steps.some(function(s){return s.count>0;})) return empty("Keine Trichter-Daten", emptyWhy||"");
  var top = steps[0].count;
  var peak = steps.reduce(function(m,s){ return Math.max(m, s.count); }, 0) || 1;
  var broken = !top || steps.some(function(s){ return s.count > top; });
  var scale = broken ? peak : top;
  return (broken? '<p class="empty" style="margin-bottom:10px"><b>Stufen nicht vergleichbar</b> — eine spätere Stufe ist größer als die Einstiegsstufe (Ereignisse der Einstiegsstufe liegen teilweise vor dem Zeitfenster). Quoten deshalb n/a; die absoluten Zahlen stimmen. Größeres Fenster wählen.</p>' : '')
    + '<div class="funnel">'+steps.map(function(s,i){
    var w = Math.max(4, Math.min(100, Math.round((s.count/scale)*100)));
    var conv = broken ? null : Math.round((s.count/top)*100);
    var drop = (!broken && i>0 && steps[i-1].count) ? Math.round((1-(s.count/steps[i-1].count))*100) : null;
    return '<div class="fstep">'
      + '<div class="flab" title="'+esc(s.label)+'">'+esc(s.label)+'</div>'
      + '<div class="fbarwrap"><div class="fbar" style="width:'+w+'%"><span>'+esc(fmtN(s.count))+'</span></div></div>'
      + '<div class="fmeta">'+(conv==null?'n/a':conv+' %')+(drop!=null&&drop>0?' <span style="color:var(--no)">▼'+drop+' %</span>':'')+'</div>'
      + '</div>';
  }).join("")+'</div>';
}

// KPI-Kachel. Objekt-API statt Positionsargumenten, weil eine Kachel inzwischen
// sechs Dimensionen hat (Wert, Label, Hinweis, Gewichtung, Zielchip, Leer-Zustand).
//  o.tier   1|2|3  -> Schriftgröße = Wichtigkeit
//  o.empty  true   -> "—" statt fetter 0 (nicht gemessen != gemessene Null)
//  o.target {ok, text} -> Benchmark als Text-Chip (nicht nur als Farbe)
function kpi(o){
  var isEmpty = !!o.empty;
  var val = isEmpty ? "—" : (o.raw!=null ? o.raw : fmtN(o.v));
  var chip = "";
  if(o.target){
    // Ohne Messwert wird das Ziel NICHT bewertet: ein rotes „Ziel verfehlt“ auf
    // einer Kachel, die gar nichts gemessen hat, ist eine Falschaussage — und
    // stellt genau den „alles kaputt“-Eindruck wieder her, den der Leer-Zustand
    // vermeiden soll.
    var cls = (isEmpty || o.target.na) ? "chip--na" : (o.target.ok ? "chip--ok" : "chip--bad");
    chip = '<span class="chip '+cls+'">'+esc(o.target.text)+'</span>';
  }
  return '<div class="kpi kpi--t'+(o.tier||2)+(isEmpty?' is-empty':'')+'">'
    + '<div class="v"'+(o.tone&&!isEmpty?' style="color:'+o.tone+'"':'')+'>'+esc(val)+'</div>'
    + '<div class="l">'+esc(o.label)+'</div>'
    + chip
    + (o.hint? '<div class="h">'+esc(o.hint)+'</div>' : '')
    + '</div>';
}
function arrow(delta){
  delta = delta|0;
  if(delta>0) return '<span style="color:var(--ok)">▲ '+delta+' %</span>';
  if(delta<0) return '<span style="color:var(--no)">▼ '+Math.abs(delta)+' %</span>';
  return '<span style="color:var(--muted)">± 0 %</span>';
}

// Retention-Kohorten-Heatmap.
function heatmap(cohorts){
  if(!cohorts || !cohorts.length) return empty("Keine Kohorten", "entsteht ab dem ersten Nutzer mit ≥ 2 aktiven Tagen");
  var offs = cohorts[0].cells.map(function(c){ return c.dayN; });
  var head = '<tr><th class="lab">Kohorte (Erst-Tag)</th><th>Größe</th>'+offs.map(function(k){ return '<th>D'+k+'</th>'; }).join("")+'</tr>';
  var rows = cohorts.map(function(co){
    var cells = co.cells.map(function(c){
      if(!c.eligible || c.pct==null) return '<td class="heat-na"><span class="sr">nicht messbar</span><span aria-hidden="true">·</span></td>';
      // Sättigung bewusst bei 45 % gedeckelt und KEIN Textfarben-Wechsel.
      // Begründung (durchgerechnet, beide Themes): eine durchgehende Farbrampe
      // läuft zwangsläufig durch eine mittlere Helligkeit, in der weder dunkler
      // noch heller Text 4,5:1 erreicht — mit Umschaltpunkt kommt man auf höchstens
      // ~3,9:1, und die Umschaltrichtung müsste je Theme entgegengesetzt sein
      // (hell: dunkles Grün braucht helle Schrift, dunkel: helles Grün braucht
      // dunkle). Gedeckelt bei 0.45 hält --ink durchgehend 8,4:1 (hell) bzw.
      // 6,4:1 (dunkel). Die Zahl steht ohnehin in jeder Zelle — die Fläche ist
      // nur der zweite Kanal, nicht der einzige.
      var a = 0.06 + (c.pct/100)*0.39;
      return '<td style="background:color-mix(in srgb, var(--ok) '+Math.round(a*100)+'%, transparent)'+(c.pct>=50?';font-weight:800':'')+'" title="'+esc(fmtN(c.retained))+' / '+esc(fmtN(co.size))+' wieder aktiv">'+c.pct+' %</td>';
    }).join("");
    return '<tr><td class="lab">'+esc(co.cohort)+'</td><td>'+esc(fmtN(co.size))+'</td>'+cells+'</tr>';
  }).join("");
  var legend = '<div class="heat-legend"><span>0 %</span><span class="grad"></span><span>100 % wieder aktiv</span><span style="margin-left:auto">· = im Fenster noch nicht messbar</span></div>';
  return '<div class="tablewrap" tabindex="0" role="region" aria-label="Retention-Kohorten, horizontal scrollbar"><table class="heat">'+head+rows+'</table></div>'+legend;
}

function editionTable(eds){
  if(!eds || !eds.length) return empty("Keine Editionen", "erscheint, sobald Snapshots mit edition-Feld eintreffen");
  var head = '<tr><th>Edition</th><th class="num">Nutzer</th><th class="num">WAU</th><th class="num">Sitzungen</th><th class="num">Aktiviert</th><th class="num">Aktiv.-Quote</th></tr>';
  var rows = eds.map(function(e){
    return '<tr><td>'+esc(e.edition)+'</td><td class="num">'+esc(fmtN(e.users))+'</td><td class="num">'+esc(fmtN(e.wau))+'</td><td class="num">'+esc(fmtN(e.sessions))+'</td><td class="num">'+esc(fmtN(e.activated))+'</td><td class="num">'+esc(pct(e.activationPct))+'</td></tr>';
  }).join("");
  return '<div class="tablewrap" tabindex="0" role="region" aria-label="KPIs je Edition, horizontal scrollbar"><table>'+head+rows+'</table></div>';
}

// Retention-Eintrag holen. `eligible === 0` heißt NICHT "0 % kamen zurück",
// sondern "im gewählten Fenster kann noch niemand so alt sein" (D7 braucht
// mind. 8 Tage Historie). Genau diese Unterscheidung fehlte vorher — die Kachel
// behauptete hart "0 %", während die Heatmap die Spalte korrekt wegließ.
function retEntry(u, k){
  var r = (u.retention||[]).filter(function(x){ return x.day===k; })[0];
  if(!r || !r.eligible) return { na:true, pct:null, eligible:0 };
  return { na:false, pct:r.pct, eligible:r.eligible };
}
function retText(u, k){ var r = retEntry(u,k); return r.na ? "n/a" : r.pct+" %"; }

function render(s){
  var u=s.users, se=s.sessions, le=s.learning;
  var inv = s.investor || {};
  var html = "";
  // "Nichts gemessen" sicher erkennen: totals kommen direkt aus dem Ingest und
  // sind unabhängig von jeder Ableitung. ACHTUNG: sie sind FENSTER-gefiltert —
  // "0 Snapshots" heißt "keine im gewählten Fenster", nicht zwingend "keine da".
  // Die Texte unten müssen entsprechend vorsichtig formuliert sein.
  var noEvents = !(s.totals && s.totals.events), noSnaps = !(s.totals && s.totals.snapshots);
  var virgin = noEvents && noSnaps;
  // Alle Quoten/Verhältnisse leiten sich aus aktiven Personen ab. Ohne solche im
  // Fenster ist JEDE davon aussagelos — sie dann als "0 %" mit rotem "Ziel
  // verfehlt"-Chip zu zeigen, wäre wieder die Kachelwand, die wie ein Defekt
  // aussieht. Deshalb gilt der Leer-Zustand nicht nur für den jungfräulichen
  // Fall, sondern immer wenn die Bezugsgröße fehlt.
  var noBasis = virgin || !u.total;

  // ======================= 1 · ÜBERBLICK ===================================
  html += zoneOpen(SECTIONS[0], 0);

  if(inv.alerts && inv.alerts.length){
    html += panelHtml({ style:"border-color:var(--no)", titleStyle:"color:var(--no)",
      title:"Regressions-Alarm", small:"(Fehlerquote je App-Version über Schwelle)",
      desc:"Schlägt an, wenn eine App-Version deutlich mehr Fehler je Event produziert als die übrigen — das typische Bild eines kaputten Releases. Steht hier etwas, zuerst handeln, dann weiterlesen.",
      body: hbars(inv.alerts.map(function(a){return {label:a.version+" · "+fmtN(a.errors)+"/"+fmtN(a.events)+" Events",count:a.ratePct};}),{color:"var(--no)",fmt:function(d){return d.count+" %";}}) });
  }

  // ---- Erstlauf: erklären statt dreizehn Nullen zeigen --------------------
  if(virgin){
    html += '<div class="firstrun"><h3>Noch keine Telemetrie-Daten</h3>'
      + '<p>Im '+esc(s.windowDays)+'-Tage-Fenster: <b>0 Events</b>, <b>0 Snapshots</b>. Das ist der erwartete Zustand, solange niemand zugestimmt hat — nicht ein Fehler.</p>'
      + '<p>Daten entstehen erst, wenn <b>beide</b> Bedingungen erfüllt sind:</p>'
      + '<ul><li>die Edition setzt <code>analytics.enabled</code> + <code>endpoint</code>,</li>'

  } else if(noEvents){

      + '<p>Im '+esc(s.windowDays)+'-Tage-Fenster: <b>'+esc(fmtN(s.totals.snapshots))+' Snapshots</b>, aber <b>0 Events</b>. Zuerst ein größeres Fenster probieren — Events können schlicht älter sein. Bleibt es dabei, kommt der tägliche Snapshot an und der Ereignis-Strom nicht: dann <code>POST /v1/events</code> prüfen (Route, Größenlimit, Rate-Limit).</p></div>';
  } else if(noSnaps){
    html += '<div class="firstrun"><h3>Nur Events, keine Snapshots</h3>'
      + '<p>Im '+esc(s.windowDays)+'-Tage-Fenster: <b>'+esc(fmtN(s.totals.events))+' Events</b>, aber <b>0 Snapshots</b>. Zuerst ein größeres Fenster probieren — der Snapshot kommt nur einmal täglich, bei wenig Nutzung liegt der letzte leicht außerhalb. Bleibt es dabei, <code>POST /v1/usage</code> prüfen (häufigste Ursache: eine noch nicht angewendete Migration ⇒ Schema-Fehler ⇒ 500).</p></div>';
  } else if(!u.total){
    html += '<div class="firstrun"><h3>Daten empfangen, aber keine aktiven Nutzer im Fenster</h3>'
      + '<p><b>'+esc(fmtN(s.totals.events))+' Events</b> im Speicher, aber niemand war in den letzten '+esc(s.windowDays)+' Tagen aktiv. Größeres Zeitfenster wählen.</p></div>';
  }

  // ---- Hero: die EINE North-Star-Kennzahl --------------------------------
  var nsm = inv.nsm || {};
  var wal = nsm.wal||0, walMau = nsm.walMauPct||0;
  html += '<div class="hero">'
    + '<div class="hero__main">'
    + '<div class="hero__val'+(noBasis?'" style="color:var(--faint);font-weight:400':'')+'">'+(noBasis?"—":esc(fmtN(wal)))
    // Trendpfeil nur mit Datengrundlage: "± 0 %" neben einem Strich behauptet
    // eine gemessene Stagnation, die es nicht gibt.
    + (noBasis?"":' <span style="font-size:20px;font-family:var(--font)">'+arrow((nsm.trend||{}).deltaPct)+'</span>')+'</div>'

    + '<div class="hero__stat"><div class="v">'+(noBasis?"—":esc(fmtN(nsm.avgSessionsPerLearner||0)))+'</div><div class="l">Ø Runden / Learner</div></div>'

    + '</div>'

            label:"DAU / WAU / MAU", hint:"aktiv heute / 7 T / 30 T · WAU vs. Vorwoche "+(((u.trendWau7||{}).deltaPct)|0)+" %" })

    + '</div>';

  html += GLOSSAR;
  html += '</section>';

  // ================= 2 · WACHSTUM & AKQUISE ================================
  html += zoneOpen(SECTIONS[1], 1);
  html += '<div class="kpis">'
    + kpi({ tier:2, empty:noBasis, raw:fmtN(qr), label:"Quick Ratio",

      + ((((inv.activation||{}).bySource)||[]).length? hbars(inv.activation.bySource.map(function(a){return {label:a.src+" · "+fmtN(a.activated)+" von "+fmtN(a.users),count:a.pct};}),{color:"var(--ok)",fmt:function(d){return d.count+" %";}}) : empty("Keine neuen Personen im Fenster","entsteht mit dem ersten app_open neuer Nutzer"))

  html += '<div class="grid">';

    foot: ((lt.rounds? 'Ø '+esc(fmtN((lt.tts&&lt.tts.perRound)||0))+' TTS / '+esc(fmtN((lt.context&&lt.context.perRound)||0))+' Kontext je Runde · '+esc(pct((lt.tts&&lt.tts.roundSharePct)||0))+' bzw. '+esc(pct((lt.context&&lt.context.roundSharePct)||0))+' der Runden' : "")
      + ((le.cardToolUse&&le.cardToolUse.ratings)? (lt.rounds?' · ':'')+'je Bewertung: '+esc(pct(le.cardToolUse.spokePct||0))+' TTS, '+esc(pct(le.cardToolUse.ctxPct||0))+' Kontext' : "")) });

  html += panelHtml({ title:"Tagesziel", small:"("+esc(pct((s.trip&&s.trip.withGoalPct)||0))+" haben ein Reiseziel)",
    desc:"Wie ambitioniert die selbst gesetzten Tagesziele sind — nur von Personen mit gesetztem Reiseziel.",
    body: (s.trip&&s.trip.daily&&s.trip.daily.length? hbars(s.trip.daily.map(function(d){return {label:d.key,count:d.count};})) : empty("Keine Tagesziele","entsteht mit dem ersten Snapshot mit gesetztem Ziel")) });
  html += '</section>';

  // ================ 7 · SEGMENTE & EDITIONEN ===============================
  html += zoneOpen(SECTIONS[6], 6);
  html += '<div class="grid">';
  html += panelHtml({ title:"Plattformen", small:"(distinkte Personen)",
    desc:"Worauf die App läuft — steuert, welche Geräteklassen beim Testen Priorität haben.",
    body: donut((((s.segments&&s.segments.platforms))||[]).map(function(p){return {label:p.key,count:p.count};}),{centerLabel:"Personen",emptyWhat:"Keine Plattform-Daten",emptyWhy:"entsteht mit dem ersten Event"}) });
  html += panelHtml({ title:"Editionen", small:"(distinkte Personen)",
    desc:"Verteilung über die Ausgaben (Standard, Schule, Hostel …). Editionen sind der B2B-Umsatzkanal.",
    body: donut((((s.segments&&s.segments.editions))||[]).map(function(e){return {label:e.key,count:e.count};}),{centerLabel:"Personen",emptyWhat:"Keine Editions-Daten",emptyWhy:"entsteht mit dem ersten Event mit edition-Feld"}) });
  html += '</div>';

  html += panelHtml({ title:"B2B: KPIs je Edition", small:"(Umsatzkanal)",
    desc:"Nutzung, Aktivierung und Wochenaktivität je verkaufter Edition — die Zahlen für das nächste Kundengespräch.",
    body: editionTable(inv.editions) });

  html += '<div class="grid">';
  html += panelHtml({ title:"Sprachen &amp; Tracks",
    desc:"Oberflächensprache und gewählter Lern-Track (z. B. de-es, de-en) — zeigt, welche Zielgruppen real angekommen sind.",
    body: hbars(s.meta.locales) + '<h4>Lern-Tracks</h4>' + hbars(s.meta.tracks) });
  html += panelHtml({ title:"Feature-Adoption", small:"(Snapshot: je Modus benutzt)",
    desc:"Wie viele Nutzer die jeweilige Funktion mindestens einmal benutzt haben — Adoption, nicht Häufigkeit.",
    body: hbars(((s.meta.snapshotFeatureAdoption)||[]).map(function(a){return {label:a.key,count:a.count};}),{color:"var(--ok)",emptyWhat:"Keine Feature-Daten",emptyWhy:"entsteht mit dem ersten Tages-Snapshot mit features-Feld"}) });
  html += '</div>';

  html += '<div class="grid">';
  html += panelHtml({ title:"Karten heute", small:"(Snapshot-Verteilung)",
    desc:"Tagespensum: wie viele Karten am Snapshot-Tag gelernt wurden.",
    body: hbars(sortBuckets(s.meta.snapshotCardsToday).map(function(a){return {label:a.key,count:a.count};}),{color:"var(--easy)",emptyWhat:"Keine Karten-Daten",emptyWhy:"entsteht mit dem ersten Tages-Snapshot mit gelernten Karten"}) });
  html += panelHtml({ title:"Bewertungen gesamt", small:"(Lebenszeit)",
    desc:"Kumulierte Karten-Bewertungen je Person seit Installation — trennt Neulinge von Vielnutzern.",
    body: hbars(sortBuckets(s.meta.snapshotReviews).map(function(a){return {label:a.key,count:a.count};}),{color:"var(--easy)",emptyWhat:"Keine Bewertungs-Daten",emptyWhy:"entsteht mit dem ersten Tages-Snapshot mit Lebenszeit-Bewertungen"}) });
  html += '</div>';
  html += '</section>';

  // ================= 8 · QUALITÄT & TECHNIK ================================
  html += zoneOpen(SECTIONS[7], 7);
  html += '<div class="kpis">'
    + kpi({ tier:2, empty:noBasis, raw:fmtN(eps), label:"Fehler / Sitzung",
            target:{ok:eps<=0.1,text:"Ziel ≤ 0,1"}, tone:eps>0.1?"var(--no)":"var(--ok)",
            hint:fmtN((inv.quality&&inv.quality.errors)||0)+" Fehler gesamt" })
    + kpi({ tier:2, empty:virgin, raw:fmtN(s.totals.errors||0), label:"Fehler im Fenster",
            target:{ok:!s.totals.errors,text:s.totals.errors?"Fehler aufgetreten":"keine Fehler"}, tone:s.totals.errors?"var(--no)":null,
            hint:"JS-Fehler aus dem error-Event" })
    + '</div>';

  html += '<div class="grid">';
  html += panelHtml({ title:"Fehler", small:"(Monitoring)",
    desc:"Die häufigsten Fehlermeldungen, ihre Verteilung über App-Versionen und die Ansicht, auf der es krachte. Häufen sich Fehler in genau EINER Version, ist es ein Release-Problem — siehe Regressions-Alarm im Überblick.",
    body: (s.errors.length? hbars(s.errors.map(function(e){return {label:e.key,count:e.count};}),{color:"var(--no)"}) : empty("Keine Fehler im Fenster",""))
      + '<h4>Fehler je App-Version</h4>'
      + ((s.errorsByVersion&&s.errorsByVersion.length)? hbars(s.errorsByVersion.map(function(e){return {label:e.key,count:e.count};}),{color:"var(--no)"}) : empty("Keine Fehler",""))
      + '<h4>Fehler je Screen</h4>'
      + ((s.errorsByScreen&&s.errorsByScreen.length)? hbars(s.errorsByScreen.map(function(e){return {label:e.key,count:e.count};}),{color:"var(--no)"}) : empty("Keine Screen-Daten","entsteht mit dem ersten error-Event mit screen-Feld")) });
  html += panelHtml({ title:"App-Versionen",
    desc:"Wie schnell Updates die Nutzerschaft erreichen. Alte Versionen mit vielen Nutzern verlängern die Zeit, die ein Bugfix bis zur Wirkung braucht.",
    body: hbars(s.meta.appVersions)
      + '<h4>Startzeit (app_open.load_ms)</h4>'
      + ((s.perf&&s.perf.loadMs&&s.perf.loadMs.length)? hbars(sortBuckets(s.perf.loadMs).map(function(l){return {label:l.key+" ms",count:l.count};}),{color:"var(--easy)"}) : empty("Keine Startzeit-Daten","entsteht mit dem ersten app_open")) });
  html += '</div>';
  html += '</section>';

  $("app").innerHTML = html;
  $("window").textContent = "Fenster: "+s.windowDays+" Tage";
  $("updated").textContent = "Stand: "+new Date(s.generatedAt).toLocaleString("de-DE");
  $("tools").hidden = false;
  $("foot").hidden = false;
  $("subnav").hidden = false;
}

// ---------------------------------------------------------------------------
// ==== DOM-VERDRAHTUNG AB HIER ====
// Alles OBERHALB dieser Marke ist frei von document/window/fetch und wird von
// test/telemetry-dashboard.test.js genau an dieser Zeile abgeschnitten und in
// Node ausgeführt. Die Marke deshalb NICHT umformulieren, und oberhalb nichts
// ergänzen, das einen Browser braucht.
// ---------------------------------------------------------------------------
var QS = new URLSearchParams(location.search);
var TOKEN_KEY = "holaruta.admintoken.v1";
var THEME_KEY = "holaruta.admintheme.v1";
var TOKEN = QS.get("token") || "";
try { if (!TOKEN) TOKEN = window.localStorage.getItem(TOKEN_KEY) || ""; } catch (e) {}
// Kam der Token über die URL: sofort merken und aus der Adresszeile entfernen,
// damit er nicht in History/Referrer stehen bleibt.
if (QS.get("token")) {
  try { window.localStorage.setItem(TOKEN_KEY, TOKEN); } catch (e) {}
  try { QS.delete("token"); history.replaceState(null, "", location.pathname + (QS.toString()?"?"+QS:"")); } catch (e) {}
}
// BASE: self-host (tools/telemetry-server.js) antwortet unter "/api/…"; als
// dist/admin.html liegt die Seite same-origin zur Produktions-API ("/v1/admin/…").
var IS_LOCAL = /^(localhost|127\.0\.0\.1|\[::1\])$/.test(location.hostname) || location.protocol === "file:";
var BASE = QS.get("base") || (IS_LOCAL ? "/api" : "/v1/admin");
var DAYS = 30;
var timer = null;

function apiUrl(path){ return BASE + path + "?days=" + DAYS; }
// Token im Authorization-Header statt im Query: hält ihn aus Server-Logs und
// Browser-History heraus. Der Server akzeptiert beides. Ohne Token wird bewusst
// GANZ OHNE Header angefragt — der Self-Host-Collector läuft standardmäßig ohne
// TELEMETRY_TOKEN, dort gäbe es sonst kein Durchkommen.
function apiFetch(path){
  var h = TOKEN ? { "Authorization": "Bearer " + TOKEN } : {};
  return fetch(apiUrl(path), { headers: h });
}

function say(msg){ var l = $("live"); if(l) l.textContent = msg; }

function renderDaysBtns(keepFocus){
  $("daysbtns").innerHTML = [7,14,30,90].map(function(d){
    return '<button type="button" data-days="'+d+'" aria-pressed="'+(d===DAYS)+'">'+d+' T</button>';
  }).join("");
  // Die Buttons werden neu erzeugt — ohne das hier landet der Tastatur-Fokus bei
  // jedem Wechsel des Zeitfensters auf <body>, also am Seitenanfang.
  if(keepFocus){
    var b = $("daysbtns").querySelector('[data-days="'+DAYS+'"]');
    if(b) b.focus();
  }
}

function stopTimer(){ if(timer){ clearInterval(timer); timer = null; } }
function startTimer(){
  stopTimer();
  // 5 Minuten statt 30 Sekunden: die Kennzahlen bewegen sich auf Tagesgrenzen,
  // ein 30s-Poll wären ~2.900 Supabase-Aggregationen pro Tag und offenem Tab.
  timer = setInterval(function(){ if(document.visibilityState === "visible") load(); }, 300000);
}

function showGate(msg){
  stopTimer(); // sonst würde der Poll-Tick das Eingabefeld beim Tippen leeren
  $("tools").hidden = true;
  $("foot").hidden = true;
  $("subnav").hidden = true;
  $("window").textContent = "";
  $("updated").textContent = "";
  $("app").innerHTML = '<div class="gate"><h2>Admin-Zugang</h2>'
    + '<p>Diese Seite zeigt interne Nutzungsstatistiken. Ohne gültigen Token keine Daten.</p>'
    + '<form id="gateform" autocomplete="on">'
    + '<label for="gatetoken">Zugangs-Token</label>'
    + '<input type="password" id="gatetoken" name="admin-token" autocomplete="current-password" autofocus />'
    + '<div class="gate__actions"><button type="submit" class="gate__submit" id="gatesubmit">Anmelden</button></div>'
    + '</form>'
    + (msg ? '<p class="err" role="alert">'+esc(msg)+'</p>' : '')
    + '<details><summary>Woher kommt der Token?</summary>Vercel → Projekt <code>hola-ruta</code> → Settings → Environment Variables → <code>ADMIN_TELEMETRY_TOKEN</code>.</details>'
    + '</div>';
  var gi = $("gatetoken"); if(gi) gi.focus();
  say(msg ? "Anmeldung fehlgeschlagen: "+msg : "Anmeldung erforderlich.");
  $("gateform").addEventListener("submit", function(e){
    e.preventDefault();
    var v = $("gatetoken").value.trim();
    if(!v) return;
    $("gatesubmit").disabled = true;
    $("gatesubmit").textContent = "Prüfe …";
    TOKEN = v;
    try { window.localStorage.setItem(TOKEN_KEY, v); } catch (err) {}
    load();
  });
}

// Fehlermeldungen: vorher fiel alles außer 401 in r.json() und der Nutzer sah
// "Unexpected token '<'" statt der eigentlichen Server-Aussage.
function httpMessage(status, body){
  // Body kürzen: bei einem Fehler von Edge/Proxy kommt eine ganze HTML-Seite
  // zurück, die sonst komplett in der Meldung landen würde.
  var b = String(body||"").slice(0, 120);
  // Beim ersten Besuch wurde nie ein Token geschickt — dann ist "ungültig" eine
  // Falschaussage, die aussieht, als hätte man sich vertippt. Leere Meldung
  // heißt: die Maske erscheint kommentarlos, so wie sie soll.
  if(status === 401) return TOKEN ? "Token ungültig." : "";
  if(status === 429) return "Zu viele Anfragen (Rate-Limit) — in einer Minute erneut versuchen.";
  if(status === 500 && /not configured/.test(b)) return "Server-Konfiguration: ADMIN_TELEMETRY_TOKEN ist auf dem Server nicht gesetzt.";
  if(status === 500) return "Server-Fehler beim Laden der Daten (" + (b||"500") + ").";
  return "Unerwartete Server-Antwort (HTTP " + status + ").";
}

// Immer erst laden, Login-Maske NUR bei echtem 401. So bleibt der token-freie
// Self-Host-Betrieb ohne Umweg nutzbar, während die Produktion (fail-closed)
// von sich aus 401 liefert und damit die Maske auslöst.
function load(){
  apiFetch("/stats").then(function(r){
    if(r.ok) return r.json();
    return r.text().then(function(t){
      var msg = t;
      try { var j = JSON.parse(t); msg = j.error || t; } catch(e){}
      var err = new Error(httpMessage(r.status, msg));
      err.status = r.status;
      throw err;
    });
  }).then(function(s){
    // render() getrennt absichern: ein Darstellungsfehler ist KEIN Ladefehler
    // und darf nicht als "Netzwerkproblem" fehlgemeldet werden.
    try {
      render(s);
      startTimer();
      say("Daten geladen: Fenster "+s.windowDays+" Tage, "+(s.users&&s.users.total||0)+" Personen.");
    } catch(e){
      stopTimer();
      $("app").innerHTML = '<p class="empty"><b>Darstellungsfehler</b> — die Daten kamen an, konnten aber nicht gezeichnet werden: '
        + esc(e && e.message) + '. Rohdaten prüfen: <button id="rawjson">JSON laden</button></p>';
      var b = $("rawjson"); if(b) b.addEventListener("click", downloadJson);
    }
  }).catch(function(e){
    stopTimer();
    if(e && e.status === 401){
      TOKEN = "";
      try { window.localStorage.removeItem(TOKEN_KEY); } catch (err) {}
      return showGate(e.message);
    }
    $("app").innerHTML = '<p class="empty"><b>Laden fehlgeschlagen</b> — '+esc((e&&e.message)||"unbekannter Fehler")+'</p>';
  });
}

// Downloads über fetch + Blob statt location.href, damit der Token nicht in der
// Adresszeile/History landet.
function download(path, filename, mime){
  apiFetch(path).then(function(r){
    if(!r.ok){
      // Abgelaufener Token soll auch hier zurück zur Anmeldung führen statt in
      // einer Sackgassen-Meldung ohne Weg zurück zu enden.
      var e = new Error(httpMessage(r.status, ""));
      e.status = r.status;
      throw e;
    }
    return r.text();
  }).then(function(t){
    var a = document.createElement("a");
    a.href = URL.createObjectURL(new Blob([t], {type:mime}));
    a.download = filename;
    a.click();
    setTimeout(function(){ URL.revokeObjectURL(a.href); }, 1000);
  }).catch(function(e){
    if(e && e.status === 401){
      TOKEN = "";
      try { window.localStorage.removeItem(TOKEN_KEY); } catch (err) {}
      return showGate(e.message);
    }
    alert("Download fehlgeschlagen: " + ((e&&e.message)||"unbekannt"));
  });
}
function downloadJson(){ download("/stats", "holaruta-stats.json", "application/json"); }

// ---- Bereichs-Navigation + Scrollspy ---------------------------------------
// Die Links kommen aus derselben SECTIONS-Registry wie die Sektionsköpfe in
// render() — Subnav und Seite können nicht auseinanderlaufen.
$("subnavwrap").innerHTML = SECTIONS.map(function(sec){
  return '<a href="#'+esc(sec.id)+'">'+esc(sec.title)+'</a>';
}).join("");
// Scroll-Listener statt IntersectionObserver: wir brauchen "letzte Sektion,
// deren Kopf über der Subnav liegt" — das ist mit Rechteck-Abfrage direkt
// ausdrückbar, mit Observer-Schwellen nur über Umwege.
var spyPending = false;
function updateSpy(){
  spyPending = false;
  var cur = SECTIONS.length ? SECTIONS[0].id : "";
  for(var i=0;i<SECTIONS.length;i++){
    var el = document.getElementById(SECTIONS[i].id);
    if(el && el.getBoundingClientRect().top <= 90) cur = SECTIONS[i].id;
  }
  var links = $("subnavwrap").querySelectorAll("a");
  for(var j=0;j<links.length;j++){
    var on = links[j].getAttribute("href") === "#"+cur;
    if(on) links[j].setAttribute("aria-current","true");
    else links[j].removeAttribute("aria-current");
  }
}
window.addEventListener("scroll", function(){
  if(spyPending) return;
  spyPending = true;
  requestAnimationFrame(updateSpy);
}, { passive:true });

// ---- Diagramm-Tooltip ------------------------------------------------------
// EINE wiederverwendete Tooltip-Instanz, per Delegation gefüllt aus data-tip.
// Der Text ist beim Rendern bereits esc()-maskiert; hier deshalb textContent,
// nie innerHTML.
var tipEl = document.createElement("div");
tipEl.className = "tip";
document.body.appendChild(tipEl);
function moveTip(e){
  var x = Math.min(e.clientX + 12, window.innerWidth - tipEl.offsetWidth - 8);
  var y = e.clientY - tipEl.offsetHeight - 10;
  if(y < 4) y = e.clientY + 16;
  tipEl.style.left = x + "px";
  tipEl.style.top = y + "px";
}
document.addEventListener("pointerover", function(e){
  var t = e.target && e.target.closest ? e.target.closest("[data-tip]") : null;
  if(!t) { tipEl.classList.remove("on"); return; }
  tipEl.textContent = t.getAttribute("data-tip");
  tipEl.classList.add("on");
  moveTip(e);
});
document.addEventListener("pointermove", function(e){
  if(tipEl.classList.contains("on")) moveTip(e);
});
document.addEventListener("pointerout", function(e){
  var t = e.target && e.target.closest ? e.target.closest("[data-tip]") : null;
  if(t) tipEl.classList.remove("on");
});

$("print").addEventListener("click", function(){ window.print(); });
$("refresh").addEventListener("click", load);
$("exp-json").addEventListener("click", downloadJson);
$("exp-csv").addEventListener("click", function(){ download("/stats.csv", "holaruta-stats.csv", "text/csv"); });
$("exp-kpicsv").addEventListener("click", function(){ download("/kpis.csv", "holaruta-kpis.csv", "text/csv"); });
$("daysbtns").addEventListener("click", function(e){
  var b = e.target.closest("[data-days]");
  if(!b) return;
  DAYS = Number(b.dataset.days);
  renderDaysBtns(true);
  load();
});
$("theme").addEventListener("click", function(){
  var next = document.documentElement.dataset.theme === "dark" ? "light" : "dark";
  document.documentElement.dataset.theme = next;
  try { window.localStorage.setItem(THEME_KEY, next); } catch (e) {}
});
$("logout").addEventListener("click", function(){
  TOKEN = "";
  try { window.localStorage.removeItem(TOKEN_KEY); } catch (e) {}
  showGate("");
});

renderDaysBtns();
load();
</script>
